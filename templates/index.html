<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canlı Yayın</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            /* Ayna efekti */
        }

        /* İzleyici modu için video düzeltme */
        video.viewer-mode {
            transform: scaleX(1);
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent 40%);
            padding: 20px;
        }

        #chat-box {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .msg {
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .msg span {
            color: #D4AF37;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        button {
            background: #D4AF37;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.2rem;
            background: #e74c3c;
            color: white;
            border-radius: 50px;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }
    </style>
</head>

<body>

    <div id="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

    <button id="broadcastBtn" class="start-btn" onclick="startBroadcasting()">YAYIN AÇ</button>
    <button id="watchBtn" class="start-btn" onclick="startWatching()"
        style="display:none; background:#3498db; margin-top:60px;">İZLE</button>

    <div class="ui-layer" id="uiLayer" style="display:none;">
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="msgInput" placeholder="Yorum yaz...">
            <button onclick="sendChat()">Gönder</button>
        </div>
    </div>

    <script>
        // YAYINCI KISMI
        let mediaRecorder;
        let wsBroadcast;

        async function startBroadcasting() {
            try {
                // Kamera ve Mikrofon İzni İste
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }, // Ön kamera
                    audio: true
                });

                // Kendi görüntümüzü ekrana verelim
                const videoEl = document.getElementById('localVideo');
                videoEl.srcObject = stream;

                document.getElementById('broadcastBtn').style.display = 'none';
                document.getElementById('uiLayer').style.display = 'flex';

                // WebSocket ile sunucuya bağlan
                var wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                wsBroadcast = new WebSocket(wsProtocol + "//" + location.host + "/ws/broadcast");

                wsBroadcast.onopen = () => {
                    // Medya Kaydediciyi Başlat
                    // MimeType tarayıcıya göre değişebilir (webm genelde desteklenir)
                    const options = { mimeType: 'video/webm; codecs=vp8,opus' };
                    mediaRecorder = new MediaRecorder(stream, options);

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0 && wsBroadcast.readyState === WebSocket.OPEN) {
                            wsBroadcast.send(event.data);
                        }
                    };

                    // Her 1 saniyede bir veri gönder (Latency'i etkiler)
                    mediaRecorder.start(1000);
                };

            } catch (err) {
                alert("Kamera izni verilmedi: " + err);
            }
        }

    // İZLEYİCİ KISMI
    function startWatching() {
        document.getElementById('watchBtn').style.display = 'none';
        document.getElementById('broadcastBtn').style.display = 'none';
        document.getElementById('uiLayer').style.display = 'flex';

        const videoEl = document.getElementById('localVideo');
        videoEl.classList.add('viewer-mode');

        if (Hls.isSupported()) {
            // --- DÜŞÜK GECİKME AYARLARI ---
            var config = {
                enableWorker: true,
                lowLatencyMode: true,

                // Donmayı engelleyen kritik ayarlar:
                liveSyncDurationCount: 3,     // Hedef: Canlı yayının 3 parça (yaklaşık 6 sn) gerisinden gel
                liveMaxLatencyDurationCount: 5, // Eğer çok geride kalırsan atlama yap
                maxLiveSyncPlaybackRate: 1.5, // Geri kalınca videoyu çok hafif hızlandır (Sesi bozmadan)
            };

            var hls = new Hls(config);
            hls.loadSource('/static/hls/stream.m3u8');
            hls.attachMedia(videoEl);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                videoEl.play();
            });
        } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
            // iPhone (Safari) için native player
            videoEl.src = '/static/hls/stream.m3u8';
            videoEl.play();
        }
    }

        // Eğer URL'de ?watch=true varsa direkt izleme moduna geç (Basit mantık)
        if (window.location.search.includes('watch=true')) {
            document.getElementById('broadcastBtn').style.display = 'none';
            document.getElementById('watchBtn').style.display = 'block';
        }

        // CHAT KISMI
        var wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var wsChat = new WebSocket(wsProtocol + "//" + location.host + "/ws/chat");

        wsChat.onmessage = function (event) {
            var box = document.getElementById('chat-box');
            var div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span>User:</span> ${event.data}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        };

        function sendChat() {
            var input = document.getElementById("msgInput");
            if (input.value) { wsChat.send(input.value); input.value = ""; }
        }
    </script>
</body>

</html>
