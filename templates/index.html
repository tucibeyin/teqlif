<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teqlif Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- MODERN TASARIM (CSS) --- */
        body {
            margin: 0;
            background: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a1a;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        video.broadcaster {
            transform: scaleX(-1);
            object-fit: cover;
        }

        /* Yayıncı tam ekran doldurur */

        /* Üst Bilgi Çubuğu */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent);
            z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            pointer-events: none;
        }

        .live-badge {
            background: #e74c3c;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        /* Ses Açma Butonu (Modern) */
        #unmuteBtn {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 13px;
            display: none;
            transition: all 0.3s ease;
        }

        #unmuteBtn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        /* Ana Başlatma Butonları */
        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .big-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            border: none;
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .big-btn:active {
            transform: scale(0.95);
        }

        .btn-broadcast {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }

        .btn-watch {
            background: linear-gradient(45deg, #2193b0, #6dd5ed);
        }

        /* Alt Arayüz (Chat ve Kontroller) */
        .ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            z-index: 4;
            pointer-events: none;
            /* Tıklamalar arkaya geçmesin, sadece child elementler tıklanabilsin */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
            padding: 20px;
            box-sizing: border-box;
        }

        #chat-box {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            pointer-events: auto;
            mask-image: linear-gradient(to bottom, transparent, black 10%);
            /* Üstü silik chat */
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%);
        }

        .msg {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 15px;
            margin-bottom: 8px;
            width: fit-content;
            max-width: 80%;
            backdrop-filter: blur(5px);
            font-size: 14px;
            animation: slideIn 0.3s ease;
            border-left: 3px solid #f1c40f;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .msg span {
            color: #f1c40f;
            font-weight: bold;
            margin-right: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
            align-items: center;
        }

        .input-group {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            padding: 12px 15px;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .send-btn {
            background: transparent;
            border: none;
            color: #f1c40f;
            padding: 0 15px;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }

        .send-btn:hover {
            color: white;
        }

        /* Kaydırma çubuğu gizleme */
        #chat-box::-webkit-scrollbar {
            width: 4px;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="live-badge"><i class="fa-solid fa-circle"></i> CANLI</div>
        <button id="unmuteBtn" onclick="enableAudio()"><i class="fa-solid fa-volume-high"></i> Sesi Aç</button>
    </div>

    <div id="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

    <div class="center-controls">
        <button id="broadcastBtn" class="big-btn btn-broadcast" onclick="startBroadcasting()">
            <i class="fa-solid fa-video"></i> YAYIN BAŞLAT
        </button>
        <button id="watchBtn" class="big-btn btn-watch" onclick="startWatching()" style="display:none;">
            <i class="fa-solid fa-eye"></i> İZLE
        </button>
    </div>

    <div class="ui-layer" id="uiLayer" style="display:none;">
        <div id="chat-box"></div>
        <div class="controls">
            <div class="input-group">
                <input type="text" id="msgInput" placeholder="Yorum yaz...">
                <button class="send-btn" onclick="sendChat()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script>
        // --- DEĞİŞMEYEN SAĞLAM MANTIK (CORE LOGIC) ---
        let wsBroadcast;
        let mediaRecorder;

        function enableAudio() {
            const videoEl = document.getElementById('localVideo');
            videoEl.muted = false;
            document.getElementById('unmuteBtn').style.display = 'none';
        }

        async function startBroadcasting() {
            try {
                const constraints = {
                    video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 1280 }, frameRate: { ideal: 30 } },
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoEl = document.getElementById('localVideo');
                videoEl.classList.add('broadcaster');
                videoEl.srcObject = stream;
                videoEl.muted = true;

                // UI Değişimleri
                document.querySelector('.center-controls').style.display = 'none';
                document.getElementById('uiLayer').style.display = 'flex';

                const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
                wsBroadcast = new WebSocket(proto + "//" + location.host + "/ws/broadcast");

                wsBroadcast.onopen = () => {
                    // 1500k Bitrate (Altın Oran)
                    const options = { mimeType: 'video/webm; codecs=vp8,opus', videoBitsPerSecond: 1500000 };
                    mediaRecorder = new MediaRecorder(stream, options);

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0 && wsBroadcast.readyState === WebSocket.OPEN) {
                            wsBroadcast.send(event.data);
                        }
                    };
                    // 1000ms Senkronizasyon
                    mediaRecorder.start(1000);
                };

            } catch (err) { alert("Erişim hatası: " + err); }
        }

        function startWatching() {
            document.querySelector('.center-controls').style.display = 'none';
            document.getElementById('uiLayer').style.display = 'flex';
            document.getElementById('unmuteBtn').style.display = 'block'; // Ses butonunu göster

            const videoEl = document.getElementById('localVideo');

            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    liveSyncDurationCount: 2,
                    liveMaxLatencyDurationCount: 4,
                });
                hls.loadSource('/static/hls/stream.m3u8');
                hls.attachMedia(videoEl);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoEl.play().catch(e => console.log("Otomatik oynatma engellendi, buton bekleniyor."));
                });
            } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                videoEl.src = '/static/hls/stream.m3u8';
                videoEl.play();
            }
        }

        // URL Kontrolü (?watch=true)
        if (location.search.includes('watch=true')) {
            document.getElementById('broadcastBtn').style.display = 'none';
            document.getElementById('watchBtn').style.display = 'flex'; // Block yerine flex (hizalama için)
        }

        // Chat Sistemi
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsChat = new WebSocket(proto + "//" + location.host + "/ws/chat");

        wsChat.onmessage = (e) => {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span>Misafir:</span> ${e.data}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        };

        function sendChat() {
            const input = document.getElementById("msgInput");
            if (input.value) {
                wsChat.send(input.value);
                input.value = "";
            }
        }

        // Enter tuşu ile mesaj gönderme
        document.getElementById("msgInput").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                sendChat();
            }
        });
    </script>
</body>

</html>
