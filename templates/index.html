<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teqlif Live</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            margin: 0;
            background: #111;
            font-family: sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        video.broadcaster {
            transform: scaleX(-1);
            border: 2px solid #e74c3c;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent 30%);
            padding: 20px;
        }

        #chat-box {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
            pointer-events: auto;
        }

        .msg {
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .msg span {
            color: #f1c40f;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            backdrop-filter: blur(5px);
        }

        button {
            background: #f1c40f;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.2rem;
            background: #e74c3c;
            color: white;
            border-radius: 50px;
            z-index: 10;
            pointer-events: auto;
            cursor: pointer;
            border: none;
        }
    </style>
</head>

<body>

    <div id="video-container">
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

    <button id="broadcastBtn" class="start-btn" onclick="startBroadcasting()">YAYIN AÇ</button>
    <button id="watchBtn" class="start-btn" onclick="startWatching()"
        style="display:none; background:#3498db; margin-top:60px;">İZLE</button>

    <div class="ui-layer" id="uiLayer" style="display:none;">
        <div id="chat-box"></div>
        <div class="controls">
            <input type="text" id="msgInput" placeholder="Yorum yaz...">
            <button onclick="sendChat()">Gönder</button>
        </div>
    </div>

    <script>
        let wsBroadcast;
        let mediaRecorder;

        async function startBroadcasting() {
            try {
                const constraints = {
                    video: { facingMode: "user", width: { ideal: 720 }, height: { ideal: 1280 }, frameRate: { ideal: 30 } },
                    audio: { echoCancellation: true, noiseSuppression: true }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoEl = document.getElementById('localVideo');
                videoEl.classList.add('broadcaster');
                videoEl.srcObject = stream;

                document.getElementById('broadcastBtn').style.display = 'none';
                document.getElementById('uiLayer').style.display = 'flex';

                const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
                wsBroadcast = new WebSocket(proto + "//" + location.host + "/ws/broadcast");

                wsBroadcast.onopen = () => {
                    // Bitrate 2.5Mbps - Kaliteli
                    const options = { mimeType: 'video/webm; codecs=vp8,opus', videoBitsPerSecond: 2500000 };
                    mediaRecorder = new MediaRecorder(stream, options);

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0 && wsBroadcast.readyState === WebSocket.OPEN) {
                            wsBroadcast.send(event.data);
                        }
                    };
                    // 1000ms gönderim -> 1000ms FFmpeg işleme (Mükemmel uyum)
                    mediaRecorder.start(1000);
                };

            } catch (err) { alert("Kamera hatası: " + err); }
        }

        function startWatching() {
            document.getElementById('watchBtn').style.display = 'none';
            document.getElementById('broadcastBtn').style.display = 'none';
            document.getElementById('uiLayer').style.display = 'flex';

            const videoEl = document.getElementById('localVideo');

            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    // --- DÜŞÜK GECİKME İÇİN EN İYİ AYARLAR ---
                    liveSyncDurationCount: 2,    // 2 parça (2 sn) geriden gel
                    liveMaxLatencyDurationCount: 4,
                    maxLiveSyncPlaybackRate: 1.5,
                });
                hls.loadSource('/static/hls/stream.m3u8');
                hls.attachMedia(videoEl);
                hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(e => console.log(e)));
            } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
                videoEl.src = '/static/hls/stream.m3u8';
                videoEl.play();
            }
        }

        if (location.search.includes('watch=true')) {
            document.getElementById('broadcastBtn').style.display = 'none';
            document.getElementById('watchBtn').style.display = 'block';
        }

        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsChat = new WebSocket(proto + "//" + location.host + "/ws/chat");
        wsChat.onmessage = (e) => {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span>Misafir:</span> ${e.data}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        };

        function sendChat() {
            const input = document.getElementById("msgInput");
            if (input.value) { wsChat.send(input.value); input.value = ""; }
        }
    </script>
</body>

</html>
