{% extends "base.html" %}

{% block content %}
<style>
    /* RESET */
    body,
    html {
        height: auto !important;
        min-height: 100% !important;
        display: block !important;
        overflow-x: hidden;
        background: #000;
    }

    .teqlif-os {
        width: 100%;
        max-width: 100%;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    footer {
        display: none !important;
    }

    /* KATEGORİ ÇUBUĞU */
    .category-header-wrapper {
        position: sticky;
        top: 0;
        z-index: 999;
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 10px 0;
    }

    .category-bar {
        display: flex;
        overflow-x: auto;
        gap: 8px;
        padding: 0 15px;
        scrollbar-width: none;
    }

    .category-bar::-webkit-scrollbar {
        display: none;
    }

    .cat-chip {
        flex: 0 0 auto;
        background: rgba(255, 255, 255, 0.1);
        color: #ccc;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        text-decoration: none;
        border: 1px solid transparent;
        transition: all 0.2s;
    }

    .cat-chip.active {
        background: #fff;
        color: #000;
        border-color: #fff;
    }

    /* YAYIN IZGARASI */
    .grid-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 15px;
        padding-bottom: 80px;
    }

    @media(min-width: 768px) {
        .grid-container {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }
    }

    .grid-card {
        position: relative;
        aspect-ratio: 9/16;
        border-radius: 12px;
        overflow: hidden;
        background: #111;
        text-decoration: none;
        transition: transform 0.2s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .grid-card:active {
        transform: scale(0.98);
    }

    .card-thumb {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .live-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        background: #ff0050;
        color: white;
        padding: 3px 6px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 800;
        animation: pulse 1.5s infinite;
    }

    .card-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
        padding: 10px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
    }

    .card-title {
        color: white;
        font-size: 13px;
        font-weight: 700;
        margin: 0;
        text-shadow: 0 1px 2px black;
    }

    .card-user {
        color: #ddd;
        font-size: 11px;
        margin-top: 2px;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .card-avatar {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #555;
    }

    /* ALT MENÜ */
    .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background: rgba(15, 15, 15, 0.95);
        backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-around;
        align-items: center;
        z-index: 1000;
    }

    .nav-item {
        color: #666;
        font-size: 22px;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
    }

    .nav-item.active {
        color: white;
    }

    .center-btn {
        background: linear-gradient(45deg, #ff0050, #d60044);
        color: white !important;
        border-radius: 12px;
        width: 45px;
        height: 45px;
        box-shadow: 0 5px 15px rgba(255, 0, 80, 0.3);
    }

    /* BOŞ DURUM */
    .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 50px 20px;
        color: #555;
    }

    .btn-start {
        background: white;
        color: black;
        padding: 10px 20px;
        border-radius: 20px;
        text-decoration: none;
        font-weight: bold;
        margin-top: 10px;
        display: inline-block;
    }

    @keyframes pulse {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.5;
        }

        100% {
            opacity: 1;
        }
    }
</style>

<div class="teqlif-os">
    <div class="category-header-wrapper">
        <div class="category-bar">
            <a href="/" class="cat-chip {{ 'active' if current_category == 'Tümü' else '' }}">Tümü</a>
            <a href="/?category=Mezat" class="cat-chip {{ 'active' if current_category == 'Mezat' else '' }}">Mezat</a>
            <a href="/?category=Sohbet"
                class="cat-chip {{ 'active' if current_category == 'Sohbet' else '' }}">Sohbet</a>
            <a href="/?category=Oyun" class="cat-chip {{ 'active' if current_category == 'Oyun' else '' }}">Oyun</a>
            <a href="/?category=Müzik" class="cat-chip {{ 'active' if current_category == 'Müzik' else '' }}">Müzik</a>
        </div>
    </div>

    <div class="grid-container" id="stream-feed">
        {% for stream in streams %}
        <a href="/live?broadcaster={{ stream.username }}" class="grid-card" id="card-{{ stream.username }}">
            <img src="{{ stream.thumbnail }}" class="card-thumb"
                onerror="this.src='https://via.placeholder.com/300x533/222/555?text=LIVE'">
            <div class="live-badge">CANLI</div>
            <div class="card-overlay">
                <h3 class="card-title">{{ stream.stream_title or 'Canlı Yayın' }}</h3>
                <div class="card-user">
                    <img src="/static/thumbnails/thumb_{{ stream.username }}.jpg" class="card-avatar"
                        onerror="this.style.display='none'">
                    {{ stream.username }}
                </div>
            </div>
        </a>
        {% else %}
        <div class="empty-state" id="empty-msg">
            <h2>Henüz yayın yok 😔</h2>
            <p>Sahne senin! İlk yayını başlat.</p>
            <a href="/live?mode=broadcast" class="btn-start">Yayın Başlat</a>
        </div>
        {% endfor %}
    </div>

    <div class="bottom-nav">
        <a href="/" class="nav-item active"><i class="fa-solid fa-house"></i></a>
        <a href="/live?mode=broadcast" class="nav-item center-btn"><i class="fa-solid fa-plus"></i></a>
        <a href="/settings" class="nav-item"><i class="fa-solid fa-user"></i></a>
    </div>
</div>

<script>
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat?stream=home`);

    ws.onmessage = function (event) {
        const data = JSON.parse(event.data);
        const feed = document.getElementById('stream-feed');
        const emptyMsg = document.getElementById('empty-msg');

        if (data.type === 'stream_added') {
            if (emptyMsg) emptyMsg.style.display = 'none';
            if (document.getElementById(`card-${data.username}`)) return;

            const card = document.createElement('a');
            card.href = `/live?broadcaster=${data.username}`;
            card.className = 'grid-card';
            card.id = `card-${data.username}`;
            card.innerHTML = `
                <img src="${data.thumbnail}?t=${Date.now()}" class="card-thumb">
                <div class="live-badge">CANLI</div>
                <div class="card-overlay">
                    <h3 class="card-title">${data.title}</h3>
                    <div class="card-user">
                        <img src="/static/thumbnails/thumb_${data.username}.jpg" class="card-avatar" onerror="this.style.display='none'">
                        ${data.username}
                    </div>
                </div>
            `;
            feed.prepend(card);
        }

        if (data.type === 'stream_removed') {
            const card = document.getElementById(`card-${data.username}`);
            if (card) {
                card.style.transform = "scale(0)";
                setTimeout(() => card.remove(), 200);
            }
        }
    };
</script>
{% endblock %}
