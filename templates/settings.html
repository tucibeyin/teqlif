{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-box" style="width: 400px; text-align: left;">
        <h2 style="text-align: center; margin-bottom: 30px;">Profil Ayarları ⚙️</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="success-msg">
            <i class="fa-solid fa-check"></i> {{ success }}
        </div>
        {% endif %}

        <form action="/settings/update" method="post">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="color: #aaa; font-size: 0.9rem; margin-left: 10px;">E-Posta Adresi
                    (Değiştirilemez)</label>
                <div class="input-group-auth" style="opacity: 0.5;">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" value="{{ user.email }}" disabled style="cursor: not-allowed;">
                </div>
            </div>

            <div class="form-group">
                <label style="color: #fff; font-size: 0.9rem; margin-left: 10px; font-weight: bold;">Kullanıcı
                    Adı</label>
                <div class="input-group-auth">
                    <i class="fa-solid fa-at"></i>
                    <input type="text" name="username" value="{{ user.username if user.username else '' }}"
                        placeholder="örn: tucibeyin" required>
                </div>
                <small style="color: #666; font-size: 0.8rem; margin-left: 10px;">
                    *Bu isim yayınlarda ve sohbette görünecektir.
                </small>
            </div>

            <button type="submit" class="auth-btn" style="margin-top: 20px;">Kaydet</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/" style="color: #888; text-decoration: none; font-size: 0.9rem;">
                <i class="fa-solid fa-arrow-left"></i> Ana Sayfaya Dön
            </a>
        </div>
    </div>
</div>
{% endblock %}
