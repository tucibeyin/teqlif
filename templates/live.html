{% extends "base.html" %}

{% block content %}
<div class="live-container">

    <div class="video-wrapper">
        <div class="live-badge">CANLI</div>
        <video id="video" controls autoplay muted></video>
        <div class="stream-info">
            <h3>Canlı Yayın</h3>
            <p>Teqlif Live Stream</p>
        </div>
    </div>

    <div class="chat-wrapper">
        <div class="chat-header">
            <i class="fa-solid fa-comments"></i> Canlı Sohbet
        </div>

        <div id="chat-box" class="chat-box">
            <div class="chat-message system">
                <span class="chat-text">Sohbete hoş geldiniz! 👋</span>
            </div>
        </div>

        <div class="chat-input-area">
            {% if user %}
            <input type="text" id="chat-input" placeholder="Bir şeyler yaz..." autocomplete="off">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            {% else %}
            <div style="text-align:center; width:100%; font-size:0.9rem; color:#888;">
                Sohbet etmek için <a href="/login" style="color:#f1c40f;">Giriş Yap</a>
            </div>
            {% endif %}
        </div>
    </div>

</div>

<style>
    .live-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        height: calc(100vh - 80px);
        /* Header payı düşünülerek */
    }

    /* Video Alanı */
    .video-wrapper {
        flex: 3;
        /* Geniş alan */
        background: #000;
        border-radius: 15px;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        min-width: 300px;
    }

    video {
        width: 100%;
        height: auto;
        max-height: 80vh;
        background: black;
    }

    .live-badge {
        position: absolute;
        top: 15px;
        left: 15px;
        background: red;
        color: white;
        padding: 5px 10px;
        font-size: 0.8rem;
        font-weight: bold;
        border-radius: 5px;
        z-index: 10;
        animation: pulse 2s infinite;
    }

    .stream-info {
        padding: 15px;
        background: #1a1a1a;
        color: white;
    }

    .stream-info h3 {
        margin: 0;
        font-size: 1.2rem;
    }

    .stream-info p {
        margin: 5px 0 0;
        color: #888;
        font-size: 0.9rem;
    }

    /* Chat Alanı */
    .chat-wrapper {
        flex: 1;
        /* Dar alan */
        background: #1e1e1e;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        min-width: 300px;
        border: 1px solid #333;
        height: 100%;
        max-height: 80vh;
    }

    .chat-header {
        padding: 15px;
        border-bottom: 1px solid #333;
        font-weight: bold;
        background: #252525;
        border-radius: 15px 15px 0 0;
    }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* Mesaj Tasarımları */
    .chat-message {
        font-size: 0.95rem;
        line-height: 1.4;
        word-wrap: break-word;
    }

    .chat-user {
        font-weight: bold;
        margin-right: 5px;
    }

    .chat-text {
        color: #ddd;
    }

    .chat-message.system {
        color: #f1c40f;
        font-style: italic;
        font-size: 0.8rem;
        text-align: center;
        margin-bottom: 10px;
    }

    /* Input Alanı */
    .chat-input-area {
        padding: 15px;
        border-top: 1px solid #333;
        display: flex;
        gap: 10px;
        background: #252525;
        border-radius: 0 0 15px 15px;
    }

    .chat-input-area input {
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #444;
        background: #111;
        color: white;
        outline: none;
    }

    .chat-input-area button {
        padding: 10px 15px;
        background: #3498db;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
    }

    .chat-input-area button:hover {
        background: #2980b9;
    }

    @keyframes pulse {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.5;
        }

        100% {
            opacity: 1;
        }
    }

    /* Mobil Uyumluluk */
    @media (max-width: 768px) {
        .live-container {
            flex-direction: column;
            height: auto;
        }

        .video-wrapper,
        .chat-wrapper {
            flex: none;
            width: 100%;
            height: 500px;
        }
    }
</style>

<script>
    // --- 1. HLS VIDEO OYNATICI ---
    var video = document.getElementById('video');
    var videoSrc = '/static/hls/stream.m3u8';

    if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.play().catch(e => console.log("Otomatik oynatma engellendi, kullanıcı etkileşimi bekleniyor."));
        });
        // Yayın hatası olursa (yayın yoksa) 3 sn sonra tekrar dene
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                setTimeout(() => {
                    hls.loadSource(videoSrc);
                    hls.attachMedia(video);
                }, 3000);
            }
        });
    }
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function () {
            video.play();
        });
    }

    // --- 2. CHAT SİSTEMİ (JSON DESTEKLİ) ---
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);

    const chatBox = document.getElementById("chat-box");
    const chatInput = document.getElementById("chat-input");

    ws.onmessage = function (event) {
        // Backend'den gelen JSON verisini çözüyoruz
        const data = JSON.parse(event.data);

        // Rastgele renk seçimi (İsteğe bağlı, şimdilik sabit mavi yapalım)
        const userColor = "#3498db";

        // HTML Mesajını Oluştur
        const messageHtml = `
            <div class="chat-message">
                <span class="chat-user" style="color: ${userColor};">${data.user}:</span> 
                <span class="chat-text">${data.msg}</span>
            </div>
        `;

        // Kutuya ekle ve en aşağı kaydır
        chatBox.insertAdjacentHTML('beforeend', messageHtml);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    function sendMessage() {
        if (!chatInput) return; // Giriş yapmamışsa input yoktur
        const msg = chatInput.value;
        if (msg.trim() !== "") {
            ws.send(msg); // Sadece metni gönderiyoruz, kimliği backend ekliyor
            chatInput.value = "";
        }
    }

    // Enter tuşu desteği
    if (chatInput) {
        chatInput.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    }
</script>
{% endblock %}
