{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="desktop-center-wrapper">

    <div class="app-frame">

        {% if mode == 'broadcast' %}
        <div class="stream-slide">
            <div class="video-layer">
                <video id="preview" autoplay muted playsinline></video>
            </div>
            <div class="ui-layer">
                <header class="header">
                    <div class="badge live">🔴 CANLI</div>
                    <div class="actions">
                        <button id="btn-start" onclick="startBroadcast()" class="btn start">BAŞLAT</button>
                        <button id="btn-stop" onclick="stopBroadcast()" class="btn stop"
                            style="display:none;">BİTİR</button>
                    </div>
                </header>

                <div class="spacer"></div>

                <footer class="footer">
                    <div id="debug-log" style="display:none;"></div>
                    <div id="chat-box-broadcast" class="chat-list"></div>
                    <div class="input-row">
                        <input type="text" id="chat-input-broadcast" placeholder="Yorum yaz..." autocomplete="off">
                        <button onclick="sendMsg('broadcast')"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </footer>
            </div>
        </div>

        {% else %}
        <div class="feed-container">
            {% for stream in streams %}
            <div class="stream-slide" data-username="{{ stream.username }}">

                <div class="video-layer">
                    <video id="video-{{ stream.username }}" class="feed-video" loop muted playsinline
                        poster="{{ stream.thumbnail }}"></video>

                    <div class="unmute-overlay" onclick="unmuteVideo('{{ stream.username }}')">
                        <i class="fa-solid fa-volume-high"></i> SESİ AÇ
                    </div>
                </div>

                <div class="ui-layer">
                    <header class="header">
                        <div class="badge viewer"><i class="fa-solid fa-user"></i> {{ stream.username }}</div>
                        <a href="/" class="btn close"><i class="fa-solid fa-xmark"></i></a>
                    </header>

                    <div class="spacer"></div>

                    <footer class="footer">
                        <div id="chat-box-{{ stream.username }}" class="chat-list">
                            <div class="chat-msg system"><i>Sohbete bağlanılıyor...</i></div>
                        </div>
                        <div class="input-row">
                            <input type="text" id="chat-input-{{ stream.username }}" placeholder="Yorum ekle..."
                                autocomplete="off">
                            <button onclick="sendMsg('{{ stream.username }}')"><i
                                    class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </footer>
                </div>
            </div>
            {% else %}
            <div class="empty-state">
                <i class="fa-solid fa-satellite-dish"></i>
                <h3>Yayın Yok</h3>
                <a href="/live?mode=broadcast" class="btn start" style="margin-top:20px;">YAYIN AÇ</a>
            </div>
            {% endfor %}
        </div>
        {% endif %}

    </div>
</div>

<style>
    /* --- TEMEL --- */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: #000;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- PC MERKEZLEME --- */
    .desktop-center-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
    }

    /* --- MOBİL ÇERÇEVE --- */
    .app-frame {
        position: relative;
        width: 100%;
        height: 100%;
        background: black;
        max-width: 480px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
    }

    /* --- FEED --- */
    .feed-container {
        width: 100%;
        height: 100%;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
    }

    .stream-slide {
        position: relative;
        width: 100%;
        height: 100%;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        background: #000;
    }

    /* --- VİDEO --- */
    .video-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
    }

    #preview {
        transform: scaleX(-1);
    }

    /* --- ARAYÜZ (CAM EFEKTİ) --- */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
        padding: 15px;
    }

    .header,
    .footer,
    .unmute-overlay {
        pointer-events: auto;
    }

    /* HEADER */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        background: transparent;
        padding-top: 10px;
    }

    .badge {
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: 800;
        font-size: 0.85rem;
        color: white;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .live {
        background: #ff0000;
        animation: pulse 2s infinite;
    }

    .viewer {
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn {
        padding: 8px 20px;
        border-radius: 30px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .start {
        background: white;
        color: black;
    }

    .stop {
        background: #ff0000;
        color: white;
    }

    .close {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        padding: 0;
        font-size: 1.2rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(4px);
    }

    /* FOOTER */
    .spacer {
        flex: 1;
    }

    .footer {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: transparent;
        padding-bottom: 20px;
    }

    .chat-list {
        max-height: 250px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: none;
    }

    .chat-msg {
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 14px;
        border-radius: 16px;
        color: white;
        font-size: 0.95rem;
        width: fit-content;
        max-width: 85%;
        backdrop-filter: blur(3px);
        text-shadow: 0 1px 2px black;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .chat-msg b {
        color: #ffd700;
        margin-right: 5px;
    }

    .system {
        background: transparent;
        border: none;
        font-style: italic;
        opacity: 0.8;
    }

    .input-row {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .input-row input {
        flex: 1;
        padding: 12px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        font-size: 1rem;
        backdrop-filter: blur(5px);
        text-shadow: 0 1px 2px black;
    }

    .input-row button {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        background: #007bff;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .unmute-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 15px 30px;
        border-radius: 50px;
        border: 1px solid white;
        cursor: pointer;
        z-index: 50;
        backdrop-filter: blur(4px);
        font-weight: bold;
    }

    .empty-state {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #888;
        text-align: center;
    }

    .empty-state i {
        font-size: 4rem;
        margin-bottom: 20px;
        color: #444;
    }

    #debug-log {
        font-size: 0.7rem;
        color: #ff6b6b;
        background: rgba(0, 0, 0, 0.8);
        padding: 5px;
        border-radius: 4px;
        margin-bottom: 5px;
    }

    @keyframes pulse {
        0% {
            opacity: 1
        }

        50% {
            opacity: 0.6
        }

        100% {
            opacity: 1
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    // 🔥 GLOBAL DEĞİŞKEN (Sorunu çözen kısım)
    // Artık bağlantı değişkeni her yerden erişilebilir.
    window.CURRENT_SOCKET = null;

    // Debug Log Fonksiyonu
    function logDebug(msg) {
        console.log(msg);
        const debugBox = document.getElementById('debug-log');
        if (debugBox) {
            debugBox.style.display = 'block';
            debugBox.innerHTML = `➤ ${msg}<br>` + debugBox.innerHTML;
        }
    }

    function unmuteVideo(username) {
        const vid = document.getElementById(`video-${username}`);
        if (vid) {
            vid.muted = false; vid.volume = 1.0;
            const overlay = vid.parentElement.querySelector('.unmute-overlay');
            if (overlay) overlay.style.display = 'none';
        }
    }

    // --- YAYINCI KODLARI ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let rec, active = false;

        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(s => { preview.srcObject = s; window.localStream = s; preview.volume = 0; })
            .catch(e => logDebug("Kamera Hatası: " + e));

        window.startBroadcast = function () {
            active = true;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-flex';

            // Yayıncı için Socket Başlat
            connectChat('broadcast');

            // Socket açılınca kaydı başlat
            // (connectChat içindeki socket'i kullanacağız ama burada veri gönderimi için ayrı kanal da açabiliriz,
            // ama chat socketi üzerinden video atmak yavaş olur. O yüzden broadcast socketi ayrı kalmalı.)

            const wsBroadcast = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);
            wsBroadcast.onopen = () => {
                logDebug("Yayın akışı başladı 🚀");
                let opts = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 1500000 };
                if (!MediaRecorder.isTypeSupported(opts.mimeType)) opts = { mimeType: 'video/webm', videoBitsPerSecond: 1500000 };
                try {
                    rec = new MediaRecorder(window.localStream, opts);
                    rec.ondataavailable = e => { if (e.data.size > 0 && wsBroadcast.readyState === 1) wsBroadcast.send(e.data); };
                    rec.start(1000);
                } catch (e) { logDebug("Kayıt Başlatılamadı"); }

                // Thumbnail
                setInterval(() => {
                    if (active && wsBroadcast.readyState === 1) {
                        const c = document.createElement('canvas'); c.width = 640; c.height = 360;
                        c.getContext('2d').drawImage(preview, 0, 0, 640, 360);
                        fetch('/broadcast/thumbnail', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: c.toDataURL('image/jpeg', 0.5), timestamp: Date.now() }) }).catch(e => { });
                    }
                }, 15000);
            };

            window.stopBroadcast = function () {
                active = false; fetch('/broadcast/stop', { method: 'POST' });
                if (rec) rec.stop(); if (wsBroadcast) wsBroadcast.close();
                window.location.href = '/';
            };
        };
    }

    // --- İZLEYİCİ KODLARI ---
    else {
        let observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const slide = entry.target;
                const username = slide.dataset.username;
                const video = document.getElementById(`video-${username}`);

                if (entry.isIntersecting) {
                    loadStream(username, video);
                    connectChat(username); // Odaya bağlan
                } else {
                    if (video) { video.pause(); if (video.hls) video.hls.destroy(); video.src = ""; }
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.stream-slide').forEach(slide => observer.observe(slide));
    }

    function loadStream(username, video) {
        const src = `/static/hls/${username}/stream.m3u8`;
        if (Hls.isSupported()) {
            if (video.hls) video.hls.destroy();
            const hls = new Hls({ enableWorker: true, liveSyncDurationCount: 3, maxBufferLength: 30 });
            video.hls = hls;
            hls.loadSource(src); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(e => console.log("Oto-oynatma engellendi")); });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal && data.type === Hls.ErrorTypes.NETWORK_ERROR) { setTimeout(() => hls.startLoad(), 2000); }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = src; video.addEventListener('loadedmetadata', () => video.play());
        }
    }

    // --- SOHBET MOTORU (DÜZELTİLMİŞ) ---
    function connectChat(targetStreamer) {
        // Eski bağlantıyı kapat
        if (window.CURRENT_SOCKET) {
            window.CURRENT_SOCKET.close();
            window.CURRENT_SOCKET = null;
        }

        let streamName = targetStreamer;

        // Kullanıcı adını belirle
        {% if user and user.username %}
        const myUsername = "{{ user.username }}";
        {% else %}
        const myUsername = "anon";
        {% endif %}

        // Yayıncıysak oda ismi kendi ismimizdir
        if (targetStreamer === 'broadcast') {
            streamName = myUsername;
        }

        logDebug(`🔌 Sohbete bağlanılıyor: ${streamName}`);

        // Yeni bağlantı oluştur
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat?stream=${streamName}`);
        window.CURRENT_SOCKET = ws; // Global değişkene ata

        // Hangi kutuya yazılacak?
        let boxId = targetStreamer === 'broadcast' ? 'chat-box-broadcast' : `chat-box-${targetStreamer}`;

        ws.onopen = () => logDebug(`✅ Sohbet Bağlandı: ${streamName}`);
        ws.onerror = (e) => logDebug(`❌ Sohbet Hatası: ${e}`);

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const box = document.getElementById(boxId);
            if (box) {
                box.insertAdjacentHTML('beforeend', `<div class="chat-msg"><b>${d.user}:</b> ${d.msg}</div>`);
                box.scrollTop = box.scrollHeight;
            }
        };
    }

    // --- MESAJ GÖNDERME FONKSİYONU ---
    window.sendMsg = function (uName) {
        logDebug("📩 Gönder butonuna basıldı: " + uName);

        // Input kutusunu bul
        const inpId = uName === 'broadcast' ? 'chat-input-broadcast' : `chat-input-${uName}`;
        const inp = document.getElementById(inpId);

        if (!inp) {
            logDebug("❌ HATA: Input kutusu bulunamadı ID: " + inpId);
            return;
        }

        const msg = inp.value.trim();
        if (!msg) {
            logDebug("⚠️ Boş mesaj gönderilemez.");
            return;
        }

        // Socket kontrolü
        if (window.CURRENT_SOCKET && window.CURRENT_SOCKET.readyState === 1) {
            window.CURRENT_SOCKET.send(msg);
            logDebug("📤 Sunucuya gönderildi: " + msg);
            inp.value = "";
            inp.focus();
        } else {
            logDebug("❌ HATA: Socket bağlı değil! Durum: " + (window.CURRENT_SOCKET ? window.CURRENT_SOCKET.readyState : "NULL"));
            alert("Bağlantı kopuk, sayfa yenileniyor...");
            // connectChat(uName); // Otomatik tekrar bağlanmayı dene
        }
    }
</script>
{% endblock %}
