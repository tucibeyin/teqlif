{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/css/live.css?v={{ range(1, 10000) | random }}">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* TEMEL YAPI */
    header {
        display: none !important;
    }

    footer {
        position: fixed !important;
        bottom: 0 !important;
        width: 100% !important;
        z-index: 999 !important;
        background: #000 !important;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        height: 60px;
    }

    main {
        height: 100dvh !important;
        width: 100vw !important;
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden !important;
        display: block !important;
    }

    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: -apple-system, sans-serif;
    }

    .teqlif-stage {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
        padding-bottom: 60px;
    }

    .teqlif-stage::-webkit-scrollbar {
        display: none;
    }

    .video-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        scroll-snap-align: start;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #preview {
        transform: scaleX(-1);
    }

    /* UI KATMANI */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding-top: max(20px, env(safe-area-inset-top));
        box-sizing: border-box;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, transparent 20%, transparent 70%, rgba(0, 0, 0, 0.8) 100%);
    }

    .top-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        pointer-events: auto;
        padding: 0 20px;
    }

    .badge {
        background: #ff0050;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: 800;
        font-size: 11px;
    }

    .username-pill {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 13px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .bottom-bar {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        pointer-events: auto;
        padding-bottom: 85px !important;
    }

    .action-btn {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 12px 30px;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        backdrop-filter: blur(10px);
    }

    .btn-red {
        background: #ff3b30;
        border: none;
    }

    /* SOHBET SİSTEMİ */
    .chat-container {
        position: absolute;
        bottom: 140px;
        left: 15px;
        width: 70%;
        height: 200px;
        overflow-y: auto;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        mask-image: linear-gradient(to top, black 80%, transparent 100%);
        -webkit-mask-image: linear-gradient(to top, black 80%, transparent 100%);
    }

    .chat-container::-webkit-scrollbar {
        display: none;
    }

    .chat-msg {
        margin-bottom: 8px;
        font-size: 13px;
        color: white;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        animation: fadeIn 0.3s ease;
    }

    .chat-user {
        font-weight: 800;
        color: #ffeb3b;
        margin-right: 5px;
    }

    .chat-text {
        font-weight: 400;
        color: #fff;
    }

    /* SİSTEM MESAJLARI (HEDİYE VS) */
    .sys-msg {
        color: #00ffea;
        font-weight: bold;
        font-style: italic;
    }

    .chat-input-wrapper {
        position: absolute;
        bottom: 75px;
        left: 0;
        width: 100%;
        display: flex;
        gap: 10px;
        padding: 0 15px;
        box-sizing: border-box;
        pointer-events: auto;
    }

    .chat-input {
        flex: 1;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 10px 15px;
        border-radius: 20px;
        outline: none;
        backdrop-filter: blur(5px);
        font-size: 14px;
    }

    .chat-send {
        background: #ff0050;
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
    }

    /* 🔥 HEDİYE BUTONU 🔥 */
    .gift-btn {
        background: linear-gradient(45deg, #FFD700, #FFA500);
        color: white;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid white;
        box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        cursor: pointer;
        animation: pulse 2s infinite;
        position: absolute;
        right: 15px;
        bottom: 75px;
        pointer-events: auto;
        font-size: 20px;
    }

    /* ANİMASYONLAR */
    @keyframes pulse {
        0% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.1);
        }

        100% {
            transform: scale(1);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes giftPop {
        0% {
            transform: scale(0) rotate(-180deg);
            opacity: 0;
        }

        50% {
            transform: scale(1.5) rotate(0deg);
            opacity: 1;
        }

        100% {
            transform: scale(2) translateY(-100px);
            opacity: 0;
        }
    }

    /* HEDİYE ANİMASYON KATMANI */
    .gift-animation-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        z-index: 50;
    }

    .gift-pop {
        font-size: 100px;
        color: #00e5ff;
        text-shadow: 0 0 20px rgba(0, 229, 255, 0.8);
        animation: giftPop 1.5s forwards;
    }

    /* YAYIN BİTTİ */
    .end-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        z-index: 100;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
    }

    .home-btn {
        background: white;
        color: black;
        padding: 14px 40px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 800;
        margin-top: 20px;
        pointer-events: auto;
    }

    /* PC DÜZENİ */
    @media (min-width: 768px) {
        .video-wrapper {
            width: 100%;
            max-width: 400px;
            height: 90%;
            margin: 20px auto;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }

        .bottom-bar {
            padding-bottom: 20px !important;
        }

        .chat-input-wrapper {
            bottom: 20px;
        }

        .chat-container {
            bottom: 80px;
        }

        .gift-btn {
            bottom: 20px;
            right: 70px;
        }
    }

    .setup-layer {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
    }

    .setup-box {
        width: 80%;
        max-width: 300px;
        text-align: center;
    }

    .inp {
        width: 100%;
        padding: 15px;
        background: #222;
        border: 1px solid #333;
        color: white;
        border-radius: 12px;
        margin-bottom: 10px;
        box-sizing: border-box;
        outline: none;
    }

    .start-btn {
        background: linear-gradient(to right, #ff0050, #d60044);
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 30px;
        font-weight: 800;
        cursor: pointer;
    }
</style>

<div class="teqlif-stage" id="scroll-container">
    {% if mode == 'broadcast' %}
    <div class="video-wrapper">
        <video id="preview" autoplay muted playsinline></video>
        <canvas id="broadcast-canvas" width="720" height="1280" style="display:none;"></canvas>

        <div id="setup-layer" class="setup-layer">
            <div class="setup-box">
                <h2 style="color:white; margin-bottom:20px;">Yayın Başlat</h2>
                <input type="text" id="streamTitle" class="inp" placeholder="Başlık">
                <select id="streamCategory" class="inp">
                    <option>Genel</option>
                </select>
                <button id="btn-start-broadcast" class="start-btn">CANLI YAYIN 📡</button>
            </div>
        </div>

        <div id="live-ui" class="ui-layer" style="display:none;">
            <div class="top-bar">
                <div class="badge">CANLI</div>
                <div class="username-pill"><i class="fa-solid fa-user"></i> {{ user.username }}</div>
            </div>

            <div class="gift-animation-layer" id="gift-layer-{{ user.username }}"></div>
            <div class="chat-container" id="chat-box-{{ user.username }}"></div>

            <div class="chat-input-wrapper" style="bottom: 90px; right: 20px; left: 20px; width: auto;">
                <input type="text" class="chat-input" id="chat-input-{{ user.username }}"
                    placeholder="Yayıncı olarak yaz..." autocomplete="off">
                <button class="chat-send" onclick="sendChat('{{ user.username }}')"><i
                        class="fa-solid fa-paper-plane"></i></button>
            </div>

            <div class="bottom-bar">
                <button onclick="stopBroadcast()" class="action-btn btn-red">BİTİR</button>
            </div>
        </div>
    </div>

    {% else %}
    {% for stream in streams %}
    <div class="video-wrapper feed-item" data-username="{{ stream.username }}">
        <video id="video-{{ stream.username }}" playsinline webkit-playsinline loop
            poster="{{ stream.thumbnail }}"></video>

        <div id="end-screen-{{ stream.username }}" class="end-screen">
            <h2>Yayın Sona Erdi</h2>
            <a href="/" class="home-btn">Ana Sayfa</a>
        </div>

        <div class="ui-layer">
            <div class="top-bar">
                <div class="badge">CANLI</div>
                <div class="username-pill">{{ stream.username }}</div>
            </div>

            <div class="gift-animation-layer" id="gift-layer-{{ stream.username }}"></div>
            <div class="chat-container" id="chat-box-{{ stream.username }}"></div>

            <div class="chat-input-wrapper" style="right: 70px;"> <input type="text" class="chat-input"
                    id="chat-input-{{ stream.username }}" placeholder="Yorum yap..." autocomplete="off">
                <button class="chat-send" onclick="sendChat('{{ stream.username }}')"><i
                        class="fa-solid fa-paper-plane"></i></button>
            </div>

            <button class="gift-btn" onclick="sendGift('{{ stream.username }}')">💎</button>
        </div>
    </div>
    {% else %}
    <div class="video-wrapper" style="background:#111;">
        <div style="color:white; text-align:center;">
            <h2>Aktif yayın yok 😔</h2>
            <a href="/" class="home-btn" style="background:#333; color:white;">Yenile</a>
        </div>
    </div>
    {% endfor %}
    {% endif %}
</div>

<script>
    window.TEQLIF_CONFIG = { mode: "{{ mode }}", username: "{{ user.username if user else 'anon' }}" };
</script>
<script src="/static/js/live.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
