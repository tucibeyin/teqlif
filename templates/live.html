{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="app-container">

    <div class="video-background">
        {% if mode == 'broadcast' %}
        <video id="preview" autoplay muted playsinline></video>
        {% else %}
        <video id="video" autoplay muted playsinline></video>
        <div id="unmute-overlay" onclick="unmuteVideo()">
            <i class="fa-solid fa-volume-high"></i> Sesi Aç
        </div>
        {% endif %}
    </div>

    <div class="ui-layer">

        <div class="header-bar">
            <div class="live-badge" style="display:none;">🔴 CANLI</div>
            <div class="controls-top">
                {% if mode == 'broadcast' %}
                <button id="btn-start" onclick="startBroadcast()" class="btn-action start">
                    <i class="fa-solid fa-signal"></i> YAYINI BAŞLAT
                </button>
                <button id="btn-stop" onclick="stopBroadcast()" class="btn-action stop" style="display:none;">
                    <i class="fa-solid fa-power-off"></i> BİTİR
                </button>
                {% else %}
                <div class="viewer-count"><i class="fa-solid fa-eye"></i> İzleniyor</div>
                {% endif %}
            </div>
        </div>

        <div class="spacer" onclick="toggleUI()"></div>

        <div class="footer-bar">
            <div id="debug-log" style="display:none;"></div>

            <div id="chat-box" class="chat-area">
            </div>

            <div class="input-area">
                <input type="text" id="chat-input" placeholder="Bir şeyler yaz..." autocomplete="off">
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

    </div>
</div>

<style>
    /* --- TEMEL AYARLAR --- */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
    }

    /* Sayfanın kaymasını engelle */
    body,
    html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
    }

    /* ANA KUTU: Ekranın tamamını kaplar */
    .app-container {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        /* Mobil tarayıcıların alt barını hesaba katar */
        height: 100dvh;
        z-index: 10;
    }

    /* --- VİDEO KATMANI --- */
    .video-background {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        /* En altta */
        background: #000;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Ekrana tam otursun, boşluk kalmasın */
        object-position: center;
    }

    /* Yayıncı aynalanmış görsün */
    #preview {
        transform: scaleX(-1);
    }

    /* --- ARAYÜZ KATMANI (UI) --- */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        /* Videonun üstünde */
        display: flex;
        flex-direction: column;
        /* Yukarıdan aşağı diz */
        justify-content: space-between;
        /* Üstü tepeye, altı dibe it */
        pointer-events: none;
        /* Boşluklara tıklayınca arkadaki videoya geçsin */
    }

    /* Tıklanabilir öğeler için pointer'ı geri aç */
    .header-bar,
    .footer-bar,
    #unmute-overlay {
        pointer-events: auto;
    }

    /* --- ÜST KISIM --- */
    .header-bar {
        padding: 20px;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }

    .live-badge {
        background: #e74c3c;
        color: white;
        padding: 5px 15px;
        font-weight: 800;
        border-radius: 5px;
        font-size: 0.9rem;
        animation: pulse 2s infinite;
        letter-spacing: 1px;
        box-shadow: 0 0 15px rgba(231, 76, 60, 0.5);
    }

    .btn-action {
        padding: 10px 25px;
        border-radius: 30px;
        border: none;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .btn-action:hover {
        transform: scale(1.05);
    }

    .start {
        background: white;
        color: black;
    }

    .stop {
        background: #e74c3c;
        color: white;
    }

    .viewer-count {
        background: rgba(0, 0, 0, 0.5);
        color: #ddd;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* --- ORTA BOŞLUK --- */
    .spacer {
        flex: 1;
        /* Kalan tüm alanı kapla */
    }

    /* --- ALT KISIM (CHAT) --- */
    .footer-bar {
        padding: 20px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    /* PC DÜZENLEMESİ: Chat çok yayılmasın */
    @media (min-width: 1024px) {
        .footer-bar {
            width: 450px;
            /* Genişliği sabitle */
            margin-left: 20px;
            /* Sola yasla */
            margin-bottom: 20px;
            border-radius: 15px;
        }
    }

    .chat-area {
        max-height: 250px;
        /* Çok uzamasın */
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: none;
        /* Scrollbar gizle */
        mask-image: linear-gradient(to bottom, transparent, black 20%);
    }

    .chat-message {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(5px);
        padding: 8px 12px;
        border-radius: 12px;
        color: white;
        font-size: 0.95rem;
        width: fit-content;
        text-shadow: 1px 1px 1px rgba(0, 0, 0, 0.8);
    }

    .chat-message b {
        color: #f1c40f;
        margin-right: 5px;
    }

    .input-area {
        display: flex;
        gap: 10px;
        width: 100%;
    }

    .input-area input {
        flex: 1;
        padding: 12px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        transition: 0.3s;
    }

    .input-area input:focus {
        background: rgba(0, 0, 0, 0.8);
        border-color: #3498db;
    }

    .input-area button {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        background: #3498db;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }

    .input-area button:hover {
        transform: scale(1.1);
    }

    /* Sesi Aç Uyarısı */
    #unmute-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px 30px;
        border-radius: 50px;
        border: 2px solid white;
        cursor: pointer;
        z-index: 50;
        display: none;
        font-weight: bold;
        font-size: 1.1rem;
    }

    /* Debug */
    #debug-log {
        color: #ff5555;
        font-size: 0.8rem;
        margin-bottom: 10px;
        background: rgba(0, 0, 0, 0.8);
        padding: 5px;
        border-radius: 5px;
    }

    @keyframes pulse {
        0% {
            opacity: 1
        }

        50% {
            opacity: 0.6
        }

        100% {
            opacity: 1
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    // UI Gizle/Göster (Ekrana tıklayınca temiz görüntü)
    function toggleUI() {
        // İstersen burayı aktif edebilirsin
        // document.querySelector('.footer-bar').style.opacity = ...
    }

    function logError(msg) {
        document.getElementById('debug-log').style.display = 'block';
        document.getElementById('debug-log').innerHTML = `⚠️ ${msg}`;
        console.error(msg);
    }

    function unmuteVideo() {
        const vid = document.getElementById('video');
        if (vid) { vid.muted = false; vid.volume = 1.0; document.getElementById('unmute-overlay').style.display = 'none'; }
    }

    // --- CHAT ---
    function connectChat() {
        let ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);
        const chatBox = document.getElementById("chat-box");
        const chatInput = document.getElementById("chat-input");

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            chatBox.insertAdjacentHTML('beforeend', `<div class="chat-message"><b>${data.user}:</b> ${data.msg}</div>`);
            chatBox.scrollTop = chatBox.scrollHeight;
        };
        ws.onclose = () => setTimeout(connectChat, 3000);

        window.sendMessage = function () {
            if (chatInput.value.trim() && ws.readyState === 1) { ws.send(chatInput.value); chatInput.value = ""; }
        }
    }
    connectChat();

    // --- YAYINCI ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let broadcastWs = null;
        let mediaRecorder = null;
        let isBroadcasting = false;

        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(stream => { preview.srcObject = stream; window.localStream = stream; preview.volume = 0; })
            .catch(err => logError("Kamera Hatası: " + err));

        function setupSocket() {
            if (!isBroadcasting) return;

            broadcastWs = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);

            broadcastWs.onopen = () => {
                document.querySelector('.live-badge').style.display = 'block';

                let options = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 1500000 };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm', videoBitsPerSecond: 1500000 };

                try {
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                    mediaRecorder = new MediaRecorder(window.localStream, options);
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0 && broadcastWs.readyState === 1) broadcastWs.send(e.data);
                    };
                    mediaRecorder.start(1000);
                } catch (e) { logError("Kayıt Hatası: " + e); }
            };

            broadcastWs.onclose = () => {
                if (isBroadcasting) setTimeout(setupSocket, 1000);
            };
        }

        window.startBroadcast = function () {
            isBroadcasting = true;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'flex'; // flex ile ortalar
            setupSocket();

            // Thumbnail
            setInterval(() => {
                if (isBroadcasting && broadcastWs && broadcastWs.readyState === 1) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 640; canvas.height = 360;
                    canvas.getContext('2d').drawImage(preview, 0, 0, canvas.width, canvas.height);
                    const dataURL = canvas.toDataURL('image/jpeg', 0.5);
                    fetch('/broadcast/thumbnail', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: dataURL, timestamp: Date.now() })
                    }).catch(e => { });
                }
            }, 15000);
        }

        window.stopBroadcast = function () {
            isBroadcasting = false;
            fetch('/broadcast/stop', { method: 'POST' });
            if (mediaRecorder) mediaRecorder.stop();
            if (broadcastWs) broadcastWs.close();
            window.location.href = '/';
        }
    }

    // --- İZLEYİCİ ---
    else if (MODE === 'watch') {
        var video = document.getElementById('video');
        var videoSrc = '/static/hls/stream.m3u8';
        video.onvolumechange = () => { if (!video.muted) document.getElementById('unmute-overlay').style.display = 'none'; };

        if (Hls.isSupported()) {
            var hls = new Hls({ enableWorker: true, liveSyncDurationCount: 3, maxBufferLength: 30 });
            hls.loadSource(videoSrc); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                var p = video.play();
                if (p !== undefined) p.then(_ => document.getElementById('unmute-overlay').style.display = 'block').catch(e => { });
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else hls.destroy();
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc; video.addEventListener('loadedmetadata', () => video.play());
        }
    }
</script>
{% endblock %}
