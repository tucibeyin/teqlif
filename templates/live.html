{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="app-layout">

    {% if mode == 'broadcast' %}
    <div class="screen">

        <video id="preview" class="bg-video" autoplay muted playsinline></video>

        <div class="ui-layer">

            <div class="header-bar">
                <div class="left-side">
                    <span class="live-tag">🔴 CANLI</span>
                </div>
                <div class="right-side">
                    <button id="btn-start" onclick="startBroadcast()" class="btn start-btn">YAYINA BAŞLA</button>
                    <button id="btn-stop" onclick="stopBroadcast()" class="btn stop-btn"
                        style="display:none;">BİTİR</button>
                </div>
            </div>

            <div class="footer-bar">
                <div id="chat-box-broadcast" class="chat-list"></div>
                <div class="input-wrap">
                    <input type="text" id="chat-input-broadcast" placeholder="Mesaj..." autocomplete="off">
                    <button onclick="sendMsg('broadcast')">YAZ</button>
                </div>
            </div>

        </div>
    </div>

    {% else %}
    <div class="feed-container">
        {% for stream in streams %}
        <div class="screen stream-item" data-username="{{ stream.username }}">

            <video id="video-{{ stream.username }}" class="bg-video" loop muted playsinline
                poster="{{ stream.thumbnail }}"></video>

            <div class="mute-toggle" onclick="unmuteVideo('{{ stream.username }}')">
                <i class="fa-solid fa-volume-xmark"></i> SESİ AÇ
            </div>

            <div class="ui-layer">
                <div class="header-bar">
                    <div class="user-pill">
                        <i class="fa-solid fa-user"></i> {{ stream.username }}
                    </div>
                    <a href="/" class="close-btn"><i class="fa-solid fa-xmark"></i></a>
                </div>

                <div class="footer-bar">
                    <div id="chat-box-{{ stream.username }}" class="chat-list">
                        <div class="msg system"><i>Sohbet Bağlandı</i></div>
                    </div>
                    <div class="input-wrap">
                        <input type="text" id="chat-input-{{ stream.username }}" placeholder="Yorum..."
                            autocomplete="off">
                        <button onclick="sendMsg('{{ stream.username }}')"><i
                                class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div class="empty">
            <h3>Yayın Yok</h3>
            <a href="/live?mode=broadcast" class="btn start-btn">YAYIN AÇ</a>
        </div>
        {% endfor %}
    </div>
    {% endif %}

</div>

<style>
    /* TEMEL AYARLAR */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background: #000;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        font-family: sans-serif;
    }

    /* LAYOUT */
    .app-layout {
        width: 100%;
        height: 100%;
        max-width: 500px;
        margin: 0 auto;
        position: relative;
        background: black;
    }

    .feed-container {
        width: 100%;
        height: 100%;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
    }

    .screen {
        position: relative;
        width: 100%;
        height: 100%;
        scroll-snap-align: start;
        overflow: hidden;
    }

    /* VIDEO (LEKESİZ) */
    .bg-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
        /* FİLTRE YOK */
        filter: none !important;
        opacity: 1 !important;
    }

    #preview {
        transform: scaleX(-1);
    }

    /* ARAYÜZ (ÜST KATMAN) */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
        /* Boşluklara tıklayınca arkaya geçsin */

        /* GÜVENLİ ALANLAR (Çentik vb.) */
        padding-top: max(15px, env(safe-area-inset-top));
        padding-bottom: max(20px, env(safe-area-inset-bottom));
        padding-left: 15px;
        padding-right: 15px;
    }

    /* --- ÜST BAR (HİZALAMA DÜZELTİLDİ) --- */
    .header-bar {
        pointer-events: auto;
        width: 100%;
        display: flex;
        justify-content: space-between;
        /* Biri sağa, biri sola */
        align-items: flex-start;
        /* Yukarı hizala */
        background: transparent !important;
        /* ARKA PLAN YOK */
    }

    /* Sol ve Sağ kutular (Çakışmayı önler) */
    .left-side {
        display: flex;
        align-items: center;
    }

    .right-side {
        display: flex;
        align-items: center;
    }

    /* BUTONLAR & ETİKETLER */
    .live-tag {
        background: red;
        color: white;
        padding: 8px 12px;
        border-radius: 8px;
        font-weight: 900;
        font-size: 14px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .btn {
        border: none;
        padding: 10px 20px;
        border-radius: 30px;
        font-weight: 800;
        cursor: pointer;
        font-size: 14px;
        color: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
    }

    .start-btn {
        background: #2ecc71;
        color: white;
    }

    /* Yeşil buton daha iyi görünür */
    .stop-btn {
        background: #e74c3c;
    }

    .user-pill {
        background: rgba(0, 0, 0, 0.4);
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-weight: bold;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .close-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.4);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* --- ALT BAR (CHAT) --- */
    .footer-bar {
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: transparent !important;
        /* ARKA PLAN YOK */
    }

    .chat-list {
        max-height: 250px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 6px;
        scrollbar-width: none;
    }

    /* MESAJ BALONCUĞU (Sadece yazı arkası) */
    .msg {
        background: rgba(0, 0, 0, 0.4);
        /* Şeffaf siyah */
        color: white;
        padding: 6px 12px;
        border-radius: 10px;
        width: fit-content;
        max-width: 85%;
        font-size: 14px;
        text-shadow: 1px 1px 2px black;
        /* Gölgeyle okunurluk */
    }

    .msg b {
        color: #f1c40f;
        margin-right: 5px;
    }

    .system {
        background: transparent;
        color: #eee;
        font-style: italic;
        text-shadow: 1px 1px 2px black;
    }

    /* INPUT */
    .input-wrap {
        display: flex;
        gap: 8px;
    }

    .input-wrap input {
        flex: 1;
        padding: 10px 15px;
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(0, 0, 0, 0.3);
        color: white;
        font-size: 14px;
        text-shadow: 1px 1px 1px black;
    }

    .input-wrap button {
        background: #3498db;
        color: white;
        border: none;
        padding: 0 15px;
        border-radius: 25px;
        font-weight: bold;
    }

    .mute-toggle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 15px 30px;
        border-radius: 30px;
        z-index: 500;
        cursor: pointer;
        border: 2px solid white;
        pointer-events: auto;
    }

    .empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: white;
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    window.CURRENT_SOCKET = null;
    window.CURRENT_BOX_ID = null;

    function unmuteVideo(username) {
        const vid = document.getElementById(`video-${username}`);
        if (vid) {
            vid.muted = false; vid.volume = 1.0;
            vid.parentElement.querySelector('.mute-toggle').style.display = 'none';
        }
    }

    // --- YAYINCI ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let rec, active = false;

        // Optimize (480p)
        const constraints = { video: { width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 20 } }, audio: true };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(s => { preview.srcObject = s; window.localStream = s; preview.volume = 0; })
            .catch(e => console.log("Kamera Hatası"));

        window.startBroadcast = function () {
            active = true;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';

            connectChat('broadcast');

            const ws = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);
            ws.onopen = () => {
                let opts = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 800000 };
                if (!MediaRecorder.isTypeSupported(opts.mimeType)) opts = { mimeType: 'video/webm', videoBitsPerSecond: 800000 };
                rec = new MediaRecorder(window.localStream, opts);
                rec.ondataavailable = e => { if (e.data.size > 0 && ws.readyState === 1) ws.send(e.data); };
                rec.start(1000);

                setInterval(() => {
                    if (active && ws.readyState === 1) {
                        const c = document.createElement('canvas'); c.width = 640; c.height = 360;
                        c.getContext('2d').drawImage(preview, 0, 0, 640, 360);
                        fetch('/broadcast/thumbnail', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: c.toDataURL('image/jpeg', 0.5), timestamp: Date.now() }) }).catch(e => { });
                    }
                }, 15000);
            };
            window.stopBroadcast = function () { active = false; fetch('/broadcast/stop', { method: 'POST' }); if (rec) rec.stop(); window.location.href = '/'; };
        };
    }

    // --- İZLEYİCİ ---
    else {
        let observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const u = entry.target.dataset.username;
                    const v = document.getElementById(`video-${u}`);

                    const src = `/static/hls/${u}/stream.m3u8`;
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(src); hls.attachMedia(v);
                        hls.on(Hls.Events.MANIFEST_PARSED, () => v.play().catch(e => { }));
                        hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) setTimeout(() => hls.startLoad(), 2000); });
                        v.hls = hls;
                    } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
                        v.src = src; v.addEventListener('loadedmetadata', () => v.play());
                    }
                    connectChat(u);
                } else {
                    const v = entry.target.querySelector('video');
                    if (v) { v.pause(); if (v.hls) v.hls.destroy(); v.src = ""; }
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.stream-item').forEach(s => observer.observe(s));
    }

    // --- CHAT ---
    function connectChat(targetStreamer) {
        if (window.CURRENT_SOCKET) window.CURRENT_SOCKET.close();

        let streamName = targetStreamer;
        {% if user and user.username %} const myUsername = "{{ user.username }}";
        {% else %} const myUsername = "anon"; {% endif %}

        if (targetStreamer === 'broadcast') streamName = myUsername;

        window.CURRENT_BOX_ID = targetStreamer === 'broadcast' ? 'chat-box-broadcast' : `chat-box-${targetStreamer}`;

        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat?stream=${streamName}`);
        window.CURRENT_SOCKET = ws;

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const box = document.getElementById(window.CURRENT_BOX_ID);
            if (box) {
                box.insertAdjacentHTML('beforeend', `<div class="msg"><b>${d.user}:</b> ${d.msg}</div>`);
                box.scrollTop = box.scrollHeight;
            }
        };
    }

    window.sendMsg = function (uName) {
        const inpId = uName === 'broadcast' ? 'chat-input-broadcast' : `chat-input-${uName}`;
        const inp = document.getElementById(inpId);
        if (inp && inp.value.trim() && window.CURRENT_SOCKET && window.CURRENT_SOCKET.readyState === 1) {
            window.CURRENT_SOCKET.send(inp.value);
            inp.value = "";
            inp.focus();
        }
    }
</script>
{% endblock %}
