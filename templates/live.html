{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/css/live.css?v={{ range(1, 10000) | random }}">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* GLOBAL */
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: -apple-system, sans-serif;
    }

    /* REELS SCROLL CONTAINER */
    .teqlif-stage {
        position: relative;
        width: 100%;
        height: 100dvh;
        background: #000;

        /* 🔥 INSTAGRAM SCROLL MANTIĞI 🔥 */
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        /* Dikeyde kilitlen */
        scroll-behavior: smooth;
    }

    /* Kaydırma çubuğunu gizle */
    .teqlif-stage::-webkit-scrollbar {
        display: none;
    }

    .teqlif-stage {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }

    /* TEK VİDEO KUTUSU */
    .video-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;

        /* EKRANA KİLİTLE */
        scroll-snap-align: start;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #preview {
        transform: scaleX(-1);
    }

    /* UI & DİĞERLERİ */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom)) 20px;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent, rgba(0, 0, 0, 0.8));
    }

    .top-bar {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .badge {
        background: #ff0050;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: 800;
        font-size: 11px;
    }

    .username-pill {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 13px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .bottom-bar {
        width: 100%;
        display: flex;
        justify-content: center;
        pointer-events: auto;
    }

    .action-btn {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 30px;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        backdrop-filter: blur(5px);
    }

    .btn-red {
        background: #ff3b30;
        border: none;
    }

    /* YAYIN BİTTİ EKRANI */
    .end-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 100;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
    }

    .home-btn {
        background: white;
        color: black;
        padding: 14px 40px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 800;
        margin-top: 20px;
        pointer-events: auto;
    }

    /* PC DÜZENİ */
    @media (min-width: 768px) {
        .video-wrapper {
            width: 100%;
            max-width: 450px;
            height: 95vh;
            margin: 2.5vh auto;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }
    }

    /* SETUP (YAYINCI) */
    .setup-layer {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
    }

    .setup-box {
        width: 80%;
        max-width: 300px;
        text-align: center;
    }

    .inp {
        width: 100%;
        padding: 15px;
        background: #222;
        border: 1px solid #333;
        color: white;
        border-radius: 12px;
        margin-bottom: 10px;
        box-sizing: border-box;
        outline: none;
    }

    .start-btn {
        background: linear-gradient(to right, #ff0050, #d60044);
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 30px;
        font-weight: 800;
        cursor: pointer;
    }
</style>

<div class="teqlif-stage" id="scroll-container">
    {% if mode == 'broadcast' %}
    <div class="video-wrapper">
        <video id="preview" autoplay muted playsinline></video>
        <canvas id="broadcast-canvas" width="720" height="1280" style="display:none;"></canvas>

        <div id="setup-layer" class="setup-layer">
            <div class="setup-box">
                <h2 style="color:white; margin-bottom:20px;">Yayın Başlat</h2>
                <input type="text" id="streamTitle" class="inp" placeholder="Başlık">
                <select id="streamCategory" class="inp">
                    <option>Genel</option>
                </select>
                <button id="btn-start-broadcast" class="start-btn">CANLI YAYIN 📡</button>
            </div>
        </div>

        <div id="live-ui" class="ui-layer" style="display:none;">
            <div class="top-bar">
                <div class="badge">CANLI</div>
                <div class="username-pill"><i class="fa-solid fa-user"></i> {{ user.username }}</div>
            </div>
            <div class="bottom-bar">
                <button onclick="stopBroadcast()" class="action-btn btn-red">BİTİR</button>
            </div>
        </div>
    </div>

    {% else %}
    {% for stream in streams %}
    <div class="video-wrapper feed-item" data-username="{{ stream.username }}">
        <video id="video-{{ stream.username }}" playsinline webkit-playsinline loop
            poster="{{ stream.thumbnail }}"></video>

        <div id="end-screen-{{ stream.username }}" class="end-screen">
            <h2>Yayın Sona Erdi</h2>
            <a href="/" class="home-btn">Ana Sayfa</a>
        </div>

        <div class="ui-layer">
            <div class="top-bar">
                <div class="badge">CANLI</div>
                <div class="username-pill">{{ stream.username }}</div>
            </div>
            <div class="bottom-bar"></div>
        </div>
    </div>
    {% else %}
    <div class="video-wrapper" style="background:#111;">
        <div style="color:white; text-align:center;">
            <h2>Şu an canlı yayın yok 😔</h2>
            <a href="/" style="color:#aaa; margin-top:20px; display:block;">Yenile</a>
        </div>
    </div>
    {% endfor %}
    {% endif %}
</div>

<script>
    window.TEQLIF_CONFIG = { mode: "{{ mode }}", username: "{{ user.username if user else 'anon' }}" };
</script>
<script src="/static/js/live.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
