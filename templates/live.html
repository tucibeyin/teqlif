{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div id="visual-debug"
    style="position:fixed; top:0; left:0; width:100%; background:rgba(255,0,0,0.8); color:white; font-size:12px; z-index:99999; display:none; padding:5px;">
</div>

<div class="desktop-center-wrapper">
    <div class="app-frame">

        {% if mode == 'broadcast' %}
        <div class="stream-slide">
            <div class="video-layer">
                <video id="preview" autoplay muted playsinline></video>
            </div>
            <div class="ui-layer">
                <header class="header">
                    <div class="badge live">🔴 CANLI</div>
                    <div class="actions">
                        <button id="btn-start" onclick="startBroadcast()" class="btn start">BAŞLAT</button>
                        <button id="btn-stop" onclick="stopBroadcast()" class="btn stop"
                            style="display:none;">BİTİR</button>
                    </div>
                </header>
                <div class="spacer"></div>
                <footer class="footer">
                    <div id="chat-box-broadcast" class="chat-list"></div>
                    <div class="input-row">
                        <input type="text" id="chat-input-broadcast" placeholder="Yayıncı sohbeti..."
                            autocomplete="off">
                        <button onclick="sendMsg('broadcast')"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </footer>
            </div>
        </div>

        {% else %}
        <div class="feed-container">
            {% for stream in streams %}
            <div class="stream-slide" data-username="{{ stream.username }}">
                <div class="video-layer">
                    <video id="video-{{ stream.username }}" class="feed-video" loop muted playsinline
                        poster="{{ stream.thumbnail }}"></video>
                    <div class="unmute-overlay" onclick="unmuteVideo('{{ stream.username }}')">
                        <i class="fa-solid fa-volume-high"></i> SESİ AÇ
                    </div>
                </div>
                <div class="ui-layer">
                    <header class="header">
                        <div class="badge viewer"><i class="fa-solid fa-user"></i> {{ stream.username }}</div>
                        <a href="/" class="btn close"><i class="fa-solid fa-xmark"></i></a>
                    </header>
                    <div class="spacer"></div>
                    <footer class="footer">
                        <div id="chat-box-{{ stream.username }}" class="chat-list">
                            <div class="chat-msg system"><i>Sohbet yükleniyor...</i></div>
                        </div>
                        <div class="input-row">
                            <input type="text" id="chat-input-{{ stream.username }}" placeholder="Yorum yap..."
                                autocomplete="off">
                            <button onclick="sendMsg('{{ stream.username }}')"><i
                                    class="fa-solid fa-paper-plane"></i></button>
                        </div>
                    </footer>
                </div>
            </div>
            {% else %}
            <div class="empty-state">
                <i class="fa-solid fa-satellite-dish"></i>
                <h3>Yayın Yok</h3>
                <a href="/live?mode=broadcast" class="btn start" style="margin-top:20px;">YAYIN AÇ</a>
            </div>
            {% endfor %}
        </div>
        {% endif %}

    </div>
</div>

<style>
    /* CSS AYARLARI */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
    }

    body {
        background: #000;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: sans-serif;
    }

    .desktop-center-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
    }

    .app-frame {
        position: relative;
        width: 100%;
        height: 100%;
        background: black;
        max-width: 480px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    .feed-container {
        width: 100%;
        height: 100%;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        scroll-behavior: smooth;
    }

    .stream-slide {
        position: relative;
        width: 100%;
        height: 100%;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        background: #000;
    }

    .video-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #preview {
        transform: scaleX(-1);
    }

    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
        padding: 15px;
    }

    .header,
    .footer,
    .unmute-overlay {
        pointer-events: auto;
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding-top: 10px;
    }

    .badge {
        padding: 6px 12px;
        border-radius: 20px;
        font-weight: 800;
        color: white;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    .live {
        background: #ff0000;
        animation: pulse 2s infinite;
    }

    .viewer {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .spacer {
        flex: 1;
    }

    .footer {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding-bottom: 20px;
    }

    /* CHAT KUTUSU (GÖRÜNÜRLÜK GARANTİSİ) */
    .chat-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 250px;
        min-height: 100px;
        /* Mutlaka yer kaplasın */
        overflow-y: auto;
        justify-content: flex-end;
        /* Mesajları alttan başlat */
        text-shadow: 1px 1px 1px black;
        /* Kaydırma çubuğunu gizle */
        scrollbar-width: none;
    }

    .chat-msg {
        background: rgba(0, 0, 0, 0.4);
        padding: 8px 12px;
        border-radius: 12px;
        color: white;
        font-size: 0.9rem;
        width: fit-content;
        max-width: 90%;
        backdrop-filter: blur(2px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        animation: fadeIn 0.3s ease;
    }

    .chat-msg b {
        color: #f1c40f;
        margin-right: 5px;
    }

    .system {
        background: transparent;
        border: none;
        font-style: italic;
        opacity: 0.8;
        color: #aaa;
    }

    .input-row {
        display: flex;
        gap: 10px;
    }

    .input-row input {
        flex: 1;
        padding: 12px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(0, 0, 0, 0.5);
        color: white;
    }

    .input-row button {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        background: #3498db;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn {
        padding: 8px 16px;
        border-radius: 20px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        color: white;
    }

    .start {
        background: white;
        color: black;
    }

    .stop {
        background: red;
    }

    .close {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        text-decoration: none;
    }

    .unmute-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px 30px;
        border-radius: 50px;
        border: 2px solid white;
        cursor: pointer;
        z-index: 50;
    }

    @keyframes pulse {
        0% {
            opacity: 1
        }

        50% {
            opacity: 0.6
        }

        100% {
            opacity: 1
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    // 🔥 GLOBAL DEĞİŞKENLER
    window.CURRENT_SOCKET = null;
    window.CURRENT_BOX_ID = null;

    // Hata Ayıklama (Ekrana basar)
    function debugVis(msg) {
        console.log(msg);
        // const d = document.getElementById('visual-debug');
        // if(d) { d.style.display='block'; d.innerHTML = msg + "<br>" + d.innerHTML; }
    }

    function unmuteVideo(username) {
        const vid = document.getElementById(`video-${username}`);
        if (vid) {
            vid.muted = false; vid.volume = 1.0;
            vid.parentElement.querySelector('.unmute-overlay').style.display = 'none';
        }
    }

    // --- YAYINCI ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let rec, active = false;

        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(s => { preview.srcObject = s; window.localStream = s; preview.volume = 0; })
            .catch(e => debugVis("Kamera Hatası: " + e));

        window.startBroadcast = function () {
            active = true;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-flex';

            // Sohbeti başlat
            connectChat('broadcast');

            const ws = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);
            ws.onopen = () => {
                debugVis("🎥 Yayın başladı");
                let opts = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 1500000 };
                if (!MediaRecorder.isTypeSupported(opts.mimeType)) opts = { mimeType: 'video/webm', videoBitsPerSecond: 1500000 };
                try {
                    rec = new MediaRecorder(window.localStream, opts);
                    rec.ondataavailable = e => { if (e.data.size > 0 && ws.readyState === 1) ws.send(e.data); };
                    rec.start(1000);
                } catch (e) { debugVis("Kayıt Hatası"); }

                setInterval(() => {
                    if (active && ws.readyState === 1) {
                        const c = document.createElement('canvas'); c.width = 640; c.height = 360;
                        c.getContext('2d').drawImage(preview, 0, 0, 640, 360);
                        fetch('/broadcast/thumbnail', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: c.toDataURL('image/jpeg', 0.5), timestamp: Date.now() }) }).catch(e => { });
                    }
                }, 15000);
            };
            window.stopBroadcast = function () { active = false; fetch('/broadcast/stop', { method: 'POST' }); if (rec) rec.stop(); window.location.href = '/'; };
        };
    }

    // --- İZLEYİCİ ---
    else {
        let observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const slide = entry.target;
                const username = slide.dataset.username;
                const video = document.getElementById(`video-${username}`);
                if (entry.isIntersecting) {
                    loadStream(username, video);
                    connectChat(username);
                } else {
                    if (video) { video.pause(); if (video.hls) video.hls.destroy(); video.src = ""; }
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.stream-slide').forEach(slide => observer.observe(slide));
    }

    function loadStream(username, video) {
        const src = `/static/hls/${username}/stream.m3u8`;
        if (Hls.isSupported()) {
            if (video.hls) video.hls.destroy();
            const hls = new Hls({ enableWorker: true, liveSyncDurationCount: 3, maxBufferLength: 30 });
            video.hls = hls;
            hls.loadSource(src); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => { }));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = src; video.addEventListener('loadedmetadata', () => video.play());
        }
    }

    // --- CHAT MOTORU (DÜZELTİLDİ) ---
    function connectChat(targetStreamer) {
        if (window.CURRENT_SOCKET) { window.CURRENT_SOCKET.close(); }

        let streamName = targetStreamer;

        // Kullanıcı Adını Al
        {% if user and user.username %}
        const myUsername = "{{ user.username }}";
        {% else %}
        const myUsername = "anon";
        {% endif %}

        if (targetStreamer === 'broadcast') { streamName = myUsername; }

        debugVis(`🔌 Sohbete bağlanılıyor: ${streamName}`);

        // HEDEF KUTUYU BELİRLE VE KAYDET
        window.CURRENT_BOX_ID = targetStreamer === 'broadcast' ? 'chat-box-broadcast' : `chat-box-${targetStreamer}`;

        const ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat?stream=${streamName}`);
        window.CURRENT_SOCKET = ws;

        ws.onopen = () => {
            addSystemMsg("✅ Sohbet Bağlandı");
        };

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            const box = document.getElementById(window.CURRENT_BOX_ID);

            if (box) {
                // Mesajı Ekle
                const div = document.createElement("div");
                div.className = "chat-msg";
                div.innerHTML = `<b>${d.user}:</b> ${d.msg}`;
                box.appendChild(div);

                // En alta kaydır
                box.scrollTop = box.scrollHeight;
            } else {
                console.error("❌ Kutu bulunamadı ID:", window.CURRENT_BOX_ID);
            }
        };
    }

    function addSystemMsg(msg) {
        const box = document.getElementById(window.CURRENT_BOX_ID);
        if (box) {
            box.insertAdjacentHTML('beforeend', `<div class="chat-msg system" style="color:#0f0;">${msg}</div>`);
            box.scrollTop = box.scrollHeight;
        }
    }

    window.sendMsg = function (uName) {
        const inpId = uName === 'broadcast' ? 'chat-input-broadcast' : `chat-input-${uName}`;
        const inp = document.getElementById(inpId);
        if (inp && inp.value.trim() && window.CURRENT_SOCKET && window.CURRENT_SOCKET.readyState === 1) {
            window.CURRENT_SOCKET.send(inp.value);
            inp.value = "";
            inp.focus();
        }
    }
</script>
{% endblock %}
