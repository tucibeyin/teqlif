{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="insta-layout">
    <div class="video-layer">
        {% if mode == 'broadcast' %}
        <video id="preview" autoplay muted playsinline style="transform: scaleX(-1);"></video>
        {% else %}
        <video id="video" autoplay playsinline controls></video>
        {% endif %}
    </div>

    <div class="top-overlay">
        <div class="live-tag" style="display:none;">CANLI</div>
        <div class="right-controls">
            {% if mode == 'broadcast' %}
            <button id="btn-start" onclick="startBroadcast()" class="btn-insta start">YAYINLA</button>
            <button id="btn-stop" onclick="stopBroadcast()" class="btn-insta stop" style="display:none;">BİTİR</button>
            {% endif %}
        </div>
    </div>

    <div class="bottom-overlay">
        <div id="debug-log"
            style="color: #ff5555; background:rgba(0,0,0,0.8); padding:5px; font-size:0.8rem; border-radius:5px; margin-bottom:5px; display:none;">
        </div>

        <div id="chat-box" class="chat-flow"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Yorum yap..." autocomplete="off">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<style>
    * {
        box-sizing: border-box;
    }

    .insta-layout {
        position: relative;
        width: 100%;
        max-width: 480px;
        height: calc(100vh - 90px);
        margin: 0 auto;
        background: #000;
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid #333;
    }

    .video-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        background: #000;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .top-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 20;
        padding: 15px;
        display: flex;
        justify-content: space-between;
    }

    .live-tag {
        background: red;
        color: white;
        padding: 5px;
        font-weight: bold;
        font-size: 0.8rem;
        border-radius: 4px;
    }

    .bottom-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 20;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        max-height: 60%;
    }

    .chat-flow {
        overflow-y: auto;
        margin-bottom: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        scrollbar-width: none;
    }

    .chat-message {
        color: white;
        font-size: 0.9rem;
        text-shadow: 1px 1px 1px black;
    }

    .chat-input-row {
        display: flex;
        gap: 8px;
    }

    .chat-input-row input {
        flex: 1;
        min-width: 0;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        padding: 10px;
        border-radius: 20px;
        color: white;
        outline: none;
    }

    .chat-input-row button {
        background: #3498db;
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: white;
        cursor: pointer;
    }

    .btn-insta {
        padding: 8px 20px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
    }

    .start {
        background: white;
        color: black;
    }

    .stop {
        background: red;
        color: white;
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    // --- CHAT ---
    const chatWs = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);
    const chatBox = document.getElementById("chat-box");
    const chatInput = document.getElementById("chat-input");

    chatWs.onmessage = (e) => {
        const data = JSON.parse(e.data);
        chatBox.insertAdjacentHTML('beforeend', `<div class="chat-message"><b>${data.user}:</b> ${data.msg}</div>`);
        chatBox.scrollTop = chatBox.scrollHeight;
    };
    function sendMessage() { if (chatInput.value.trim()) { chatWs.send(chatInput.value); chatInput.value = ""; } }

    // --- YAYINCI ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let broadcastWs, mediaRecorder;

        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(stream => { preview.srcObject = stream; window.localStream = stream; preview.volume = 0; })
            .catch(err => console.log("Kamera Hatası: " + err));

        window.startBroadcast = function () {
            broadcastWs = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);

            broadcastWs.onopen = () => {
                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('btn-stop').style.display = 'inline-block';
                document.querySelector('.live-tag').style.display = 'block';

                // 1. KAYIT
                let options = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 2500000 };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm', videoBitsPerSecond: 2500000 };
                try {
                    mediaRecorder = new MediaRecorder(window.localStream, options);
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0 && broadcastWs.readyState === 1) broadcastWs.send(e.data); };
                    mediaRecorder.start(250);
                } catch (e) { alert("Yayın hatası: " + e); }

                // 2. FOTOĞRAF ÇEK VE GÖNDER (10 Saniyede bir) 📸
                setInterval(() => {
                    if (broadcastWs.readyState === 1) {
                        const canvas = document.createElement('canvas');
                        canvas.width = 640; canvas.height = 360;
                        canvas.getContext('2d').drawImage(preview, 0, 0, canvas.width, canvas.height);
                        const dataURL = canvas.toDataURL('image/jpeg', 0.6);

                        fetch('/broadcast/thumbnail', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: dataURL, timestamp: Date.now() })
                        });
                    }
                }, 10000);
            };
        }

        window.stopBroadcast = function () {
            fetch('/broadcast/stop', { method: 'POST' });
            if (mediaRecorder) mediaRecorder.stop();
            if (broadcastWs) broadcastWs.close();
            window.location.href = '/';
        }
    }
    // --- İZLEYİCİ ---
    else if (MODE === 'watch') {
        var video = document.getElementById('video');
        var videoSrc = '/static/hls/stream.m3u8';
        if (Hls.isSupported()) {
            var hls = new Hls({ lowLatencyMode: true, liveSyncDurationCount: 1 });
            hls.loadSource(videoSrc); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(console.log));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc; video.addEventListener('loadedmetadata', () => video.play());
        }
    }
</script>

{% endblock %}
