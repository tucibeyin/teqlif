{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="insta-layout">
    <div class="video-layer">
        {% if mode == 'broadcast' %}
        <video id="preview" autoplay muted playsinline style="transform: scaleX(-1);"></video>
        {% else %}
        <video id="video" autoplay muted playsinline controls></video>

        <div id="unmute-overlay" onclick="unmuteVideo()">
            <i class="fa-solid fa-volume-xmark"></i> Sesi Açmak İçin Dokun
        </div>
        {% endif %}
    </div>

    <div class="top-overlay">
        <div class="live-tag" style="display:none;">CANLI</div>
        <div class="right-controls">
            {% if mode == 'broadcast' %}
            <button id="btn-start" onclick="startBroadcast()" class="btn-insta start">YAYINLA</button>
            <button id="btn-stop" onclick="stopBroadcast()" class="btn-insta stop" style="display:none;">BİTİR</button>
            {% endif %}
        </div>
    </div>

    <div class="bottom-overlay">
        <div id="debug-log" style="display:none;"></div>

        <div id="chat-box" class="chat-flow"></div>
        <div class="chat-input-row">
            <input type="text" id="chat-input" placeholder="Yorum yap..." autocomplete="off">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<style>
    /* SIFIRLAMA & TEMEL AYARLAR */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
    }

    body,
    html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* Sayfa kaydırmayı engelle */
        background: #000;
    }

    /* ANA KONTEYNER (TÜM EKRANI KAPLAR) */
    .insta-layout {
        position: fixed;
        /* Ekrana çivile */
        top: 0;
        left: 0;
        width: 100vw;
        /* Ekran genişliği */
        height: 100vh;
        /* Ekran yüksekliği */
        /* Mobilde adres çubuğu sorununu çözer: */
        height: 100dvh;
        z-index: 10;
        background: #000;
    }

    /* VİDEO KATMANI */
    .video-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    /* VIDEO ELEMENTİ (SİHİR BURADA ✨) */
    video {
        width: 100%;
        height: 100%;
        /* COVER: En-Boy oranını koruyarak boşluk bırakmadan doldurur */
        object-fit: cover;
        object-position: center;
        /* Ortadan odakla */
    }

    /* ÜST KONTROLLER (YÜZEN KATMAN) */
    .top-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6) 0%, transparent 100%);
        z-index: 20;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .live-tag {
        background: #e74c3c;
        color: white;
        padding: 5px 12px;
        font-weight: 800;
        font-size: 0.85rem;
        border-radius: 6px;
        box-shadow: 0 0 15px rgba(231, 76, 60, 0.6);
        animation: pulse 2s infinite;
        letter-spacing: 1px;
    }

    /* ALT KISIM (SOHBET & GİRİŞ) */
    .bottom-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 20;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 10%, rgba(0, 0, 0, 0.5) 50%, transparent 100%);
        padding: 20px 20px 30px 20px;
        /* Alttan biraz pay bırak (iPhone barı için) */
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
    }

    /* SOHBET AKIŞI */
    .chat-flow {
        max-height: 40vh;
        /* Ekranın %40'ını geçmesin */
        overflow-y: auto;
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        /* Scrollbar gizle */
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    .chat-flow::-webkit-scrollbar {
        display: none;
    }

    .chat-message {
        color: white;
        font-size: 0.95rem;
        text-shadow: 1px 1px 2px black;
        background: rgba(0, 0, 0, 0.25);
        /* Okunabilirlik için hafif fon */
        padding: 6px 12px;
        border-radius: 12px;
        width: fit-content;
        max-width: 85%;
        backdrop-filter: blur(2px);
    }

    .chat-message b {
        color: #f1c40f;
        margin-right: 5px;
    }

    /* INPUT ALANI (MODERN) */
    .chat-input-row {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .chat-input-row input {
        flex: 1;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 12px 20px;
        border-radius: 30px;
        color: white;
        font-size: 1rem;
        backdrop-filter: blur(10px);
        transition: 0.3s;
    }

    .chat-input-row input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    .chat-input-row input:focus {
        background: rgba(0, 0, 0, 0.6);
        border-color: #3498db;
    }

    .chat-input-row button {
        background: #3498db;
        border: none;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        transition: 0.2s;
    }

    .chat-input-row button:active {
        transform: scale(0.9);
    }

    /* YAYINCI BUTONLARI */
    .btn-insta {
        padding: 10px 24px;
        border: none;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        font-size: 0.9rem;
        transition: 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .start {
        background: white;
        color: black;
    }

    .stop {
        background: #e74c3c;
        color: white;
    }

    /* Sesi Aç Uyarısı (Ortada) */
    #unmute-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 15px 30px;
        border-radius: 50px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        cursor: pointer;
        z-index: 50;
        display: none;
        backdrop-filter: blur(5px);
    }

    #debug-log {
        position: absolute;
        top: 60px;
        left: 10px;
        z-index: 100;
        max-width: 300px;
        color: #ff5555;
        background: rgba(0, 0, 0, 0.9);
        padding: 10px;
        font-size: 0.8rem;
        border-radius: 5px;
        pointer-events: none;
    }

    @keyframes pulse {
        0% {
            opacity: 1
        }

        50% {
            opacity: 0.7
        }

        100% {
            opacity: 1
        }
    }

    /* PC DÜZENİ İÇİN (Çok geniş ekranlarda sohbet dağılmasın) */
    @media (min-width: 1024px) {
        .bottom-overlay {
            width: 40%;
            min-width: 400px;
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    // --- YARDIMCI FONKSİYONLAR ---
    function logError(msg) {
        document.getElementById('debug-log').style.display = 'block';
        document.getElementById('debug-log').innerHTML = `❌ ${msg}`; // Son hatayı göster
        console.error(msg);
    }

    function unmuteVideo() {
        const vid = document.getElementById('video');
        if (vid) {
            vid.muted = false;
            vid.volume = 1.0;
            document.getElementById('unmute-overlay').style.display = 'none';
        }
    }

    // --- CHAT MOTORU (Otomatik Bağlanmalı) ---
    function connectChat() {
        let ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);
        const chatBox = document.getElementById("chat-box");
        const chatInput = document.getElementById("chat-input");

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            chatBox.insertAdjacentHTML('beforeend', `<div class="chat-message"><b>${data.user}:</b> ${data.msg}</div>`);
            chatBox.scrollTop = chatBox.scrollHeight;
        };
        ws.onclose = () => setTimeout(connectChat, 3000); // Koparsa 3sn sonra tekrar dene

        window.sendMessage = function () {
            if (chatInput.value.trim() && ws.readyState === 1) { ws.send(chatInput.value); chatInput.value = ""; }
        }
    }
    connectChat();

    // ==========================================
    // 🔥 YAYINCI MODU (AUTO-RECONNECT + GÜVENLİ BITRATE)
    // ==========================================
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let broadcastWs = null;
        let mediaRecorder = null;
        let isBroadcasting = false; // Kullanıcı "Yayınla" dedi mi?

        // 1. Kamerayı Başlat
        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(stream => {
                preview.srcObject = stream;
                window.localStream = stream;
                preview.volume = 0;
            })
            .catch(err => logError("Kamera Açılamadı: " + err));

        // 2. Yayın Fonksiyonu (Koparsa kendini tekrar çağırır)
        function setupSocket() {
            if (!isBroadcasting) return; // Yayın durdurulduysa bağlanma

            broadcastWs = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);

            broadcastWs.onopen = () => {
                console.log("Sunucuya bağlandı ✅");
                document.querySelector('.live-tag').style.display = 'block';

                // --- GÜVENLİ BITRATE AYARI (1.5 Mbps) ---
                // 2.5 Mbps çok yüksek gelip bağlantıyı koparıyorsa 1.5 Mbps idealdir.
                let options = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 1500000 };

                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm', videoBitsPerSecond: 1500000 };
                }

                try {
                    // Eğer eski recorder varsa temizle
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }

                    mediaRecorder = new MediaRecorder(window.localStream, options);

                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0 && broadcastWs.readyState === 1) {
                            broadcastWs.send(e.data);
                        }
                    };
                    // 1 saniyelik parçalar gönder (Buffer şişmesini önler)
                    mediaRecorder.start(1000);

                } catch (e) {
                    logError("Kayıt Başlatılamadı: " + e);
                }
            };

            broadcastWs.onclose = () => {
                console.log("Bağlantı koptu! Tekrar bağlanılıyor... 🔄");
                if (mediaRecorder) mediaRecorder.stop();

                // Yayıncı hala yayındaysa 1 saniye sonra tekrar dene
                if (isBroadcasting) {
                    setTimeout(setupSocket, 1000);
                }
            };

            broadcastWs.onerror = (err) => {
                console.error("Socket Hatası:", err);
                broadcastWs.close(); // Close çağırınca onclose tetiklenir ve tekrar bağlanır
            };
        }

        // --- BUTONLAR ---
        window.startBroadcast = function () {
            isBroadcasting = true;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';
            setupSocket(); // Yayını başlat

            // THUMBNAIL (Sadece 1 kere başlatılır)
            setInterval(() => {
                if (isBroadcasting && broadcastWs && broadcastWs.readyState === 1) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 640; canvas.height = 360;
                    canvas.getContext('2d').drawImage(preview, 0, 0, canvas.width, canvas.height);
                    const dataURL = canvas.toDataURL('image/jpeg', 0.5);
                    fetch('/broadcast/thumbnail', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: dataURL, timestamp: Date.now() })
                    }).catch(e => console.log("Thumb hatası (önemsiz)"));
                }
            }, 15000);
        }

        window.stopBroadcast = function () {
            isBroadcasting = false; // Tekrar bağlanmayı durdur
            fetch('/broadcast/stop', { method: 'POST' });
            if (mediaRecorder) mediaRecorder.stop();
            if (broadcastWs) broadcastWs.close();
            window.location.href = '/';
        }
    }

    // ==========================================
    // 📺 İZLEYİCİ MODU (STABİL)
    // ==========================================
    else if (MODE === 'watch') {
        var video = document.getElementById('video');
        var videoSrc = '/static/hls/stream.m3u8';

        video.onvolumechange = () => { if (!video.muted) document.getElementById('unmute-overlay').style.display = 'none'; };

        if (Hls.isSupported()) {
            var config = {
                enableWorker: true,
                liveSyncDurationCount: 3,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 10000,
            };

            var hls = new Hls(config);
            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                var playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => document.getElementById('unmute-overlay').style.display = 'block')
                        .catch(error => console.log("Oto-oynatma engellendi."));
                }
            });

            // Hata Yönetimi
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
                        case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
                        default: hls.destroy(); break;
                    }
                }
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    }
</script>

{% endblock %}
