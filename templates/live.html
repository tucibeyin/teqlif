{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="desktop-center-wrapper">

    <div class="app-frame">

        <div class="video-layer">
            {% if mode == 'broadcast' %}
            <video id="preview" autoplay muted playsinline></video>
            {% else %}
            <video id="video" autoplay muted playsinline></video>
            <div id="unmute-btn" onclick="unmuteVideo()">
                <i class="fa-solid fa-volume-high"></i> SESİ AÇ
            </div>
            {% endif %}
        </div>

        <div class="ui-layer">

            <header class="header">
                <div class="status-box">
                    {% if mode == 'broadcast' %}
                    <div class="badge live">🔴 CANLI</div>
                    {% else %}
                    <div class="badge viewer"><i class="fa-solid fa-eye"></i> İZLENİYOR</div>
                    {% endif %}
                </div>

                <div class="actions">
                    {% if mode == 'broadcast' %}
                    <button id="btn-start" onclick="startBroadcast()" class="btn start">BAŞLAT 🚀</button>
                    <button id="btn-stop" onclick="stopBroadcast()" class="btn stop" style="display:none;">BİTİR
                        ⏹</button>
                    {% else %}
                    <a href="/" class="btn close"><i class="fa-solid fa-xmark"></i></a>
                    {% endif %}
                </div>
            </header>

            <div class="spacer" onclick="toggleUI()"></div>

            <footer class="footer">
                <div id="debug-log" style="display:none;"></div>

                <div id="chat-box" class="chat-list"></div>

                <div class="input-row">
                    <input type="text" id="chat-input" placeholder="Yorum ekle..." autocomplete="off">
                    <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </footer>
        </div>
    </div>
</div>

<style>
    /* --- SIFIRLAMA --- */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        background-color: #121212;
        /* PC Arka Planı (Koyu Gri) */
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- PC MERKEZLEME (Instagram Web Mantığı) --- */
    .desktop-center-wrapper {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* --- MOBİL ÇERÇEVE (SABİT ORAN) --- */
    .app-frame {
        position: relative;
        width: 100%;
        height: 100%;
        background: black;
        overflow: hidden;

        /* PC İÇİN KISITLAMA (Mobil Görünüm) */
        max-width: 480px;
        /* Standart Mobil Genişliği */
        /* PC'de ise yükseklik tam ekran olsun ama kenarlardan taşmasın */

        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        /* PC'de şık gölge */
    }

    /* --- VİDEO --- */
    .video-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    video {
        width: 100%;
        height: 100%;
        /* COVER: En önemli kod! Ekranı doldurur, fazlalığı keser (Zoom yapar) */
        object-fit: cover;
        object-position: center;
    }

    #preview {
        transform: scaleX(-1);
    }

    /* --- ARAYÜZ (UI) --- */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
    }

    .header,
    .footer,
    #unmute-btn {
        pointer-events: auto;
    }

    /* --- HEADER --- */
    .header {
        padding: 15px 20px;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .badge {
        padding: 6px 12px;
        border-radius: 6px;
        font-weight: 800;
        font-size: 0.85rem;
        color: white;
        letter-spacing: 0.5px;
    }

    .live {
        background: #e74c3c;
        animation: pulse 2s infinite;
        box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
    }

    .viewer {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn {
        padding: 8px 16px;
        border-radius: 20px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        font-size: 0.9rem;
        transition: 0.2s;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .btn:active {
        transform: scale(0.95);
    }

    .start {
        background: white;
        color: black;
    }

    .stop {
        background: #e74c3c;
        color: white;
    }

    .close {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        color: white;
        padding: 0;
        font-size: 1.2rem;
    }

    /* --- FOOTER (CHAT) --- */
    .spacer {
        flex: 1;
    }

    /* Boşluk */

    .footer {
        padding: 20px;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 10%, transparent);
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .chat-list {
        max-height: 250px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        scrollbar-width: none;
        mask-image: linear-gradient(to bottom, transparent, black 15%);
    }

    .chat-msg {
        background: rgba(255, 255, 255, 0.15);
        padding: 6px 12px;
        border-radius: 12px;
        color: white;
        font-size: 0.95rem;
        width: fit-content;
        max-width: 90%;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(2px);
    }

    .chat-msg b {
        color: #f1c40f;
        margin-right: 5px;
    }

    .input-row {
        display: flex;
        gap: 8px;
        width: 100%;
    }

    .input-row input {
        flex: 1;
        padding: 12px 18px;
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        font-size: 1rem;
        backdrop-filter: blur(5px);
    }

    .input-row button {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: none;
        background: #3498db;
        color: white;
        cursor: pointer;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    /* --- SES BUTONU --- */
    #unmute-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        cursor: pointer;
        z-index: 50;
        display: none;
        font-weight: bold;
        backdrop-filter: blur(4px);
    }

    #debug-log {
        font-size: 0.7rem;
        color: #ff6b6b;
        background: rgba(0, 0, 0, 0.8);
        padding: 5px;
        border-radius: 4px;
        margin-bottom: 5px;
    }

    @keyframes pulse {
        0% {
            opacity: 1
        }

        50% {
            opacity: 0.6
        }

        100% {
            opacity: 1
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    function logError(msg) { const d = document.getElementById('debug-log'); d.style.display = 'block'; d.innerHTML = `⚠️ ${msg}`; console.error(msg); }
    function unmuteVideo() { const v = document.getElementById('video'); if (v) { v.muted = false; v.volume = 1.0; document.getElementById('unmute-btn').style.display = 'none'; } }

    // --- CHAT ---
    function connectChat() {
        let ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);
        const box = document.getElementById("chat-box");
        const inp = document.getElementById("chat-input");

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            box.insertAdjacentHTML('beforeend', `<div class="chat-msg"><b>${d.user}:</b> ${d.msg}</div>`);
            box.scrollTop = box.scrollHeight;
        };
        ws.onclose = () => setTimeout(connectChat, 3000);

        window.sendMessage = function () {
            if (inp.value.trim() && ws.readyState === 1) { ws.send(inp.value); inp.value = ""; }
        }
    }
    connectChat();

    // --- YAYINCI ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let ws = null, rec = null, active = false;

        // HD İste ama CSS kesecek
        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(s => { preview.srcObject = s; window.localStream = s; preview.volume = 0; })
            .catch(e => logError("Kamera Hatası"));

        function setupSocket() {
            if (!active) return;
            ws = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);
            ws.onopen = () => {
                let opts = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 1500000 };
                if (!MediaRecorder.isTypeSupported(opts.mimeType)) opts = { mimeType: 'video/webm', videoBitsPerSecond: 1500000 };
                try {
                    if (rec && rec.state !== 'inactive') rec.stop();
                    rec = new MediaRecorder(window.localStream, opts);
                    rec.ondataavailable = (e) => { if (e.data.size > 0 && ws.readyState === 1) ws.send(e.data); };
                    rec.start(1000);
                } catch (e) { logError("Kayıt Hatası"); }
            };
            ws.onclose = () => { if (active) setTimeout(setupSocket, 1000); };
        }

        window.startBroadcast = function () {
            active = true;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';
            setupSocket();
            // Thumbnail (Mobil formatta crop edilmiş gibi görünmesi için backend'de scale yapılabilir ama şimdilik client gönderiyor)
            setInterval(() => {
                if (active && ws && ws.readyState === 1) {
                    const c = document.createElement('canvas'); c.width = 640; c.height = 360;
                    c.getContext('2d').drawImage(preview, 0, 0, c.width, c.height);
                    const d = c.toDataURL('image/jpeg', 0.5);
                    fetch('/broadcast/thumbnail', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: d, timestamp: Date.now() }) }).catch(e => { });
                }
            }, 15000);
        }

        window.stopBroadcast = function () {
            active = false; fetch('/broadcast/stop', { method: 'POST' });
            if (rec) rec.stop(); if (ws) ws.close(); window.location.href = '/';
        }
    }
    // --- İZLEYİCİ ---
    else if (MODE === 'watch') {
        var v = document.getElementById('video');
        var src = '/static/hls/stream.m3u8';
        v.onvolumechange = () => { if (!v.muted) document.getElementById('unmute-btn').style.display = 'none'; };

        if (Hls.isSupported()) {
            var hls = new Hls({ enableWorker: true, liveSyncDurationCount: 3, maxBufferLength: 30 });
            hls.loadSource(src); hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                var p = v.play();
                if (p !== undefined) p.then(_ => document.getElementById('unmute-btn').style.display = 'block').catch(e => { });
            });
            hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) { if (d.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad(); else hls.destroy(); } });
        } else if (v.canPlayType('application/vnd.apple.mpegurl')) {
            v.src = src; v.addEventListener('loadedmetadata', () => v.play());
        }
    }
</script>
{% endblock %}
