{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="app-wrapper">

    <div class="video-container">
        {% if mode == 'broadcast' %}
        <video id="preview" autoplay muted playsinline></video>
        {% else %}
        <video id="video" autoplay muted playsinline></video>
        <div id="unmute-btn" onclick="unmuteVideo()">
            <i class="fa-solid fa-volume-high"></i> SESİ AÇ
        </div>
        {% endif %}
    </div>

    <div class="ui-layer">

        <header class="top-bar">
            <div class="status-area">
                {% if mode == 'broadcast' %}
                <div class="live-badge" style="display:none;">🔴 CANLI</div>
                {% else %}
                <div class="viewer-pill"><i class="fa-solid fa-eye"></i> İZLENİYOR</div>
                {% endif %}
            </div>

            <div class="action-area">
                {% if mode == 'broadcast' %}
                <button id="btn-start" onclick="startBroadcast()" class="action-btn start-btn">
                    YAYINLA 🚀
                </button>
                <button id="btn-stop" onclick="stopBroadcast()" class="action-btn stop-btn" style="display:none;">
                    BİTİR ⏹
                </button>
                {% else %}
                <a href="/" class="close-btn"><i class="fa-solid fa-xmark"></i></a>
                {% endif %}
            </div>
        </header>

        <div class="middle-spacer" onclick="toggleUI()"></div>

        <footer class="bottom-bar">
            <div id="debug-log" style="display:none;"></div>

            <div id="chat-box" class="chat-messages">
            </div>

            <div class="chat-input-wrapper">
                <input type="text" id="chat-input" placeholder="Yorum yap..." autocomplete="off">
                <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </footer>

    </div>
</div>

<style>
    /* --- SIFIRLAMA --- */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        outline: none;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* --- ANA YAPI --- */
    .app-wrapper {
        position: relative;
        width: 100vw;
        height: 100vh;
        /* Mobil tarayıcı çubuğu sorununu çözer */
        height: 100dvh;
        overflow: hidden;
    }

    /* --- VİDEO (ARKAPLAN) --- */
    .video-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Ekrana tam oturtur (Zoom yapar) */
        object-position: center;
    }

    #preview {
        transform: scaleX(-1);
    }

    /* Yayıncı aynası */

    /* --- ARAYÜZ (ÖN PLAN) --- */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        pointer-events: none;
        /* Boşluğa tıklayınca arkaya geçsin */
        /* KENARLARDAN GÜVENLİ BOŞLUK (Kesilmeyi önler) */
        padding: 20px;
    }

    /* Tıklanabilir alanları aktif et */
    .top-bar,
    .bottom-bar,
    #unmute-btn {
        pointer-events: auto;
    }

    /* --- ÜST BAR --- */
    .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        width: 100%;
        padding-top: 10px;
        /* iPhone çentiği için pay */
    }

    .live-badge {
        background: #e74c3c;
        color: white;
        padding: 6px 12px;
        font-weight: 800;
        border-radius: 6px;
        font-size: 0.85rem;
        box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        animation: pulse 2s infinite;
    }

    .viewer-pill {
        background: rgba(0, 0, 0, 0.6);
        color: #ddd;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(5px);
    }

    .action-btn {
        padding: 10px 20px;
        border-radius: 30px;
        border: none;
        font-weight: bold;
        font-size: 0.9rem;
        cursor: pointer;
        transition: 0.2s;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        text-transform: uppercase;
    }

    .action-btn:hover {
        transform: scale(1.05);
    }

    .start-btn {
        background: white;
        color: black;
    }

    .stop-btn {
        background: #e74c3c;
        color: white;
    }

    .close-btn {
        color: white;
        font-size: 1.5rem;
        text-decoration: none;
        background: rgba(0, 0, 0, 0.4);
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }

    .close-btn:hover {
        background: rgba(255, 255, 255, 0.2);
    }

    /* --- ORTA BOŞLUK --- */
    .middle-spacer {
        flex: 1;
    }

    /* --- ALT BAR (CHAT) --- */
    .bottom-bar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        /* Arka planı hafif karart ki yazılar okunsun */
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
        margin: -20px;
        /* Padding'i sıfırlamak için */
        padding: 20px;
        /* Kendi padding'i */
    }

    /* PC DÜZENİ: Chat sol altta kalsın, yayılmasın */
    @media (min-width: 768px) {
        .bottom-bar {
            width: 400px;
            border-radius: 0 20px 0 0;
        }
    }

    .chat-messages {
        max-height: 30vh;
        /* Ekranın %30'u kadar yer kaplasın */
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        scrollbar-width: none;
        mask-image: linear-gradient(to bottom, transparent, black 15%);
    }

    .chat-message {
        background: rgba(255, 255, 255, 0.15);
        padding: 6px 12px;
        border-radius: 12px;
        color: white;
        font-size: 0.9rem;
        width: fit-content;
        max-width: 90%;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
    }

    .chat-message b {
        color: #f1c40f;
        margin-right: 5px;
    }

    .chat-input-wrapper {
        display: flex;
        gap: 10px;
        width: 100%;
    }

    .chat-input-wrapper input {
        flex: 1;
        padding: 12px 20px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 1rem;
    }

    .chat-input-wrapper button {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        background: #3498db;
        color: white;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }

    .chat-input-wrapper button:hover {
        transform: scale(1.1);
    }

    /* --- ORTA BUTON (SES AÇ) --- */
    #unmute-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 12px 24px;
        border-radius: 50px;
        border: 2px solid white;
        cursor: pointer;
        z-index: 50;
        display: none;
        font-weight: bold;
        backdrop-filter: blur(4px);
    }

    #debug-log {
        font-size: 0.75rem;
        color: #ff6b6b;
        margin-bottom: 5px;
        background: rgba(0, 0, 0, 0.8);
        padding: 5px;
        border-radius: 4px;
    }

    @keyframes pulse {
        0% {
            opacity: 1
        }

        50% {
            opacity: 0.6
        }

        100% {
            opacity: 1
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    function logError(msg) {
        const el = document.getElementById('debug-log');
        el.style.display = 'block'; el.innerHTML = `⚠️ ${msg}`; console.error(msg);
    }

    function unmuteVideo() {
        const vid = document.getElementById('video');
        if (vid) { vid.muted = false; vid.volume = 1.0; document.getElementById('unmute-btn').style.display = 'none'; }
    }

    // --- CHAT ---
    function connectChat() {
        let ws = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);
        const chatBox = document.getElementById("chat-box");
        const chatInput = document.getElementById("chat-input");

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            chatBox.insertAdjacentHTML('beforeend', `<div class="chat-message"><b>${data.user}:</b> ${data.msg}</div>`);
            chatBox.scrollTop = chatBox.scrollHeight;
        };
        ws.onclose = () => setTimeout(connectChat, 3000);

        window.sendMessage = function () {
            if (chatInput.value.trim() && ws.readyState === 1) { ws.send(chatInput.value); chatInput.value = ""; }
        }
    }
    connectChat();

    // --- YAYINCI ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let broadcastWs = null, mediaRecorder = null, isBroadcasting = false;

        navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 1280 }, height: { ideal: 720 } }, audio: true })
            .then(stream => { preview.srcObject = stream; window.localStream = stream; preview.volume = 0; })
            .catch(err => logError("Kamera Hatası: " + err));

        function setupSocket() {
            if (!isBroadcasting) return;
            broadcastWs = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);

            broadcastWs.onopen = () => {
                document.querySelector('.live-badge').style.display = 'block';
                let options = { mimeType: 'video/webm;codecs=h264', videoBitsPerSecond: 1500000 };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm', videoBitsPerSecond: 1500000 };

                try {
                    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                    mediaRecorder = new MediaRecorder(window.localStream, options);
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0 && broadcastWs.readyState === 1) broadcastWs.send(e.data);
                    };
                    mediaRecorder.start(1000);
                } catch (e) { logError("Kayıt Hatası"); }
            };
            broadcastWs.onclose = () => { if (isBroadcasting) setTimeout(setupSocket, 1000); };
        }

        window.startBroadcast = function () {
            isBroadcasting = true;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'inline-block';
            setupSocket();
            // Thumbnail
            setInterval(() => {
                if (isBroadcasting && broadcastWs && broadcastWs.readyState === 1) {
                    const canvas = document.createElement('canvas'); canvas.width = 640; canvas.height = 360;
                    canvas.getContext('2d').drawImage(preview, 0, 0, canvas.width, canvas.height);
                    const dataURL = canvas.toDataURL('image/jpeg', 0.5);
                    fetch('/broadcast/thumbnail', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ image: dataURL, timestamp: Date.now() }) }).catch(e => { });
                }
            }, 15000);
        }

        window.stopBroadcast = function () {
            isBroadcasting = false; fetch('/broadcast/stop', { method: 'POST' });
            if (mediaRecorder) mediaRecorder.stop(); if (broadcastWs) broadcastWs.close();
            window.location.href = '/';
        }
    }

    // --- İZLEYİCİ ---
    else if (MODE === 'watch') {
        var video = document.getElementById('video');
        var videoSrc = '/static/hls/stream.m3u8';
        video.onvolumechange = () => { if (!video.muted) document.getElementById('unmute-btn').style.display = 'none'; };

        if (Hls.isSupported()) {
            var hls = new Hls({ enableWorker: true, liveSyncDurationCount: 3, maxBufferLength: 30 });
            hls.loadSource(videoSrc); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                var p = video.play();
                if (p !== undefined) p.then(_ => document.getElementById('unmute-btn').style.display = 'block').catch(e => { });
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) { if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad(); else hls.destroy(); }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc; video.addEventListener('loadedmetadata', () => video.play());
        }
    }
</script>
{% endblock %}
