{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/css/live.css?v={{ range(1, 10000) | random }}">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* GLOBAL */
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: sans-serif;
    }

    .teqlif-stage {
        position: relative;
        width: 100%;
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111;
        overflow: hidden;
    }

    /* VİDEO VE ARKA PLAN */
    .blur-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        filter: blur(40px) brightness(0.6);
        transform: scale(1.1);
        z-index: 0;
        display: none;
        /* Mobilde gizle */
    }

    .video-container {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* PC İÇİN SİNEMATİK MOD (Crop Yok, Blur Var) */
    @media (min-width: 768px) {
        .blur-bg {
            display: block;
        }

        .video-container {
            width: auto;
            aspect-ratio: 9/16;
            height: 92vh;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }
    }

    /* UI KATMANLARI */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
    }

    .header-bar {
        display: flex;
        gap: 10px;
        pointer-events: auto;
    }

    .live-badge {
        background: #e74c3c;
        color: white;
        padding: 5px 12px;
        border-radius: 5px;
        font-weight: bold;
        font-size: 14px;
        animation: blink 2s infinite;
    }

    .user-pill {
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(5px);
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: bold;
    }

    .play-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        pointer-events: auto;
    }

    .play-circle {
        width: 80px;
        height: 80px;
        background: rgba(231, 76, 60, 0.9);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        animation: pulse 2s infinite;
    }

    /* SETUP */
    .setup-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
    }

    .setup-box {
        background: #222;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 85%;
        max-width: 350px;
    }

    .input-glass {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        background: #333;
        border: 1px solid #444;
        color: white;
        border-radius: 10px;
        box-sizing: border-box;
    }

    .btn-main {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }

    @keyframes blink {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.5;
        }

        100% {
            opacity: 1;
        }
    }

    @keyframes pulse {
        0% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.05);
        }

        100% {
            transform: scale(1);
        }
    }
</style>

<div class="teqlif-stage">

    {% if mode == 'broadcast' %}
    <div class="video-container">
        <video id="preview" autoplay muted playsinline></video>
        <canvas id="broadcast-canvas" width="540" height="960" style="display:none;"></canvas>

        <div id="setup-layer" class="setup-overlay">
            <div class="setup-box">
                <h2 style="color:white; margin-bottom:20px;">Yayın Başlat 🎥</h2>
                <input type="text" id="streamTitle" class="input-glass" placeholder="Başlık">
                <select id="streamCategory" class="input-glass">
                    <option>Genel</option>
                    <option>Sohbet</option>
                </select>
                <button id="btn-start-broadcast" class="btn-main">BAŞLAT 🚀</button>
            </div>
        </div>

        <div id="live-ui" class="ui-layer" style="display:none;">
            <div class="header-bar">
                <div class="live-badge">CANLI</div>
            </div>
            <div style="margin-top:auto; align-self:center; pointer-events:auto;">
                <button onclick="stopBroadcast()" class="btn-main"
                    style="background:rgba(255,255,255,0.2);">BİTİR</button>
            </div>
        </div>
    </div>

    {% else %}
    {% for stream in streams %}
    <div class="blur-bg" style="background-image: url('/static/thumbnails/thumb_{{ stream.username }}.jpg');"></div>

    <div class="video-container">
        <video id="video-{{ stream.username }}" playsinline webkit-playsinline></video>

        <div id="play-overlay-{{ stream.username }}" class="play-overlay" onclick="forcePlay('{{ stream.username }}')">
            <div class="play-circle"><i class="fa-solid fa-play"
                    style="color:white; font-size:30px; margin-left:5px;"></i></div>
        </div>

        <div class="ui-layer">
            <div class="header-bar">
                <div class="live-badge">CANLI</div>
                <div class="user-pill">{{ stream.username }}</div>
            </div>
        </div>
    </div>
    {% else %}
    <div style="color:white;">Yayın Yok</div>
    {% endfor %}
    {% endif %}
</div>

<script>
    window.TEQLIF_CONFIG = { mode: "{{ mode }}", username: "{{ user.username if user else 'anon' }}", broadcaster: "{{ broadcaster.username if broadcaster else '' }}" };
</script>
<script src="/static/js/live.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
