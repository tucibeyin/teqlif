{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/css/live.css?v={{ range(1, 10000) | random }}">

<style>
    /* Temel Video Stilleri */
    .cinema-video {
        object-fit: contain !important;
        background: #000;
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
    }

    #broadcast-canvas {
        display: none;
    }

    /* MODAL VE BUTONLAR */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(8px);
    }

    .modal-box {
        background: #1c1c1e;
        padding: 25px;
        border-radius: 20px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 85%;
        max-width: 320px;
    }

    .btn-cancel {
        background: transparent;
        border: 1px solid #555;
        color: #ccc;
        padding: 10px 20px;
        border-radius: 12px;
        cursor: pointer;
    }

    /* OYNATMA KATMANI (Kırmızı Buton) */
    .play-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 500;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
    }

    .big-play-btn {
        background: #e74c3c;
        color: white;
        padding: 20px 40px;
        font-size: 24px;
        border-radius: 50px;
        font-weight: bold;
        box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        animation: pulse 1.5s infinite;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    @keyframes pulse {
        0% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.05);
        }

        100% {
            transform: scale(1);
        }
    }
</style>

<div class="teqlif-os">

    {% if mode == 'broadcast' %}
    <div class="screen" style="position: relative; height: 100vh; overflow: hidden;">
        <video id="preview" autoplay muted playsinline
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transform: scaleX(-1);"></video>
        <canvas id="broadcast-canvas" width="640" height="480"></canvas>

        <div id="setup-layer" class="setup-overlay">
            <div class="setup-box">
                <h2 style="margin-bottom:20px; color: white;">Yayını Hazırla 🎥</h2>
                <div class="input-group-glass"><i class="fa-solid fa-pen"></i><input type="text" id="streamTitle"
                        placeholder="Başlık" value="Canlı Yayın"></div>
                <div class="input-group-glass"><i class="fa-solid fa-layer-group"></i><select id="streamCategory">
                        <option value="Genel">Genel</option>
                        <option value="Sohbet">Sohbet</option>
                    </select></div>
                <button id="btn-start-broadcast" class="btn-go-live">YAYINI BAŞLAT 🚀</button>
                <a href="/" class="btn-cancel-live">İptal</a>
            </div>
        </div>

        <div id="live-ui" class="ui-overlay" style="display: none;">
            <div class="top-bar-left">
                <div class="brand-pill">CANLI</div>
            </div>
            <div class="bottom-dock"><button onclick="stopBroadcast()" class="btn-stop">BİTİR ⏹️</button></div>
        </div>
    </div>

    {% else %}
    <div class="feed-scroll">
        {% for stream in streams %}
        <div class="screen stream-item" data-username="{{ stream.username }}">
            <div style="position: relative; width: 100%; height: 100%; background: #000;">

                <video id="video-{{ stream.username }}" class="cinema-video" playsinline webkit-playsinline></video>

                <div class="ui-overlay">
                    <div class="top-bar-left">
                        <div class="streamer-pill">
                            <div class="name">{{ stream.username }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <div style="color:white; text-align:center; padding-top:50%;">
            <h3>Aktif yayın yok :(</h3>
            <a href="/" style="color:#e74c3c;">Anasayfaya Dön</a>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div id="modMenu" class="modal-overlay" style="display:none;" onclick="if(event.target===this) closeModMenu()">
        <div class="modal-box">
            <h3 style="color:#ff3b30;">Yönetim</h3>
            <p id="mod-target-name"></p><button onclick="closeModMenu()" class="btn-cancel">Kapat</button>
        </div>
    </div>
</div>

<script>
    // Python'dan gelen verileri JS'e aktar
    window.TEQLIF_CONFIG = {
        mode: "{{ mode }}",
        username: "{{ user.username if user else 'anon' }}",
        broadcaster: "{{ broadcaster.username if broadcaster else '' }}"
    };
</script>

<script src="/static/js/live.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
