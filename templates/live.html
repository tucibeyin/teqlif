{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="live-container">

    <div class="video-wrapper">
        <div class="live-badge">CANLI</div>

        {% if mode == 'broadcast' %}
        <video id="preview" autoplay muted style="transform: scaleX(-1);"></video>
        <div class="broadcast-controls">
            <div id="status-text" style="margin-bottom:10px; color:#aaa;">Kamera Hazır</div>
            <button id="btn-start" onclick="startBroadcast()" class="btn-action green"><i class="fa-solid fa-video"></i>
                Yayını Başlat</button>
            <button id="btn-stop" onclick="stopBroadcast()" class="btn-action red" style="display:none;"><i
                    class="fa-solid fa-stop"></i> Yayını Bitir</button>
        </div>

        {% else %}
        <video id="video" controls autoplay muted></video>
        <div class="stream-info">
            <h3>Canlı Yayın</h3>
            <p>Şu an izliyorsunuz...</p>
        </div>
        {% endif %}
    </div>

    <div class="chat-wrapper">
        <div class="chat-header"><i class="fa-solid fa-comments"></i> Canlı Sohbet</div>
        <div id="chat-box" class="chat-box"></div>
        <div class="chat-input-area">
            {% if user %}
            <input type="text" id="chat-input" placeholder="Mesaj yaz..." autocomplete="off">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            {% else %}
            <div style="text-align:center; width:100%; font-size:0.9rem; color:#888;">Giriş Yapmalısınız</div>
            {% endif %}
        </div>
    </div>
</div>

<style>
    /* GENEL DÜZEN */
    .live-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        height: calc(100vh - 80px);
    }

    .video-wrapper {
        flex: 3;
        background: #000;
        border-radius: 15px;
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
        min-width: 300px;
    }

    video {
        width: 100%;
        height: 100%;
        background: black;
        object-fit: contain;
    }

    /* YAYINCI KONTROLLERİ */
    .broadcast-controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        padding: 15px 30px;
        border-radius: 30px;
        text-align: center;
        backdrop-filter: blur(5px);
        width: 80%;
    }

    .btn-action {
        padding: 10px 20px;
        border: none;
        border-radius: 20px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        transition: 0.3s;
    }

    .btn-action.green {
        background: #2ecc71;
    }

    .btn-action.green:hover {
        background: #27ae60;
    }

    .btn-action.red {
        background: #e74c3c;
    }

    .btn-action.red:hover {
        background: #c0392b;
    }

    /* CHAT TASARIMI */
    .chat-wrapper {
        flex: 1;
        background: #1e1e1e;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        min-width: 300px;
        border: 1px solid #333;
        height: 100%;
    }

    .chat-header {
        padding: 15px;
        border-bottom: 1px solid #333;
        background: #252525;
        border-radius: 15px 15px 0 0;
        font-weight: bold;
    }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .chat-message {
        font-size: 0.95rem;
        word-wrap: break-word;
    }

    .chat-user {
        font-weight: bold;
        margin-right: 5px;
    }

    .chat-text {
        color: #ddd;
    }

    .chat-input-area {
        padding: 15px;
        border-top: 1px solid #333;
        display: flex;
        gap: 10px;
        background: #252525;
        border-radius: 0 0 15px 15px;
    }

    .chat-input-area input {
        flex: 1;
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #444;
        background: #111;
        color: white;
        outline: none;
    }

    .chat-input-area button {
        padding: 10px 15px;
        background: #3498db;
        border: none;
        border-radius: 5px;
        color: white;
        cursor: pointer;
    }

    .live-badge {
        position: absolute;
        top: 15px;
        left: 15px;
        background: red;
        color: white;
        padding: 5px 10px;
        font-size: 0.8rem;
        font-weight: bold;
        border-radius: 5px;
        z-index: 10;
        display: none;
    }

    @media (max-width: 768px) {
        .live-container {
            flex-direction: column;
            height: auto;
        }

        .video-wrapper,
        .chat-wrapper {
            height: 500px;
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    // --- BÖLÜM 1: CHAT SİSTEMİ (ORTAK) ---
    const chatWs = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);
    const chatBox = document.getElementById("chat-box");
    const chatInput = document.getElementById("chat-input");

    chatWs.onmessage = function (event) {
        const data = JSON.parse(event.data);
        const color = "#3498db";
        chatBox.insertAdjacentHTML('beforeend', `
            <div class="chat-message">
                <span class="chat-user" style="color: ${color};">${data.user}:</span> 
                <span class="chat-text">${data.msg}</span>
            </div>
        `);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    function sendMessage() {
        if (!chatInput) return;
        const msg = chatInput.value;
        if (msg.trim() !== "") { chatWs.send(msg); chatInput.value = ""; }
    }
    if (chatInput) chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });


    // --- BÖLÜM 2: YAYINCI MODU (BROADCAST) ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        const badge = document.querySelector('.live-badge');
        let broadcastWs;
        let mediaRecorder;

        // Kamerayı Aç
        navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: true })
            .then(stream => { preview.srcObject = stream; window.localStream = stream; })
            .catch(err => alert("Kamera hatası: " + err));

        function startBroadcast() {
            broadcastWs = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);

            broadcastWs.onopen = () => {
                document.getElementById('status-text').innerText = "🔴 YAYINDASINIZ";
                document.getElementById('status-text').style.color = "red";
                badge.style.display = "block";
                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('btn-stop').style.display = 'inline-block';

                // Kayıt ve Gönderim Başlıyor
                mediaRecorder = new MediaRecorder(window.localStream, { mimeType: 'video/webm; codecs=h264' });
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0 && broadcastWs.readyState === 1) {
                        broadcastWs.send(event.data);
                    }
                };
                mediaRecorder.start(100); // Her 100ms'de bir veri gönder
            };
        }

        function stopBroadcast() {
            if (mediaRecorder) mediaRecorder.stop();
            if (broadcastWs) broadcastWs.close();
            badge.style.display = "none";
            document.getElementById('status-text').innerText = "Yayın Durduruldu";
            document.getElementById('status-text').style.color = "white";
            document.getElementById('btn-start').style.display = 'inline-block';
            document.getElementById('btn-stop').style.display = 'none';
            // Sayfayı yenile ki HLS dosyaları temizlensin
            setTimeout(() => window.location.reload(), 1000);
        }
    }

    // --- BÖLÜM 3: İZLEYİCİ MODU (WATCH) ---
    else if (MODE === 'watch') {
        var video = document.getElementById('video');
        var videoSrc = '/static/hls/stream.m3u8';
        document.querySelector('.live-badge').style.display = "block";

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                video.play().catch(e => console.log("Otomatik oynatma engellendi."));
            });
            // Hata Yönetimi: Yayın yoksa sürekli dene
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    setTimeout(() => { hls.loadSource(videoSrc); hls.attachMedia(video); }, 3000);
                }
            });
        }
    }
</script>
{% endblock %}
