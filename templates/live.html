{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/css/live.css?v={{ range(1, 10000) | random }}">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* GLOBAL */
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: -apple-system, sans-serif;
    }

    .teqlif-stage {
        position: relative;
        width: 100%;
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
    }

    /* VİDEO ALANI */
    .video-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 1;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* INSTAGRAM MODU: EKRANI DOLDURUR */
    }

    /* PC İÇİN ORTALAMA */
    @media (min-width: 768px) {
        .video-wrapper {
            width: 450px;
            height: 95vh;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }

        .blur-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            filter: blur(40px) brightness(0.4);
            z-index: 0;
        }
    }

    /* ARAYÜZ KATMANI */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent, rgba(0, 0, 0, 0.6));
    }

    .header {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .badge {
        background: #e91e63;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: 800;
        font-size: 11px;
    }

    .username {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 13px;
        backdrop-filter: blur(5px);
    }

    /* SETUP EKRANI */
    .setup-layer {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
    }

    .setup-box {
        width: 80%;
        max-width: 300px;
        text-align: center;
    }

    .inp {
        width: 100%;
        padding: 15px;
        background: #222;
        border: 1px solid #333;
        color: white;
        border-radius: 10px;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    .btn {
        background: #e91e63;
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 30px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
    }

    /* PLAY BUTONU */
    .play-btn {
        position: absolute;
        z-index: 20;
        font-size: 60px;
        color: white;
        filter: drop-shadow(0 0 10px black);
        cursor: pointer;
        pointer-events: auto;
    }
</style>

<div class="teqlif-stage">
    {% if mode == 'broadcast' %}
    <div class="video-wrapper">
        <video id="preview" autoplay muted playsinline></video>
        <canvas id="broadcast-canvas" width="540" height="960" style="display:none;"></canvas>

        <div id="setup-layer" class="setup-layer">
            <div class="setup-box">
                <h2 style="color:white;">Yayın Başlat</h2>
                <input type="text" id="streamTitle" class="inp" placeholder="Başlık">
                <select id="streamCategory" class="inp">
                    <option>Genel</option>
                </select>
                <button id="btn-start-broadcast" class="btn">CANLI YAYIN 📡</button>
            </div>
        </div>

        <div id="live-ui" class="ui-layer" style="display:none;">
            <div class="header">
                <div class="badge">CANLI</div>
            </div>
            <button onclick="stopBroadcast()" class="btn"
                style="width:auto; align-self:center; pointer-events:auto;">BİTİR</button>
        </div>
    </div>

    {% else %}
    {% for stream in streams %}
    <div class="blur-bg" style="background-image: url('/static/thumbnails/thumb_{{ stream.username }}.jpg');"></div>
    <div class="video-wrapper">
        <video id="video-{{ stream.username }}" playsinline webkit-playsinline loop></video>
        <i id="play-overlay-{{ stream.username }}" class="fa-solid fa-play play-btn"
            onclick="forcePlay('{{ stream.username }}')"></i>
        <div class="ui-layer">
            <div class="header">
                <div class="badge">CANLI</div>
                <div class="username">{{ stream.username }}</div>
            </div>
        </div>
    </div>
    {% else %}
    <div style="color:white;">Yayın Yok</div>
    {% endfor %}
    {% endif %}
</div>

<script>
    window.TEQLIF_CONFIG = { mode: "{{ mode }}", username: "{{ user.username if user else 'anon' }}", broadcaster: "{{ broadcaster.username if broadcaster else '' }}" };
</script>
<script src="/static/js/live.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
