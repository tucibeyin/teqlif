{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/css/live.css?v={{ range(1, 10000) | random }}">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* --- GLOBAL --- */
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .teqlif-stage {
        position: relative;
        width: 100%;
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
    }

    /* --- VİDEO VE ARKA PLAN --- */
    .blur-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        filter: blur(50px) brightness(0.5);
        opacity: 0.8;
        z-index: 0;
        display: none;
        /* Mobilde gizle */
    }

    .video-wrapper {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        overflow: hidden;
    }

    /* 🔥 PREMIUM VİDEO AYARI 🔥 */
    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Instagram Gibi: Ekranı Doldurur */
    }

    /* PC İÇİN ÖZEL AYAR */
    @media (min-width: 768px) {
        .blur-bg {
            display: block;
        }

        .video-wrapper {
            width: 450px;
            /* Telefon Genişliği */
            height: 90vh;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        /* PC'de videoyu sığdır ki kafa kesilmesin */
        video {
            object-fit: cover;
        }
    }

    /* --- UI KATMANLARI --- */
    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        background: linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, transparent 15%, transparent 85%, rgba(0, 0, 0, 0.6) 100%);
        padding: 20px;
        box-sizing: border-box;
    }

    .top-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        pointer-events: auto;
    }

    .live-badge {
        background: #ff0050;
        color: white;
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 0.5px;
        animation: pulse 2s infinite;
    }

    .user-pill {
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .user-pill img {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #555;
    }

    .bottom-bar {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        pointer-events: auto;
        width: 100%;
    }

    .chat-container {
        flex: 1;
        height: 200px;
        /* Chat alanı */
    }

    .action-btn {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
        cursor: pointer;
        transition: 0.2s;
    }

    .action-btn:active {
        transform: scale(0.9);
        background: rgba(255, 255, 255, 0.3);
    }

    /* --- SETUP EKRANI --- */
    .setup-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
    }

    .setup-box {
        width: 80%;
        max-width: 350px;
        text-align: center;
    }

    .glass-input {
        width: 100%;
        padding: 15px;
        margin-bottom: 15px;
        background: #222;
        border: 1px solid #333;
        color: white;
        border-radius: 12px;
        font-size: 16px;
        box-sizing: border-box;
        outline: none;
    }

    .btn-gradient {
        background: linear-gradient(45deg, #ff0050, #d60044);
        color: white;
        border: none;
        padding: 16px;
        width: 100%;
        border-radius: 30px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 5px 20px rgba(255, 0, 80, 0.4);
    }

    /* --- OYNAT BUTONU --- */
    .play-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        pointer-events: auto;
    }

    .play-icon {
        font-size: 60px;
        color: white;
        filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.5));
    }

    @keyframes pulse {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.6;
        }

        100% {
            opacity: 1;
        }
    }
</style>

<div class="teqlif-stage">

    {% if mode == 'broadcast' %}
    <div class="video-wrapper">
        <video id="preview" autoplay muted playsinline style="transform: scaleX(-1);"></video>
        <canvas id="broadcast-canvas" width="720" height="1280" style="display:none;"></canvas>

        <div id="setup-layer" class="setup-overlay">
            <div class="setup-box">
                <h1 style="color:white; margin-bottom:5px;">Canlı Yayın</h1>
                <p style="color:#888; margin-bottom:30px;">Hemen yayına başla!</p>
                <input type="text" id="streamTitle" class="glass-input" placeholder="Yayın Başlığı">
                <select id="streamCategory" class="glass-input">
                    <option>Genel</option>
                    <option>Sohbet</option>
                </select>
                <button id="btn-start-broadcast" class="btn-gradient">BAŞLAT 🚀</button>
            </div>
        </div>

        <div id="live-ui" class="ui-layer" style="display:none;">
            <div class="top-bar">
                <div class="live-badge">CANLI</div>
                <div class="user-pill"><i class="fa-solid fa-eye"></i> 0</div>
            </div>
            <div class="bottom-bar" style="justify-content: center;">
                <button onclick="stopBroadcast()" class="btn-gradient"
                    style="width: auto; padding: 10px 30px;">BİTİR</button>
            </div>
        </div>
    </div>

    {% else %}
    {% for stream in streams %}
    <div class="blur-bg" style="background-image: url('/static/thumbnails/thumb_{{ stream.username }}.jpg');"></div>

    <div class="video-wrapper">
        <video id="video-{{ stream.username }}" playsinline webkit-playsinline loop></video>

        <div id="play-overlay-{{ stream.username }}" class="play-overlay" onclick="forcePlay('{{ stream.username }}')">
            <i class="fa-solid fa-play play-icon"></i>
        </div>

        <div class="ui-layer">
            <div class="top-bar">
                <div class="live-badge">CANLI</div>
                <div class="user-pill">
                    <img src="/static/thumbnails/thumb_{{ stream.username }}.jpg" onerror="this.style.display='none'">
                    {{ stream.username }}
                </div>
            </div>
            <div class="bottom-bar">
                <div class="chat-container"></div>
                <div class="action-btn"><i class="fa-solid fa-gift"></i></div>
                <div class="action-btn"><i class="fa-solid fa-heart"></i></div>
                <div class="action-btn"><i class="fa-solid fa-share"></i></div>
            </div>
        </div>
    </div>
    {% else %}
    <div style="color:white;">Aktif yayın yok.</div>
    {% endfor %}
    {% endif %}
</div>

<script>
    window.TEQLIF_CONFIG = { mode: "{{ mode }}", username: "{{ user.username if user else 'anon' }}", broadcaster: "{{ broadcaster.username if broadcaster else '' }}" };
</script>
<script src="/static/js/live.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
