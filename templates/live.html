{% extends "base.html" %}

{% block content %}
{% set mode = request.query_params.get('mode') %}

<div class="insta-layout">

    <div class="video-layer">
        {% if mode == 'broadcast' %}
        <video id="preview" autoplay muted playsinline style="transform: scaleX(-1);"></video>
        {% else %}
        <video id="video" autoplay playsinline></video>
        {% endif %}
    </div>

    <div class="top-overlay">
        <div class="live-tag">CANLI</div>
        <div class="viewer-count"><i class="fa-solid fa-eye"></i> <span id="view-count">0</span></div>

        {% if mode == 'broadcast' %}
        <div class="broadcast-actions">
            <button id="btn-start" onclick="startBroadcast()" class="btn-insta start">Yayınla</button>
            <button id="btn-stop" onclick="stopBroadcast()" class="btn-insta stop" style="display:none;">Bitir</button>
        </div>
        {% endif %}
    </div>

    <div class="bottom-overlay">

        <div id="chat-box" class="chat-flow">
        </div>

        <div class="chat-input-row">
            {% if user %}
            <input type="text" id="chat-input" placeholder="Yorum yap..." autocomplete="off">
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            {% else %}
            <div class="login-warning">Sohbet için <a href="/login">Giriş Yap</a></div>
            {% endif %}
        </div>
    </div>

</div>

<style>
    /* 1. KAPSAYICI (Tüm Ekranı Kapla) */
    .insta-layout {
        position: relative;
        width: 100%;
        max-width: 500px;
        /* Mobilde tam ekran, masaüstünde telefon boyutu */
        height: calc(100vh - 80px);
        /* Header hariç tüm alan */
        margin: 0 auto;
        background: #000;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
    }

    /* 2. VİDEO KATMANI (En altta) */
    .video-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        /* Instagram gibi ekranı doldurur */
    }

    /* 3. ÜST KATMAN (Bilgiler) */
    .top-overlay {
        position: absolute;
        top: 20px;
        left: 0;
        width: 100%;
        z-index: 10;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .live-tag {
        background: #e74c3c;
        color: white;
        padding: 5px 10px;
        font-weight: bold;
        font-size: 0.8rem;
        border-radius: 5px;
        animation: pulse 2s infinite;
    }

    .viewer-count {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        backdrop-filter: blur(5px);
    }

    .btn-insta {
        padding: 8px 20px;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        color: white;
    }

    .start {
        background: #fff;
        color: #000;
    }

    .stop {
        background: #e74c3c;
    }

    /* 4. ALT KATMAN (Sohbet) */
    .bottom-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 10;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
        /* Karartma efekti */
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        height: 50%;
        /* Ekranın yarısına kadar sohbet çıkabilir */
    }

    .chat-flow {
        overflow-y: auto;
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: none;
        /* Scrollbar'ı gizle */
    }

    .chat-flow::-webkit-scrollbar {
        display: none;
    }

    .chat-message {
        color: white;
        font-size: 0.95rem;
        text-shadow: 1px 1px 2px black;
        animation: slideIn 0.3s ease;
    }

    .chat-user {
        font-weight: bold;
        opacity: 0.9;
        margin-right: 5px;
    }

    .chat-text {
        opacity: 0.8;
    }

    /* Input Alanı */
    .chat-input-row {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .chat-input-row input {
        flex: 1;
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 12px;
        border-radius: 25px;
        color: white;
        outline: none;
        backdrop-filter: blur(5px);
    }

    .chat-input-row input::placeholder {
        color: rgba(255, 255, 255, 0.7);
    }

    .chat-input-row button {
        background: transparent;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
    }

    .login-warning {
        font-size: 0.8rem;
        color: #aaa;
        text-align: center;
        width: 100%;
    }

    @keyframes pulse {
        0% {
            opacity: 1;
        }

        50% {
            opacity: 0.5;
        }

        100% {
            opacity: 1;
        }
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Mobil Düzenleme */
    @media (max-width: 768px) {
        .insta-layout {
            max-width: 100%;
            height: calc(100vh - 60px);
            border-radius: 0;
        }
    }
</style>

<script>
    const MODE = "{{ mode }}";
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";

    // --- CHAT SİSTEMİ ---
    const chatWs = new WebSocket(`${protocol}://${window.location.host}/ws/chat`);
    const chatBox = document.getElementById("chat-box");
    const chatInput = document.getElementById("chat-input");

    chatWs.onmessage = function (event) {
        const data = JSON.parse(event.data);
        // İsimler için rastgele pastel renkler
        const colors = ['#FF9A9E', '#FECFEF', '#A1C4FD', '#C2E9FB', '#81FBB8'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];

        chatBox.insertAdjacentHTML('beforeend', `
            <div class="chat-message">
                <span class="chat-user" style="color: ${randomColor};">${data.user}</span> 
                <span class="chat-text">${data.msg}</span>
            </div>
        `);
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    function sendMessage() {
        if (!chatInput) return;
        const msg = chatInput.value;
        if (msg.trim() !== "") { chatWs.send(msg); chatInput.value = ""; }
    }
    if (chatInput) chatInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    // --- YAYINCI MODU ---
    if (MODE === 'broadcast') {
        const preview = document.getElementById('preview');
        let broadcastWs, mediaRecorder;

        // Kamerayı Tam Ekran ve Dikey Modda Açmaya Çalış
        const constraints = {
            video: {
                width: { ideal: 720 }, height: { ideal: 1280 }, // Dikey
                facingMode: "user"
            },
            audio: true
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(stream => { preview.srcObject = stream; window.localStream = stream; })
            .catch(err => {
                console.log("Dikey kamera hatası, yatay deneniyor...", err);
                navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                    .then(stream => { preview.srcObject = stream; window.localStream = stream; });
            });

        window.startBroadcast = function () {
            broadcastWs = new WebSocket(`${protocol}://${window.location.host}/ws/broadcast`);
            broadcastWs.onopen = () => {
                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('btn-stop').style.display = 'inline-block';

                mediaRecorder = new MediaRecorder(window.localStream, { mimeType: 'video/webm; codecs=h264' });
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0 && broadcastWs.readyState === 1) broadcastWs.send(event.data);
                };
                mediaRecorder.start(100);
            };
        }

        window.stopBroadcast = function () {
            if (mediaRecorder) mediaRecorder.stop();
            if (broadcastWs) broadcastWs.close();
            window.location.reload();
        }
    }

    // --- İZLEYİCİ MODU ---
    else if (MODE === 'watch') {
        var video = document.getElementById('video');
        var videoSrc = '/static/hls/stream.m3u8';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function () { video.play().catch(e => console.log("Play blocked")); });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) setTimeout(() => { hls.loadSource(videoSrc); hls.attachMedia(video); }, 3000);
            });
        }
    }
</script>
{% endblock %}
