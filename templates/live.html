{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="/static/css/live.css?v={{ range(1, 10000) | random }}">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>

<style>
    html,
    body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
    }

    .teqlif-stage {
        width: 100%;
        height: 100dvh;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .video-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
    }

    .header-bar {
        display: flex;
        gap: 10px;
        pointer-events: auto;
    }

    .live-badge {
        background: #e74c3c;
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        font-weight: bold;
        font-size: 12px;
    }

    .user-pill {
        background: rgba(0, 0, 0, 0.5);
        color: white;
        padding: 5px 15px;
        border-radius: 20px;
        font-weight: bold;
    }

    .setup-overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
    }

    .setup-box {
        background: #222;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 80%;
    }

    .btn-main {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 15px;
        width: 100%;
        border-radius: 10px;
        font-size: 18px;
        margin-top: 10px;
        cursor: pointer;
    }

    .input-glass {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background: #333;
        border: none;
        color: white;
        border-radius: 5px;
    }
</style>

<div class="teqlif-stage">
    {% if mode == 'broadcast' %}
    <div class="video-layer">
        <video id="preview" autoplay muted playsinline></video>
        <canvas id="broadcast-canvas" width="640" height="480" style="display:none;"></canvas>
    </div>

    <div id="setup-layer" class="setup-overlay">
        <div class="setup-box">
            <h2 style="color:white;">Yayın Başlat</h2>
            <input type="text" id="streamTitle" class="input-glass" value="Canlı Yayın">
            <select id="streamCategory" class="input-glass">
                <option>Genel</option>
            </select>
            <button id="btn-start-broadcast" class="btn-main">BAŞLAT 🚀</button>
        </div>
    </div>

    <div id="live-ui" class="ui-layer" style="display:none;">
        <div class="header-bar">
            <div class="live-badge">CANLI</div>
        </div>
        <button onclick="stopBroadcast()" class="btn-main"
            style="width:auto; align-self:center; pointer-events:auto;">BİTİR</button>
    </div>

    {% else %}
    {% for stream in streams %}
    <div class="video-layer">
        <video id="video-{{ stream.username }}" playsinline webkit-playsinline controls></video>
    </div>
    <div class="ui-layer">
        <div class="header-bar">
            <div class="live-badge">CANLI</div>
            <div class="user-pill">{{ stream.username }}</div>
        </div>
    </div>
    {% else %}
    <div style="color:white;">Yayın Yok</div>
    {% endfor %}
    {% endif %}
</div>

<script>
    window.TEQLIF_CONFIG = { mode: "{{ mode }}", username: "{{ user.username if user else 'anon' }}", broadcaster: "{{ broadcaster.username if broadcaster else '' }}" };
</script>
<script src="/static/js/live.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
