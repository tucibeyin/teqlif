name: teqlif
description: "teqlif — İlan ve Açık Artırma"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  livekit_client: ^2.3.0
  permission_handler: ^11.3.0
  web_socket_channel: ^3.0.0
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#06B6D4"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#06B6D4"
  image: assets/splash.png
  android: true
  ios: true
  fullscreen: true
  android_gravity: center
  ios_content_mode: center
  image_dark: assets/splash.png
  color_dark: "#06B6D4"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash.png
