name: teqlif
description: "teqlif — İlan ve Açık Artırma"
publish_to: 'none'
version: 1.0.0+10

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.3.0
  livekit_client: ^2.3.0
  permission_handler: ^11.3.0
  web_socket_channel: ^3.0.0
  url_launcher: ^6.3.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_messaging: ^16.1.2
  mask_text_input_formatter: ^2.9.0
  app_badge_plus: ^1.1.0
  image_picker: ^1.1.0
  video_compress: ^3.1.3
  video_player: ^2.9.2
  local_auth: ^2.3.0
  wakelock_plus: ^1.2.10
  sentry_flutter: ^9.14.0
  sentry: ^9.14.0
  flutter_riverpod: ^2.4.9
  confetti: ^0.7.0
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  cloudflare_turnstile: ^1.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#06B6D4"
  adaptive_icon_foreground: "assets/icon.png"

flutter_native_splash:
  color: "#06B6D4"
  image: assets/splash.png
  android: true
  ios: true
  fullscreen: true
  android_gravity: center
  ios_content_mode: center
  image_dark: assets/splash.png
  color_dark: "#06B6D4"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash.png
