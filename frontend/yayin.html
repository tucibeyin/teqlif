<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Yayın — teqlif</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        body {
            background: #0f172a;
            color: #e2e8f0;
        }

        nav {
            background: #1e293b;
            border-bottom-color: #334155;
        }

        .logo {
            color: var(--primary-light);
        }

        .nav-links a {
            color: #94a3b8;
        }

        .nav-links a:hover {
            background: #334155;
            color: var(--primary-light);
        }

        .stream-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 1rem 2rem;
            max-width: 960px;
            margin: 0 auto;
            gap: 1rem;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-overlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 0.75rem 1rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .live-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .viewer-count {
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 0.82rem;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: #64748b;
        }

        .video-placeholder svg {
            opacity: 0.4;
        }

        .stream-meta {
            width: 100%;
            background: #1e293b;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .stream-meta-info h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.2rem;
        }

        .stream-meta-info span {
            font-size: 0.82rem;
            color: #64748b;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-slate {
            background: #334155;
            color: #e2e8f0;
        }

        .btn-slate:hover {
            background: #475569;
        }

        #statusMsg {
            font-size: 0.9rem;
            color: #94a3b8;
            text-align: center;
            padding: 0.5rem 0;
        }

        #statusMsg.error {
            color: #f87171;
        }

        .connecting-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #334155;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Açık Artırma Paneli ── */
        .auction-panel {
            width: 100%;
            background: #1e293b;
            border-radius: 12px;
            padding: 1.25rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        .auction-panel.visible { display: flex; }

        .auction-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .auction-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #e2e8f0;
        }
        .auction-status-badge {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }
        .badge-active   { background: #22c55e; color: #fff; }
        .badge-paused   { background: #f59e0b; color: #000; }
        .badge-idle     { background: #475569; color: #fff; }
        .badge-ended    { background: #ef4444; color: #fff; }

        .auction-bid-info {
            text-align: center;
        }
        .auction-current-price {
            font-size: 2rem;
            font-weight: 800;
            color: #22c55e;
        }
        .auction-current-bidder {
            font-size: 0.82rem;
            color: #64748b;
            margin-top: 0.2rem;
        }
        .auction-bid-count {
            font-size: 0.8rem;
            color: #475569;
        }

        /* Host setup formu */
        .auction-setup {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .auction-setup input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }
        .auction-setup input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Host kontrol butonları */
        .auction-host-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .auction-host-controls .btn { flex: 1; min-width: 90px; }

        /* Viewer teklif butonları */
        .auction-viewer-controls {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .bid-presets {
            display: flex;
            gap: 0.5rem;
        }
        .bid-presets .btn { flex: 1; font-size: 0.82rem; }
        .bid-custom-row {
            display: flex;
            gap: 0.5rem;
        }
        .bid-custom-row input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.9rem;
        }
        .bid-custom-row input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-green {
            background: #16a34a;
            color: #fff;
        }
        .btn-green:hover { background: #15803d; }
        .btn-amber {
            background: #d97706;
            color: #fff;
        }
        .btn-amber:hover { background: #b45309; }
        #auctionMsg {
            font-size: 0.82rem;
            color: #94a3b8;
            text-align: center;
        }
        #auctionMsg.error { color: #f87171; }
        #auctionMsg.success { color: #4ade80; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/canli.html">← Yayınlar</a>
        </div>
    </nav>

    <div class="stream-layout">
        <div id="statusMsg"></div>

        <div class="video-container" id="videoContainer">
            <div class="connecting-overlay" id="connectingOverlay">
                <div class="spinner"></div>
                <span>Bağlanıyor...</span>
            </div>

            <!-- Host: lokal video; Viewer: uzak video -->
            <video id="mainVideo" autoplay playsinline muted style="display:none;"></video>
            <audio id="remoteAudio" autoplay style="display:none;"></audio>

            <div class="video-overlay" id="videoOverlay" style="display:none;">
                <span class="live-badge">CANLI</span>
                <span class="viewer-count" id="viewerCount">👁 0</span>
            </div>

            <div class="video-placeholder" id="videoPlaceholder" style="display:none;">
                <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                    <path d="M15 10l4.553-2.07A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                </svg>
                <span id="placeholderText">Yayın bekleniyor...</span>
            </div>
        </div>

        <!-- ── Açık Artırma Paneli ── -->
        <div class="auction-panel" id="auctionPanel">
            <div class="auction-header">
                <span class="auction-title" id="auctionItemName">Açık Artırma</span>
                <span class="auction-status-badge badge-idle" id="auctionBadge">Bekleniyor</span>
            </div>

            <div class="auction-bid-info" id="auctionBidInfo" style="display:none;">
                <div class="auction-current-price" id="auctionPrice">—</div>
                <div class="auction-current-bidder" id="auctionBidder"></div>
                <div class="auction-bid-count" id="auctionBidCount"></div>
            </div>

            <!-- HOST: Setup formu (idle durumunda göster) -->
            <div class="auction-setup" id="hostSetup" style="display:none;">
                <input type="text" id="auctionItemInput" placeholder="Ürün adı (örn: iPhone 15 Pro)" maxlength="200">
                <input type="number" id="auctionStartPrice" placeholder="Başlangıç fiyatı (₺)" min="0" step="1">
            </div>

            <!-- HOST: Kontrol butonları -->
            <div class="auction-host-controls" id="hostControls" style="display:none;">
                <button class="btn btn-green" id="btnAuctionStart">▶ Başlat</button>
                <button class="btn btn-amber" id="btnAuctionPause" style="display:none;">⏸ Duraklat</button>
                <button class="btn btn-slate" id="btnAuctionResume" style="display:none;">▶ Devam</button>
                <button class="btn btn-danger" id="btnAuctionEnd" style="display:none;">⏹ Bitir</button>
            </div>

            <!-- VIEWER: Teklif butonları -->
            <div class="auction-viewer-controls" id="viewerControls" style="display:none;">
                <div class="bid-presets">
                    <button class="btn btn-slate" onclick="quickBid(100)">+₺100</button>
                    <button class="btn btn-slate" onclick="quickBid(200)">+₺200</button>
                    <button class="btn btn-slate" onclick="quickBid(500)">+₺500</button>
                    <button class="btn btn-slate" onclick="quickBid(1000)">+₺1000</button>
                </div>
                <div class="bid-custom-row">
                    <input type="number" id="customBidInput" placeholder="Özel teklif (₺)" min="1" step="1">
                    <button class="btn btn-green" id="btnCustomBid">Teklif Ver</button>
                </div>
            </div>

            <div id="auctionMsg"></div>
        </div>

        <div class="stream-meta" id="streamMeta" style="display:none;">
            <div class="stream-meta-info">
                <h2 id="metaTitle">—</h2>
                <span id="metaHost"></span>
            </div>
            <div class="controls">
                <!-- Host kontrolleri -->
                <button class="btn btn-slate" id="btnToggleMic" style="display:none;">🎙 Mikrofon Kapat</button>
                <button class="btn btn-danger" id="btnEndStream" style="display:none;">Yayını Bitir</button>
                <!-- Viewer kontrolleri -->
                <button class="btn btn-slate" id="btnLeave" style="display:none;">Ayrıl</button>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
    <script src="/static/js/stream.js"></script>
    <script src="/static/js/auction.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const streamIdParam = parseInt(params.get('id'));
        const isHostParam = params.get('host') === '1';

        const mainVideo = document.getElementById('mainVideo');
        const remoteAudio = document.getElementById('remoteAudio');
        const connectingOverlay = document.getElementById('connectingOverlay');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoOverlay = document.getElementById('videoOverlay');
        const streamMeta = document.getElementById('streamMeta');
        const statusMsg = document.getElementById('statusMsg');
        const viewerCount = document.getElementById('viewerCount');
        let micEnabled = true;
        let streamId = null;

        function setStatus(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = isError ? 'error' : '';
        }

        function showVideo() {
            connectingOverlay.style.display = 'none';
            videoPlaceholder.style.display = 'none';
            mainVideo.style.display = 'block';
            videoOverlay.style.display = 'flex';
            streamMeta.style.display = 'flex';
        }

        function showPlaceholder(text) {
            connectingOverlay.style.display = 'none';
            videoPlaceholder.style.display = 'flex';
            document.getElementById('placeholderText').textContent = text;
            videoOverlay.style.display = 'flex';
            streamMeta.style.display = 'flex';
        }

        async function init() {
            if (!Auth.getToken()) {
                window.location.href = '/giris.html';
                return;
            }

            const info = Stream.load();

            // Session'da bilgi yoksa ya da ID uyuşmuyorsa
            if (!info || (streamIdParam && info.stream_id !== streamIdParam)) {
                setStatus('Oturum bilgisi bulunamadı. Yeniden yönlendiriliyor...', true);
                setTimeout(() => window.location.href = '/canli.html', 2000);
                return;
            }

            streamId = info.stream_id;
            const isHost = info.is_host;

            // Meta bilgileri göster
            document.getElementById('metaTitle').textContent = info.title || 'Canlı Yayın';
            if (!isHost && info.host_username) {
                document.getElementById('metaHost').textContent = `@${info.host_username} yayın yapıyor`;
            } else {
                document.getElementById('metaHost').textContent = 'Siz yayın yapıyorsunuz';
            }

            if (isHost) {
                document.getElementById('btnEndStream').style.display = '';
                document.getElementById('btnToggleMic').style.display = '';
            } else {
                document.getElementById('btnLeave').style.display = '';
                // Viewer ise ses için mute değil
                mainVideo.muted = false;
            }

            try {
                const room = await connectRoom({
                    livekit_url: info.livekit_url,
                    token: info.token,
                    isHost,
                    localVideoEl: isHost ? mainVideo : null,
                    remoteVideoEl: isHost ? null : mainVideo,
                    remoteAudioEl: isHost ? null : remoteAudio,
                    onDisconnect: () => {
                        if (!isHost) {
                            Stream.clear();
                            setTimeout(() => window.location.href = '/', 2000);
                        }
                    },
                    onRemoteVideo: () => {
                        showVideo();
                        setStatus('');
                    },
                });

                if (isHost) {
                    showVideo();
                    setStatus('Yayın canlı. İzleyiciler sizi görebilir.');
                } else {
                    // Uzak video gelene kadar placeholder göster (onRemoteVideo gelince kapanır)
                    showPlaceholder('Yayına bağlanıldı, video bekleniyor...');
                }

                viewerCount.textContent = `👁 ${info.viewer_count ?? 0}`;

                // Açık artırmayı başlat
                initAuction(streamId, isHost);

            } catch (err) {
                console.error(err);
                setStatus('Bağlantı kurulamadı: ' + (err.message || 'Bilinmeyen hata'), true);
                connectingOverlay.innerHTML = `<span style="color:#f87171">Bağlantı hatası</span>`;
            }
        }

        // Yayını Bitir (Host)
        document.getElementById('btnEndStream').addEventListener('click', async () => {
            const btn = document.getElementById('btnEndStream');
            btn.disabled = true;
            btn.textContent = 'Bitiriliyor...';
            try {
                await Stream.endStream(streamId);
            } catch (_) {}
            await disconnectRoom();
            Stream.clear();
            window.location.href = '/canli.html';
        });

        // Mikrofon Kapat/Aç (Host)
        document.getElementById('btnToggleMic').addEventListener('click', async () => {
            const btn = document.getElementById('btnToggleMic');
            micEnabled = !micEnabled;
            if (_room) {
                await _room.localParticipant.setMicrophoneEnabled(micEnabled);
            }
            btn.textContent = micEnabled ? '🎙 Mikrofon Kapat' : '🔇 Mikrofon Aç';
        });

        // Ayrıl (Viewer)
        document.getElementById('btnLeave').addEventListener('click', async () => {
            const btn = document.getElementById('btnLeave');
            btn.disabled = true;
            btn.textContent = 'Ayrılıyor...';
            try {
                await Stream.leaveStream(streamId);
            } catch (_) {}
            await disconnectRoom();
            Stream.clear();
            window.location.href = '/canli.html';
        });

        // ── Açık Artırma ────────────────────────────────────────────────────

        let _currentAuctionStatus = 'idle';
        let _currentBid = 0;

        function updateAuctionUI(state) {
            _currentAuctionStatus = state.status;
            const panel = document.getElementById('auctionPanel');
            const badge = document.getElementById('auctionBadge');
            const bidInfo = document.getElementById('auctionBidInfo');
            const hostSetup = document.getElementById('hostSetup');
            const hostControls = document.getElementById('hostControls');
            const viewerControls = document.getElementById('viewerControls');

            panel.classList.add('visible');
            badge.textContent = Auction.STATUS_LABELS[state.status] || state.status;
            badge.className = 'auction-status-badge badge-' + state.status;

            if (state.item_name) document.getElementById('auctionItemName').textContent = state.item_name;

            if (state.current_bid != null) {
                _currentBid = state.current_bid;
                document.getElementById('auctionPrice').textContent = '₺' + Number(state.current_bid).toLocaleString('tr-TR');
                document.getElementById('auctionBidder').textContent = state.current_bidder
                    ? `@${state.current_bidder} en yüksek teklif sahibi`
                    : (state.start_price != null ? `Başlangıç fiyatı: ₺${Number(state.start_price).toLocaleString('tr-TR')}` : '');
                document.getElementById('auctionBidCount').textContent = state.bid_count > 0 ? `${state.bid_count} teklif` : '';
                bidInfo.style.display = 'block';
            }

            const isHost = document.getElementById('hostSetup') !== null && _isHostPage;

            if (isHost) {
                hostControls.style.display = 'flex';
                if (state.status === 'idle') {
                    hostSetup.style.display = 'flex';
                    document.getElementById('btnAuctionStart').style.display = '';
                    document.getElementById('btnAuctionPause').style.display = 'none';
                    document.getElementById('btnAuctionResume').style.display = 'none';
                    document.getElementById('btnAuctionEnd').style.display = 'none';
                } else if (state.status === 'active') {
                    hostSetup.style.display = 'none';
                    document.getElementById('btnAuctionStart').style.display = 'none';
                    document.getElementById('btnAuctionPause').style.display = '';
                    document.getElementById('btnAuctionResume').style.display = 'none';
                    document.getElementById('btnAuctionEnd').style.display = '';
                } else if (state.status === 'paused') {
                    hostSetup.style.display = 'none';
                    document.getElementById('btnAuctionStart').style.display = 'none';
                    document.getElementById('btnAuctionPause').style.display = 'none';
                    document.getElementById('btnAuctionResume').style.display = '';
                    document.getElementById('btnAuctionEnd').style.display = '';
                } else if (state.status === 'ended') {
                    hostSetup.style.display = 'flex';
                    document.getElementById('btnAuctionStart').style.display = '';
                    document.getElementById('btnAuctionPause').style.display = 'none';
                    document.getElementById('btnAuctionResume').style.display = 'none';
                    document.getElementById('btnAuctionEnd').style.display = 'none';
                }
            } else if (viewerControls) {
                // Viewer
                viewerControls.style.display = (state.status === 'active') ? 'flex' : 'none';
            }
        }

        function setAuctionMsg(msg, type = '') {
            const el = document.getElementById('auctionMsg');
            el.textContent = msg;
            el.className = type;
        }

        let _isHostPage = false;

        function initAuction(sid, isHost) {
            _isHostPage = isHost;
            document.getElementById('auctionPanel').classList.add('visible');

            // Önce gereksiz elementleri kaldır
            if (!isHost) {
                document.getElementById('hostSetup').remove();
                document.getElementById('hostControls').remove();
            } else {
                document.getElementById('viewerControls').remove();
            }

            // Hemen varsayılan idle state ile render et (WS'yi bekleme)
            updateAuctionUI({ status: 'idle', bid_count: 0 });

            // WebSocket bağlan, güncelleme gelince yeniden render et
            Auction.connect(sid, isHost, (state) => updateAuctionUI(state));
        }

        // HOST: Başlat
        document.getElementById('btnAuctionStart')?.addEventListener('click', async () => {
            const itemName = document.getElementById('auctionItemInput').value.trim();
            const startPrice = parseFloat(document.getElementById('auctionStartPrice').value);
            if (!itemName) return setAuctionMsg('Ürün adı girin', 'error');
            if (isNaN(startPrice) || startPrice < 0) return setAuctionMsg('Geçerli başlangıç fiyatı girin', 'error');
            try {
                await Auction.startAuction(itemName, startPrice);
                setAuctionMsg('Açık artırma başladı!', 'success');
            } catch (e) { setAuctionMsg(e.message, 'error'); }
        });

        // HOST: Duraklat
        document.getElementById('btnAuctionPause')?.addEventListener('click', async () => {
            try { await Auction.pauseAuction(); setAuctionMsg('Duraklatıldı', ''); }
            catch (e) { setAuctionMsg(e.message, 'error'); }
        });

        // HOST: Devam
        document.getElementById('btnAuctionResume')?.addEventListener('click', async () => {
            try { await Auction.resumeAuction(); setAuctionMsg('Devam ediyor', 'success'); }
            catch (e) { setAuctionMsg(e.message, 'error'); }
        });

        // HOST: Bitir
        document.getElementById('btnAuctionEnd')?.addEventListener('click', async () => {
            if (!confirm('Açık artırmayı bitirmek istediğinizden emin misiniz?')) return;
            try { await Auction.endAuction(); setAuctionMsg('Açık artırma tamamlandı', ''); }
            catch (e) { setAuctionMsg(e.message, 'error'); }
        });

        // VIEWER: Preset teklif
        async function quickBid(increment) {
            if (_currentAuctionStatus !== 'active') return setAuctionMsg('Açık artırma aktif değil', 'error');
            const amount = _currentBid + increment;
            await submitBid(amount);
        }

        // VIEWER: Custom teklif
        document.getElementById('btnCustomBid')?.addEventListener('click', async () => {
            const val = parseFloat(document.getElementById('customBidInput').value);
            if (isNaN(val) || val <= 0) return setAuctionMsg('Geçerli tutar girin', 'error');
            await submitBid(val);
        });

        async function submitBid(amount) {
            try {
                const state = await Auction.placeBid(amount);
                // REST response'dan anlık güncelle (pub/sub'u beklemeden)
                if (state) updateAuctionUI(state);
                setAuctionMsg(`₺${Number(amount).toLocaleString('tr-TR')} teklifiniz alındı!`, 'success');
                document.getElementById('customBidInput') && (document.getElementById('customBidInput').value = '');
            } catch (e) { setAuctionMsg(e.message, 'error'); }
        }

        init();
    </script>
</body>
</html>
