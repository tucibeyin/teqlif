<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Yayın — teqlif</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
    <link rel="apple-touch-icon" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        /* ── Reset & full-viewport ─────────────────────────────────────── */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        nav {
            flex-shrink: 0;
            background: #1e293b;
            border-bottom-color: #334155;
        }

        .logo  { color: var(--primary-light); }
        .nav-links a { color: #94a3b8; }
        .nav-links a:hover { background: #334155; color: var(--primary-light); }

        /* ── Ana kapsayıcı ─────────────────────────────────────────────── */
        .stream-root {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* ── Video sütunu ──────────────────────────────────────────────── */
        .video-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Video wrap: kalan alanı doldurur */
        .video-wrap {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            min-height: 0;
        }

        .video-wrap video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scaleX(-1);
        }

        /* Bağlanıyor overlay */
        .connecting-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: #94a3b8;
            font-size: 0.9rem;
            z-index: 10;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #334155;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Video placeholder (host yok) */
        .video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: #64748b;
            z-index: 5;
        }

        .video-placeholder svg { opacity: 0.4; }

        /* ── Video overlay: üst bar (LIVE + viewer) ─────────────────── */
        #videoOverlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 0.75rem 1rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 6;
        }

        .live-badge {
            background: #ef4444;
            color: #fff;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 4px;
            letter-spacing: 0.6px;
        }

        .viewer-count {
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 0.8rem;
            padding: 3px 10px;
            border-radius: 20px;
        }

        /* Üst bar içinde küçük status mesajı */
        #statusMsg {
            font-size: 0.78rem;
            color: #94a3b8;
            background: rgba(0,0,0,0.45);
            padding: 2px 10px;
            border-radius: 12px;
            max-width: 280px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #statusMsg:empty { display: none; }
        #statusMsg.error { color: #f87171; }

        /* ── Video overlay: alt bar (başlık + kontroller) ───────────── */
        #streamMeta {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 0.8rem 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 1rem;
            z-index: 6;
        }

        .stream-meta-info h2 {
            font-size: 0.95rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }

        .stream-meta-info span {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .stream-meta-controls {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
            align-items: center;
        }

        /* Overlay butonları küçük */
        .stream-meta-controls .btn {
            padding: 0.4rem 0.85rem;
            font-size: 0.8rem;
            border-radius: 7px;
        }

        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-slate  { background: rgba(51,65,85,0.85); color: #e2e8f0; backdrop-filter: blur(4px); }
        .btn-slate:hover { background: rgba(71,85,105,0.9); }

        /* ── Açık Artırma Şeridi (video-col altında) ────────────────── */
        .auction-panel {
            display: none;
            flex-shrink: 0;
            background: #1e293b;
            border-top: 1px solid #334155;
        }

        .auction-panel.visible {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            flex-wrap: wrap;
            min-height: 56px;
        }

        .auction-status-badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .badge-active  { background: #22c55e; color: #fff; }
        .badge-paused  { background: #f59e0b; color: #000; }
        .badge-idle    { background: #475569; color: #fff; }
        .badge-ended   { background: #ef4444; color: #fff; }

        .auction-title {
            font-size: 0.82rem;
            font-weight: 700;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
            flex-shrink: 0;
        }

        /* Fiyat bilgisi — şerit içinde yatay */
        .auction-bid-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .auction-current-price {
            font-size: 1.25rem;
            font-weight: 800;
            color: #22c55e;
            line-height: 1;
        }

        .auction-current-bidder,
        .auction-bid-count {
            font-size: 0.72rem;
            color: #64748b;
            line-height: 1.3;
        }

        /* Host setup formu — şerit içinde yatay */
        .auction-setup {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex: 1;
            flex-wrap: wrap;
        }

        .auction-setup input, .auction-setup select {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 0.35rem 0.65rem;
            font-size: 0.8rem;
            outline: none;
            min-width: 0;
        }

        #manualInputs { display: flex; gap: .5rem; align-items: center; flex: 1; }
        #manualInputs input:first-child { flex: 2; }
        #manualInputs input:last-child  { flex: 1; }

        .auction-setup input:focus,
        .auction-setup select:focus { border-color: var(--primary); }

        /* Custom listing picker */
        #listingPicker { flex: 1; position: relative; min-width: 0; }
        #listingPickerTrigger {
            display: flex; align-items: center; gap: 7px;
            padding: 0.38rem 0.7rem;
            background: #1e293b; border: 1.5px solid #334155;
            border-radius: 8px; cursor: pointer; font-size: 0.8rem; color: #e2e8f0;
        }
        #listingPickerTrigger:hover { border-color: var(--primary); }
        #listingPickerTrigger.open { border-color: var(--primary); }
        #listingPickerTrigger img { width: 26px; height: 26px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
        #listingPickerTrigger span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #listingPickerDropdown {
            display: none; position: absolute; bottom: calc(100% + 4px); left: 0; right: 0; z-index: 150;
            background: #1e293b; border: 1.5px solid #334155; border-radius: 10px;
            max-height: 210px; overflow-y: auto; box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
        }
        #listingPickerDropdown.open { display: block; }
        .lp-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer; }
        .lp-item:hover { background: #334155; }
        .lp-item.selected { background: rgba(6,182,212,0.12); }
        .lp-item img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .lp-img-placeholder { width: 36px; height: 36px; background: #334155; border-radius: 6px; flex-shrink: 0; display:flex; align-items:center; justify-content:center; font-size:14px; }
        .lp-info { flex: 1; min-width: 0; }
        .lp-title { font-size: 0.78rem; font-weight: 600; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lp-price { font-size: 0.7rem; color: #4ade80; }

        .auction-mode-toggle {
            background: none; border: 1px solid #475569; color: #94a3b8;
            border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.75rem;
            cursor: pointer; flex-shrink: 0; white-space: nowrap;
        }
        .auction-mode-toggle:hover { border-color: var(--primary); color: var(--primary); }
        .auction-mode-toggle.active { border-color: var(--primary); color: var(--primary); background: rgba(6,182,212,0.1); }

        /* Listing detail modal */
        .listing-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72); z-index: 200;
            display: flex; align-items: flex-end; justify-content: center;
        }
        .listing-modal {
            background: #1e293b; border-radius: 22px 22px 0 0;
            width: 100%; max-width: 480px; max-height: 80vh;
            overflow-y: auto; padding: 12px 20px 36px;
        }
        .listing-modal-handle {
            width: 38px; height: 4px; background: #334155;
            border-radius: 2px; margin: 0 auto 16px;
        }
        .listing-modal img {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 12px; margin-bottom: 14px;
        }
        .listing-modal-title { font-size: 1rem; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
        .listing-modal-price { font-size: 1.25rem; font-weight: 800; color: #4ade80; margin-bottom: 4px; }
        .listing-modal-seller { font-size: 0.78rem; color: #64748b; margin-bottom: 12px; }
        .listing-modal-desc { font-size: 0.83rem; color: #94a3b8; line-height: 1.55; border-top: 1px solid #334155; padding-top: 10px; }

        /* Viewer: pinlenmiş ilan butonu */
        #auctionListingBtn {
            font-size: 0.72rem; font-weight: 600;
            color: #fbbf24; border: 1px solid rgba(251,191,36,0.4);
            background: rgba(251,191,36,0.1); border-radius: 6px;
            padding: 0.25rem 0.6rem; cursor: pointer;
            text-decoration: none; flex-shrink: 0; white-space: nowrap;
        }
        #auctionListingBtn:hover { background: rgba(251,191,36,0.2); }

        /* Host kontrol butonları */
        .auction-host-controls {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }

        .auction-host-controls .btn,
        .auction-viewer-controls .btn {
            padding: 0.35rem 0.75rem;
            font-size: 0.78rem;
            border-radius: 6px;
        }

        .btn-green { background: #16a34a; color: #fff; }
        .btn-green:hover { background: #15803d; }
        .btn-amber { background: #d97706; color: #fff; }
        .btn-amber:hover { background: #b45309; }

        /* Viewer teklif butonları */
        .auction-viewer-controls {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .auction-viewer-controls input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 6px;
            padding: 0.35rem 0.65rem;
            font-size: 0.8rem;
            width: 100px;
            outline: none;
        }

        .auction-viewer-controls input:focus { border-color: var(--primary); }

        #auctionMsg {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-left: auto;
        }

        #auctionMsg.error   { color: #f87171; }
        #auctionMsg.success { color: #4ade80; }

        /* ── Sohbet sütunu ─────────────────────────────────────────────── */
        .chat-col {
            width: 290px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #1e293b;
            border-left: 1px solid #334155;
            overflow: hidden;
        }

        .chat-col-header {
            flex-shrink: 0;
            padding: 0.65rem 1rem;
            border-bottom: 1px solid #334155;
            font-size: 0.68rem;
            font-weight: 800;
            color: #64748b;
            letter-spacing: 0.7px;
        }

        /* chatPanel: JS panel.style.display = '' yaptığında CSS flex devreye girer */
        #chatPanel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-height: 0;
        }

        #chatMessages::-webkit-scrollbar { width: 3px; }
        #chatMessages::-webkit-scrollbar-track { background: transparent; }
        #chatMessages::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        .chat-msg {
            font-size: 0.82rem;
            line-height: 1.45;
            word-break: break-word;
        }

        .chat-username { color: #60a5fa; font-weight: 700; }
        .chat-content  { color: #e2e8f0; }

        .chat-empty {
            font-size: 0.8rem;
            color: #475569;
            text-align: center;
            margin-top: 0.5rem;
        }

        .chat-input-row {
            flex-shrink: 0;
            display: flex;
            gap: 0.5rem;
            align-items: center;
            padding: 0.65rem 0.75rem;
            border-top: 1px solid #334155;
        }

        .chat-input-row input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            border-radius: 20px;
            padding: 0.45rem 0.9rem;
            font-size: 0.83rem;
            outline: none;
            min-width: 0;
        }

        .chat-input-row input:focus { border-color: var(--primary); }

        .chat-send-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .chat-send-btn:hover { background: var(--primary-dark); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/canli.html">← Yayınlar</a>
        </div>
    </nav>

    <div class="stream-root">

        <!-- ── Sol: Video + Açık Artırma ───────────────────────────── -->
        <div class="video-col">

            <div class="video-wrap" id="videoContainer">

                <!-- Medya elementleri -->
                <video id="mainVideo" autoplay playsinline muted style="display:none;"></video>
                <audio id="remoteAudio" autoplay style="display:none;"></audio>

                <!-- Bağlanıyor spinner -->
                <div class="connecting-overlay" id="connectingOverlay">
                    <div class="spinner"></div>
                    <span>Bağlanıyor...</span>
                </div>

                <!-- Video placeholder (host yok / bekleniyor) -->
                <div class="video-placeholder" id="videoPlaceholder" style="display:none;">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <path d="M15 10l4.553-2.07A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                    </svg>
                    <span id="placeholderText">Yayın bekleniyor...</span>
                </div>

                <!-- Üst bar: LIVE + izleyici + status -->
                <div id="videoOverlay" style="display:none;">
                    <span class="live-badge">CANLI</span>
                    <div id="statusMsg"></div>
                    <span class="viewer-count" id="viewerCount">👁 0</span>
                </div>

                <!-- Alt bar: başlık + kontrol butonları -->
                <div id="streamMeta" style="display:none;">
                    <div class="stream-meta-info">
                        <h2 id="metaTitle">—</h2>
                        <span id="metaHost"></span>
                    </div>
                    <div class="stream-meta-controls">
                        <button class="btn btn-slate" id="btnToggleMic" style="display:none;">🎙 Mikrofon Kapat</button>
                        <button class="btn btn-danger" id="btnEndStream" style="display:none;">Yayını Bitir</button>
                        <button class="btn btn-slate" id="btnLeave" style="display:none;">Ayrıl</button>
                    </div>
                </div>

            </div><!-- /.video-wrap -->

            <!-- ── Açık Artırma Şeridi ───────────────────────────── -->
            <div class="auction-panel" id="auctionPanel">

                <span class="auction-status-badge badge-idle" id="auctionBadge">Bekleniyor</span>
                <span class="auction-title" id="auctionItemName">Açık Artırma</span>

                <!-- Fiyat bilgisi (active/paused/ended) -->
                <div class="auction-bid-info" id="auctionBidInfo" style="display:none;">
                    <div class="auction-current-price" id="auctionPrice">—</div>
                    <div>
                        <div class="auction-current-bidder" id="auctionBidder"></div>
                        <div class="auction-bid-count" id="auctionBidCount"></div>
                    </div>
                </div>

                <!-- HOST: ürün girişi (idle) -->
                <div class="auction-setup" id="hostSetup" style="display:none;">
                    <!-- İlan seçici toggle -->
                    <button class="auction-mode-toggle" id="btnListingMode" title="İlanlarımdan seç">📋 İlanlarımdan</button>
                    <!-- Custom listing picker (listing modda görünür) -->
                    <div id="listingPicker" style="display:none;">
                        <div id="listingPickerTrigger" onclick="toggleListingPicker()">
                            <span id="listingPickerText">— İlan seçin —</span>
                            <span style="color:#64748b;font-size:10px;">▾</span>
                        </div>
                        <div id="listingPickerDropdown"></div>
                    </div>
                    <!-- Manuel giriş alanları -->
                    <div id="manualInputs">
                        <input type="text" id="auctionItemInput" placeholder="Ürün adı" maxlength="200">
                        <input type="number" id="auctionStartPrice" placeholder="Başlangıç (₺)" min="0" step="1">
                    </div>
                </div>

                <!-- Viewer: pinlenmiş ilan butonu (JS ile gösterilir) -->
                <a id="auctionListingBtn" style="display:none;">📌 İlana Bak</a>

                <!-- HOST: kontrol butonları -->
                <div class="auction-host-controls" id="hostControls" style="display:none;">
                    <button class="btn btn-green" id="btnAuctionStart">▶ Başlat</button>
                    <button class="btn btn-amber" id="btnAuctionPause" style="display:none;">⏸ Duraklat</button>
                    <button class="btn btn-slate" id="btnAuctionResume" style="display:none;">▶ Devam</button>
                    <button class="btn btn-danger" id="btnAuctionEnd" style="display:none;">⏹ Bitir</button>
                </div>

                <!-- VIEWER: teklif butonları -->
                <div class="auction-viewer-controls" id="viewerControls" style="display:none;">
                    <button class="btn btn-slate" onclick="quickBid(100)">+₺100</button>
                    <button class="btn btn-slate" onclick="quickBid(200)">+₺200</button>
                    <button class="btn btn-slate" onclick="quickBid(500)">+₺500</button>
                    <button class="btn btn-slate" onclick="quickBid(1000)">+₺1000</button>
                    <input type="number" id="customBidInput" placeholder="Özel (₺)" min="1" step="1">
                    <button class="btn btn-green" id="btnCustomBid">Teklif Ver</button>
                </div>

                <div id="auctionMsg"></div>

            </div><!-- /#auctionPanel -->

        </div><!-- /.video-col -->

        <!-- ── Sağ: Canlı Sohbet ─────────────────────────────────── -->
        <div class="chat-col">
            <div class="chat-col-header">CANLI SOHBET</div>

            <div id="chatPanel" style="display:none;">
                <div id="chatMessages">
                    <div class="chat-empty" id="chatEmpty">Henüz mesaj yok. İlk mesajı sen gönder!</div>
                </div>
                <div class="chat-input-row" id="chatInputRow" style="display:none;">
                    <input type="text" id="chatInput" placeholder="Mesaj yaz..." maxlength="200" autocomplete="off">
                    <button class="chat-send-btn" id="chatSendBtn" title="Gönder">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div><!-- /.chat-col -->

    </div><!-- /.stream-root -->

    <!-- Listing detail modal (viewer: pinlenmiş ilan) -->
    <div class="listing-modal-overlay" id="listingModalOverlay" style="display:none;" onclick="closeListingModal(event)">
        <div class="listing-modal" id="listingModal">
            <div class="listing-modal-handle"></div>
            <img id="listingModalImg" src="" alt="" style="display:none;">
            <div class="listing-modal-title" id="listingModalTitle"></div>
            <div class="listing-modal-price" id="listingModalPrice"></div>
            <div class="listing-modal-seller" id="listingModalSeller"></div>
            <div class="listing-modal-desc" id="listingModalDesc" style="display:none;"></div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
    <script src="/static/js/stream.js"></script>
    <script src="/static/js/auction.js"></script>
    <script src="/static/js/chat.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const streamIdParam = parseInt(params.get('id'));
        const isHostParam = params.get('host') === '1';

        const mainVideo = document.getElementById('mainVideo');
        const remoteAudio = document.getElementById('remoteAudio');
        const connectingOverlay = document.getElementById('connectingOverlay');
        const videoPlaceholder = document.getElementById('videoPlaceholder');
        const videoOverlay = document.getElementById('videoOverlay');
        const streamMeta = document.getElementById('streamMeta');
        const statusMsg = document.getElementById('statusMsg');
        const viewerCount = document.getElementById('viewerCount');
        let micEnabled = true;
        let streamId = null;

        function setStatus(msg, isError = false) {
            statusMsg.textContent = msg;
            statusMsg.className = isError ? 'error' : '';
        }

        function showVideo() {
            connectingOverlay.style.display = 'none';
            videoPlaceholder.style.display = 'none';
            mainVideo.style.display = 'block';
            videoOverlay.style.display = 'flex';
            streamMeta.style.display = 'flex';
        }

        function showPlaceholder(text) {
            connectingOverlay.style.display = 'none';
            videoPlaceholder.style.display = 'flex';
            document.getElementById('placeholderText').textContent = text;
            videoOverlay.style.display = 'flex';
            streamMeta.style.display = 'flex';
        }

        async function init() {
            if (!Auth.getToken()) {
                window.location.href = '/giris.html';
                return;
            }

            const info = Stream.load();

            // Session'da bilgi yoksa ya da ID uyuşmuyorsa
            if (!info || (streamIdParam && info.stream_id !== streamIdParam)) {
                setStatus('Oturum bilgisi bulunamadı. Yeniden yönlendiriliyor...', true);
                setTimeout(() => window.location.href = '/canli.html', 2000);
                return;
            }

            streamId = info.stream_id;
            const isHost = info.is_host;

            // Meta bilgileri göster
            document.getElementById('metaTitle').textContent = info.title || 'Canlı Yayın';
            if (!isHost && info.host_username) {
                document.getElementById('metaHost').textContent = `@${info.host_username} yayın yapıyor`;
            } else {
                document.getElementById('metaHost').textContent = 'Siz yayın yapıyorsunuz';
            }

            if (isHost) {
                document.getElementById('btnEndStream').style.display = '';
                document.getElementById('btnToggleMic').style.display = '';
            } else {
                document.getElementById('btnLeave').style.display = '';
                // mainVideo daima muted — ses remoteAudio elementi üzerinden çıkar
            }

            let videoStarted = false;
            try {
                const room = await connectRoom({
                    livekit_url: info.livekit_url,
                    token: info.token,
                    isHost,
                    localVideoEl: isHost ? mainVideo : null,
                    remoteVideoEl: isHost ? null : mainVideo,
                    remoteAudioEl: isHost ? null : remoteAudio,
                    onDisconnect: () => {
                        if (!isHost) {
                            Stream.clear();
                            setTimeout(() => window.location.href = '/', 2000);
                        }
                    },
                    onRemoteVideo: () => {
                        videoStarted = true;
                        showVideo();
                        setStatus('');
                    },
                });

                if (isHost) {
                    showVideo();
                    setStatus('Yayın canlı. İzleyiciler sizi görebilir.');
                } else if (!videoStarted) {
                    // Video henüz gelmediyse placeholder göster (onRemoteVideo gelince kapanır)
                    showPlaceholder('Yayına bağlanıldı, video bekleniyor...');
                }

                viewerCount.textContent = `👁 ${info.viewer_count ?? 0}`;

                // Açık artırmayı başlat
                initAuction(streamId, isHost);

                // Sohbeti başlat
                initChat(streamId);

            } catch (err) {
                console.error(err);
                setStatus('Bağlantı kurulamadı: ' + (err.message || 'Bilinmeyen hata'), true);
                connectingOverlay.innerHTML = `<span style="color:#f87171">Bağlantı hatası</span>`;
            }
        }

        // Yayını Bitir (Host)
        document.getElementById('btnEndStream').addEventListener('click', async () => {
            const btn = document.getElementById('btnEndStream');
            btn.disabled = true;
            btn.textContent = 'Bitiriliyor...';
            try {
                await Stream.endStream(streamId);
            } catch (_) {}
            Chat.disconnect();
            await disconnectRoom();
            Stream.clear();
            window.location.href = '/canli.html';
        });

        // Mikrofon Kapat/Aç (Host)
        document.getElementById('btnToggleMic').addEventListener('click', async () => {
            const btn = document.getElementById('btnToggleMic');
            micEnabled = !micEnabled;
            if (_room) {
                await _room.localParticipant.setMicrophoneEnabled(micEnabled);
            }
            btn.textContent = micEnabled ? '🎙 Mikrofon Kapat' : '🔇 Mikrofon Aç';
        });

        // Ayrıl (Viewer)
        document.getElementById('btnLeave').addEventListener('click', async () => {
            const btn = document.getElementById('btnLeave');
            btn.disabled = true;
            btn.textContent = 'Ayrılıyor...';
            try {
                await Stream.leaveStream(streamId);
            } catch (_) {}
            Chat.disconnect();
            await disconnectRoom();
            Stream.clear();
            window.location.href = '/canli.html';
        });

        // ── Açık Artırma ────────────────────────────────────────────────

        let _currentAuctionStatus = 'idle';
        let _currentBid = 0;
        let _currentListingId = null;  // viewer için pinlenmiş ilan
        let _selectedListingId = null; // host için seçilen ilan
        let _listingMode = false;      // host: listing mi manual mı

        function updateAuctionUI(state) {
            _currentAuctionStatus = state.status;
            _currentListingId = state.listing_id || null;

            const panel = document.getElementById('auctionPanel');
            const badge = document.getElementById('auctionBadge');
            const bidInfo = document.getElementById('auctionBidInfo');
            const hostSetup = document.getElementById('hostSetup');
            const hostControls = document.getElementById('hostControls');
            const viewerControls = document.getElementById('viewerControls');

            panel.classList.add('visible');
            badge.textContent = Auction.STATUS_LABELS[state.status] || state.status;
            badge.className = 'auction-status-badge badge-' + state.status;

            if (state.item_name) document.getElementById('auctionItemName').textContent = state.item_name;

            if (state.current_bid != null) {
                _currentBid = state.current_bid;
                document.getElementById('auctionPrice').textContent = '₺' + Number(state.current_bid).toLocaleString('tr-TR');
                document.getElementById('auctionBidder').textContent = state.current_bidder
                    ? `@${state.current_bidder} en yüksek teklif sahibi`
                    : (state.start_price != null ? `Başlangıç: ₺${Number(state.start_price).toLocaleString('tr-TR')}` : '');
                document.getElementById('auctionBidCount').textContent = state.bid_count > 0 ? `${state.bid_count} teklif` : '';
                bidInfo.style.display = 'block';
            }

            // Viewer: pinlenmiş ilan butonu
            const listingBtn = document.getElementById('auctionListingBtn');
            if (listingBtn) {
                listingBtn.style.display = (!_isHostPage && _currentListingId && state.status !== 'idle') ? '' : 'none';
            }

            const isHost = document.getElementById('hostSetup') !== null && _isHostPage;

            if (isHost) {
                hostControls.style.display = 'flex';
                if (state.status === 'idle' || state.status === 'ended') {
                    hostSetup.style.display = 'flex';
                    document.getElementById('btnAuctionStart').style.display = '';
                    document.getElementById('btnAuctionPause').style.display = 'none';
                    document.getElementById('btnAuctionResume').style.display = 'none';
                    document.getElementById('btnAuctionEnd').style.display = 'none';
                    // ended sonrası listing seçimini sıfırla
                    if (state.status === 'ended') _resetListingMode();
                } else if (state.status === 'active') {
                    hostSetup.style.display = 'none';
                    document.getElementById('btnAuctionStart').style.display = 'none';
                    document.getElementById('btnAuctionPause').style.display = '';
                    document.getElementById('btnAuctionResume').style.display = 'none';
                    document.getElementById('btnAuctionEnd').style.display = '';
                } else if (state.status === 'paused') {
                    hostSetup.style.display = 'none';
                    document.getElementById('btnAuctionStart').style.display = 'none';
                    document.getElementById('btnAuctionPause').style.display = 'none';
                    document.getElementById('btnAuctionResume').style.display = '';
                    document.getElementById('btnAuctionEnd').style.display = '';
                }
            } else if (viewerControls) {
                viewerControls.style.display = (state.status === 'active') ? 'flex' : 'none';
            }
        }

        function setAuctionMsg(msg, type = '') {
            const el = document.getElementById('auctionMsg');
            el.textContent = msg;
            el.className = type;
        }

        let _isHostPage = false;

        function initAuction(sid, isHost) {
            _isHostPage = isHost;
            document.getElementById('auctionPanel').classList.add('visible');

            if (!isHost) {
                document.getElementById('hostSetup').remove();
                document.getElementById('hostControls').remove();
                document.getElementById('btnListingMode')?.remove();
                // Viewer: listing butonu tıklaması
                const lb = document.getElementById('auctionListingBtn');
                if (lb) lb.addEventListener('click', showListingModal);
            } else {
                document.getElementById('viewerControls').remove();
                document.getElementById('auctionListingBtn')?.remove();
                // Host: ilanları yükle
                loadHostListings();
                // Host: listing mode toggle
                document.getElementById('btnListingMode')?.addEventListener('click', toggleListingMode);
                // Picker dışına tıklayınca kapat
                document.addEventListener('click', (e) => {
                    const picker = document.getElementById('listingPicker');
                    if (picker && !picker.contains(e.target)) _closeListingPicker();
                });
            }

            updateAuctionUI({ status: 'idle', bid_count: 0 });
            Auction.connect(sid, isHost, (state) => updateAuctionUI(state));
        }

        // ── Host: ilan listesi yükleme (custom picker) ───────────────
        let _hostListings = [];

        async function loadHostListings() {
            try {
                _hostListings = await apiFetch('/listings/my?active=true');
                _buildPickerItems();
            } catch (_) {}
        }

        function _buildPickerItems() {
            const dd = document.getElementById('listingPickerDropdown');
            if (!dd) return;
            dd.innerHTML = '';
            if (!_hostListings.length) {
                dd.innerHTML = '<div style="padding:12px;text-align:center;color:#64748b;font-size:0.8rem;">Aktif ilanınız yok</div>';
                return;
            }
            _hostListings.forEach(l => {
                let imgs = l.image_urls || [];
                if (typeof imgs === 'string') { try { imgs = JSON.parse(imgs); } catch(_) { imgs = []; } }
                const rawImg = imgs.length ? imgs[0] : (l.image_url || null);
                const imgSrc = rawImg ? (rawImg.startsWith('http') || rawImg.startsWith('/') ? rawImg : `/uploads/${rawImg}`) : null;
                const priceStr = l.price ? '₺' + Number(l.price).toLocaleString('tr-TR') : '';
                const imgHtml = imgSrc
                    ? `<img src="${imgSrc}" alt="" style="width:36px;height:36px;object-fit:cover;border-radius:6px;flex-shrink:0;pointer-events:none;" onerror="this.style.display='none'">`
                    : `<div class="lp-img-placeholder" style="pointer-events:none;">📦</div>`;
                const infoHtml = `<div class="lp-info" style="pointer-events:none;"><div class="lp-title">${l.title}</div>${priceStr ? `<div class="lp-price">${priceStr}</div>` : ''}</div>`;
                const item = document.createElement('div');
                item.className = 'lp-item';
                item.dataset.id = String(l.id);
                item.innerHTML = imgHtml + infoHtml;
                dd.appendChild(item);
            });
            // Event delegation: tüm tıklamalar tek listenerdan
            dd.onclick = (e) => {
                const item = e.target.closest('.lp-item');
                if (!item) return;
                const id = parseInt(item.dataset.id, 10);
                const l = _hostListings.find(x => x.id === id);
                if (!l) return;
                let imgs = l.image_urls || [];
                if (typeof imgs === 'string') { try { imgs = JSON.parse(imgs); } catch(_) { imgs = []; } }
                const rawImg = imgs.length ? imgs[0] : (l.image_url || null);
                const imgSrc = rawImg ? (rawImg.startsWith('http') || rawImg.startsWith('/') ? rawImg : `/uploads/${rawImg}`) : null;
                _selectListing(id, l.title, imgSrc, l.price);
            };
        }

        function toggleListingPicker() {
            const dd = document.getElementById('listingPickerDropdown');
            const trigger = document.getElementById('listingPickerTrigger');
            if (!dd) return;
            const open = dd.classList.toggle('open');
            trigger.classList.toggle('open', open);
        }

        function _closeListingPicker() {
            document.getElementById('listingPickerDropdown')?.classList.remove('open');
            document.getElementById('listingPickerTrigger')?.classList.remove('open');
        }

        function _selectListing(id, title, imgSrc, price) {
            _selectedListingId = id;
            // Trigger güncelle
            const trigger = document.getElementById('listingPickerTrigger');
            const priceStr = price ? ' — ₺' + Number(price).toLocaleString('tr-TR') : '';
            trigger.innerHTML = imgSrc
                ? `<img src="${imgSrc}" alt="">`
                : `<div style="width:26px;height:26px;background:#334155;border-radius:4px;flex-shrink:0;"></div>`;
            trigger.innerHTML += `<span>${title}${priceStr}</span><span style="color:#64748b;font-size:10px;">▾</span>`;
            trigger.onclick = toggleListingPicker;
            // Seçili item'ı işaretle
            document.querySelectorAll('.lp-item').forEach(el => el.classList.toggle('selected', parseInt(el.dataset.id) === id));
            _closeListingPicker();
        }

        function toggleListingMode() {
            _listingMode = !_listingMode;
            const btn = document.getElementById('btnListingMode');
            const picker = document.getElementById('listingPicker');
            const itemInput = document.getElementById('auctionItemInput');
            btn.classList.toggle('active', _listingMode);
            picker.style.display = _listingMode ? '' : 'none';
            itemInput.style.display = _listingMode ? 'none' : '';
            if (!_listingMode) {
                _selectedListingId = null;
                // Picker'ı sıfırla
                const trigger = document.getElementById('listingPickerTrigger');
                if (trigger) { trigger.innerHTML = '<span id="listingPickerText">— İlan seçin —</span><span style="color:#64748b;font-size:10px;">▾</span>'; trigger.onclick = toggleListingPicker; }
                document.querySelectorAll('.lp-item').forEach(el => el.classList.remove('selected'));
                _closeListingPicker();
            }
        }

        function _resetListingMode() {
            _listingMode = false;
            _selectedListingId = null;
            const btn = document.getElementById('btnListingMode');
            const picker = document.getElementById('listingPicker');
            const itemInput = document.getElementById('auctionItemInput');
            if (btn) btn.classList.remove('active');
            if (picker) picker.style.display = 'none';
            if (itemInput) itemInput.style.display = '';
            const trigger = document.getElementById('listingPickerTrigger');
            if (trigger) { trigger.innerHTML = '<span id="listingPickerText">— İlan seçin —</span><span style="color:#64748b;font-size:10px;">▾</span>'; trigger.onclick = toggleListingPicker; }
            document.querySelectorAll('.lp-item').forEach(el => el.classList.remove('selected'));
            _closeListingPicker();
        }

        // HOST: Başlat
        document.getElementById('btnAuctionStart')?.addEventListener('click', async () => {
            const startPrice = parseFloat(document.getElementById('auctionStartPrice').value);
            if (isNaN(startPrice) || startPrice < 0) return setAuctionMsg('Geçerli başlangıç fiyatı girin', 'error');
            if (_listingMode) {
                if (!_selectedListingId) return setAuctionMsg('Bir ilan seçin', 'error');
                try {
                    await Auction.startAuction(null, startPrice, _selectedListingId);
                    setAuctionMsg('Açık artırma başladı!', 'success');
                } catch (e) { setAuctionMsg(e.detail || e.message || 'Hata', 'error'); }
                return;
            }
            const itemName = document.getElementById('auctionItemInput').value.trim();
            if (!itemName) return setAuctionMsg('Ürün adı girin', 'error');
            try {
                await Auction.startAuction(itemName, startPrice);
                setAuctionMsg('Açık artırma başladı!', 'success');
            } catch (e) { setAuctionMsg(e.detail || e.message || 'Hata', 'error'); }
        });

        // ── Viewer: ilan popup ───────────────────────────────────────
        async function showListingModal(e) {
            if (e) e.preventDefault();
            if (!_currentListingId) return;
            try {
                const listing = await apiFetch(`/listings/${_currentListingId}`);
                const imgs = listing.image_urls && listing.image_urls.length ? listing.image_urls : (listing.image_url ? [listing.image_url] : []);
                const imgEl = document.getElementById('listingModalImg');
                if (imgs.length) {
                    imgEl.src = imgs[0].startsWith('http') ? imgs[0] : `https://teqlif.com${imgs[0]}`;
                    imgEl.style.display = 'block';
                } else {
                    imgEl.style.display = 'none';
                }
                document.getElementById('listingModalTitle').textContent = listing.title || '';
                document.getElementById('listingModalPrice').textContent = listing.price != null
                    ? '₺ ' + Number(listing.price).toLocaleString('tr-TR')
                    : 'Fiyat Belirtilmemiş';
                const seller = listing.user?.username ? `@${listing.user.username}` : '';
                document.getElementById('listingModalSeller').textContent = seller;
                const descEl = document.getElementById('listingModalDesc');
                if (listing.description) {
                    descEl.textContent = listing.description;
                    descEl.style.display = 'block';
                } else {
                    descEl.style.display = 'none';
                }
                document.getElementById('listingModalOverlay').style.display = 'flex';
            } catch (_) {}
        }

        function closeListingModal(e) {
            if (e.target === document.getElementById('listingModalOverlay')) {
                document.getElementById('listingModalOverlay').style.display = 'none';
            }
        }

        // HOST: Duraklat
        document.getElementById('btnAuctionPause')?.addEventListener('click', async () => {
            try { await Auction.pauseAuction(); setAuctionMsg('Duraklatıldı', ''); }
            catch (e) { setAuctionMsg(e.message, 'error'); }
        });

        // HOST: Devam
        document.getElementById('btnAuctionResume')?.addEventListener('click', async () => {
            try { await Auction.resumeAuction(); setAuctionMsg('Devam ediyor', 'success'); }
            catch (e) { setAuctionMsg(e.message, 'error'); }
        });

        // HOST: Bitir
        document.getElementById('btnAuctionEnd')?.addEventListener('click', async () => {
            if (!confirm('Açık artırmayı bitirmek istediğinizden emin misiniz?')) return;
            try { await Auction.endAuction(); setAuctionMsg('Açık artırma tamamlandı', ''); }
            catch (e) { setAuctionMsg(e.message, 'error'); }
        });

        // VIEWER: Preset teklif
        async function quickBid(increment) {
            if (_currentAuctionStatus !== 'active') return setAuctionMsg('Açık artırma aktif değil', 'error');
            const amount = _currentBid + increment;
            await submitBid(amount);
        }

        // VIEWER: Custom teklif
        document.getElementById('btnCustomBid')?.addEventListener('click', async () => {
            const val = parseFloat(document.getElementById('customBidInput').value);
            if (isNaN(val) || val <= 0) return setAuctionMsg('Geçerli tutar girin', 'error');
            await submitBid(val);
        });

        async function submitBid(amount) {
            try {
                const state = await Auction.placeBid(amount);
                if (state) updateAuctionUI(state);
                setAuctionMsg(`₺${Number(amount).toLocaleString('tr-TR')} teklifiniz alındı!`, 'success');
                document.getElementById('customBidInput') && (document.getElementById('customBidInput').value = '');
            } catch (e) { setAuctionMsg(e.message, 'error'); }
        }

        // ── Sohbet ──────────────────────────────────────────────────────

        function initChat(sid) {
            const panel = document.getElementById('chatPanel');
            panel.style.display = '';

            if (Auth.getToken()) {
                document.getElementById('chatInputRow').style.display = 'flex';
            }

            Chat.connect(sid);

            // İlk mesaj gelince "empty" yazısını kaldır
            const messages = document.getElementById('chatMessages');
            const observer = new MutationObserver(() => {
                const empty = document.getElementById('chatEmpty');
                if (empty && messages.children.length > 1) empty.remove();
            });
            observer.observe(messages, { childList: true });

            const input = document.getElementById('chatInput');
            const sendBtn = document.getElementById('chatSendBtn');

            function doSend() {
                const content = input.value.trim();
                if (!content) return;
                Chat.sendMessage(content);
                input.value = '';
            }

            sendBtn.addEventListener('click', doSend);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') doSend();
            });
        }

        init();
    </script>
</body>
</html>
