<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlanlarım — teqlif</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script src="/static/js/sentry-init.js"></script>

    <style>
        .page-wrap {
            max-width: 680px;
            margin: 2rem auto;
            padding: 0 1.25rem 4rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .page-header a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: .85rem;
        }

        .page-header a:hover {
            color: #111;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 1.25rem;
        }

        .tab-btn {
            flex: 1;
            padding: .75rem;
            border: none;
            background: none;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            transition: background .15s, color .15s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: #f0fdfa;
        }

        /* Listing cards */
        .listing-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: .85rem 1rem;
            margin-bottom: .75rem;
            text-decoration: none;
            color: inherit;
            transition: box-shadow .15s;
        }

        .listing-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, .12);
        }

        .listing-thumb {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #d1d5db;
        }

        .listing-thumb img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
        }

        .listing-info {
            flex: 1;
            min-width: 0;
        }

        .listing-title {
            font-weight: 600;
            font-size: .95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: .2rem;
        }

        .listing-price {
            color: var(--primary);
            font-weight: 700;
            font-size: .9rem;
        }

        .listing-status {
            font-size: .75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: .5rem;
        }

        .status-active {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-passive {
            background: #fef9c3;
            color: #ca8a04;
        }

        .listing-actions {
            display: flex;
            gap: .4rem;
            flex-shrink: 0;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .95rem;
            transition: background .15s;
        }

        .action-btn:hover {
            background: #f3f4f6;
        }

        .action-btn.danger {
            border-color: #fca5a5;
            color: #dc2626;
        }

        .action-btn.danger:hover {
            background: #fef2f2;
        }

        .action-btn.toggle-on {
            border-color: #86efac;
            color: #16a34a;
        }

        .action-btn.toggle-off {
            border-color: #fde68a;
            color: #ca8a04;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: .75rem;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2403555634390058" crossorigin="anonymous"></script>
</head>

<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/hesabim.html" id="navHesabim" style="display:none;">Hesabım</a>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-header">
            <a href="/hesabim.html">← Hesabım</a>
            <h1 class="page-title" id="pageTitle">İlanlarım</h1>
        </div>

        <div class="tab-bar">
            <button class="tab-btn" id="tabActive">✓ Aktif</button>
            <button class="tab-btn" id="tabPassive">✕ Pasif</button>
        </div>

        <div id="listContainer">
            <div class="empty-state">
                <div>Yükleniyor...</div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ilanlarim-page.js?v=1"></script>
</body>

</html>
