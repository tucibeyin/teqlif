    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        if (Auth.getToken()) window.location.href = '/';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alert');
            alertEl.className = 'alert';

            btn.disabled = true;
            btn.textContent = 'Giriş yapılıyor...';

            try {
                await Auth.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                window.location.href = '/';
            } catch (err) {
                if (err.error?.code === 'EMAIL_NOT_VERIFIED') {
                    const email = document.getElementById('email').value.trim();
                    try {
                        await apiFetch('/auth/resend-code', {
                            method: 'POST',
                            body: JSON.stringify({ email }),
                        });
                    } catch (_) {}
                    window.location.href = '/kayit.html?email=' + encodeURIComponent(email) + '&verify=1';
                    return;
                }
                alertEl.textContent = err.error?.message || err.detail || 'Bir hata oluştu';
                alertEl.className = 'alert alert-error show';
                btn.disabled = false;
                btn.textContent = 'Giriş Yap';
            }
        });
    </script>
