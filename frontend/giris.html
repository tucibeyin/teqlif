<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş — teqlif</title>
    <meta name="description" content="teqlif hesabına giriş yap ve ilanlarına devam et.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://teqlif.com/giris.html">
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
    <link rel="apple-touch-icon" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://98dfdd738860420a9c221abf4ddf35cb@o4511052861538304.ingest.us.sentry.io/4511053913391104",
            integrations: [
                Sentry.browserTracingIntegration(),
            ],
            tracesSampleRate: 1.0,
        });
    </script>

</head>

<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/kayit.html">Kayıt Ol</a>
        </div>
    </nav>

    <div class="page-center">
        <div class="form-card">
            <h2>Hoş geldin</h2>
            <p class="subtitle">Hesabına giriş yap</p>

            <div class="alert alert-error" id="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" placeholder="ornek@mail.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" placeholder="Şifrenizi girin" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
                    Giriş Yap
                </button>
            </form>

            <div class="form-footer">
                Hesabın yok mu? <a href="/kayit.html">Kayıt ol</a>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        if (Auth.getToken()) window.location.href = '/';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertEl = document.getElementById('alert');
            alertEl.className = 'alert';

            btn.disabled = true;
            btn.textContent = 'Giriş yapılıyor...';

            try {
                await Auth.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                window.location.href = '/';
            } catch (err) {
                alertEl.textContent = err.detail || 'Bir hata oluştu';
                alertEl.className = 'alert alert-error show';
                btn.disabled = false;
                btn.textContent = 'Giriş Yap';
            }
        });
    </script>
</body>

</html>
