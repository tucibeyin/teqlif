<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teqlif Backoffice</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            min-width: 320px;
        }

        .hidden {
            display: none !important;
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem;
            margin: 0.5rem 0 1rem 0;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        /* Dashboard */
        #admin-content {
            width: 95vw;
            max-width: 1200px;
            margin-top: 2rem;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-bar h1 {
            margin: 0;
            color: #10b981;
            font-size: 2rem;
        }

        .table-container {
            background: #1e293b;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .table-container h3 {
            padding: 1rem;
            margin: 0;
            background: #334155;
            text-align: left;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: #0f172a;
        }

        th,
        td {
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }

        tbody tr:hover {
            background: #1e293b;
            filter: brightness(1.2);
        }

        .action-btn {
            background: #3b82f6;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            width: auto;
        }

        /* Modal (Popup) Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            width: 90%;
            max-width: 400px;
            position: relative;
            border: 1px solid #334155;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: transparent;
            color: white;
            width: auto;
            padding: 0;
            font-size: 1.5rem;
            line-height: 1;
        }

        .divider {
            border-top: 1px solid #334155;
            margin: 1.5rem 0;
        }

        label {
            text-align: left;
            display: block;
            font-size: 0.9rem;
            color: #94a3b8;
        }
    </style>
</head>

<body>

    <div class="container" id="auth-container">
        <div id="step-google">
            <h3>Yönetici Girişi (1/2)</h3>
            <div id="buttonDiv" style="margin-top: 1.5rem;"></div>
        </div>
        <div id="step-password" class="hidden">
            <h3>Güvenlik Anahtarı (2/2)</h3>
            <input type="password" id="admin-pass" placeholder="Harici Şifrenizi Girin"
                onkeypress="if(event.key === 'Enter') verifyPassword()">
            <button onclick="verifyPassword()">Sisteme Giriş Yap</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <div class="header-bar">
            <h1>TEQLIF ADMIN PANELİ</h1>
            <button onclick="adminLogout()" style="background: #ef4444; width: auto;">Güvenli Çıkış</button>
        </div>

        <div class="table-container">
            <h3>Son Kayıt Olan Kullanıcılar</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Kullanıcı Adı</th>
                        <th>Email</th>
                        <th>Durum</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="user-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="user-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modal-title" style="margin-top:0; color:#10b981;">Kullanıcı Yönetimi</h2>

            <label>Ad Soyad</label>
            <input type="text" id="edit-fullname">

            <label>E-posta Adresi</label>
            <input type="email" id="edit-email">

            <label>Hesap Durumu</label>
            <select id="edit-active">
                <option value="true">✅ Aktif</option>
                <option value="false">❌ Yasaklı (Ban)</option>
            </select>

            <button onclick="submitUserUpdate()" style="background: #10b981;">Bilgileri Kaydet</button>

            <div class="divider"></div>

            <label>Yeni Şifre Belirle (Backdoor)</label>
            <input type="password" id="edit-password" placeholder="En az 8 karakter">
            <button onclick="submitPasswordReset()" style="background: #ef4444;">Şifreyi Değiştir</button>
        </div>
    </div>

    <script>
        const GOOGLE_CLIENT_ID = "232766108005-c193qv63qkv5c6m3c2klrs2ihoj7b2ok.apps.googleusercontent.com";
        let currentUserId = null;

        window.onload = function () {
            if (sessionStorage.getItem("teqlif_admin_session")) { showFinalStep(); }
            else { initGoogleAuth(); }
        };

        function initGoogleAuth() {
            google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleCredentialResponse });
            google.accounts.id.renderButton(document.getElementById("buttonDiv"), { theme: "outline", size: "large", width: "100%" });
        }

        async function handleCredentialResponse(response) {
            const res = await fetch('/api/admin-auth/verify-google', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: response.credential })
            });
            if (res.ok) {
                document.getElementById("step-google").classList.add("hidden");
                document.getElementById("step-password").classList.remove("hidden");
            } else { alert("Bu hesaba erişim yetkisi yok."); }
        }

        async function verifyPassword() {
            const password = document.getElementById("admin-pass").value;
            const res = await fetch('/api/admin-auth/verify-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: password })
            });
            if (res.ok) {
                const data = await res.json();
                sessionStorage.setItem("teqlif_admin_session", data.access_token);
                showFinalStep();
            } else { alert("Hatalı şifre!"); }
        }

        async function showFinalStep() {
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("admin-content").classList.remove("hidden");
            await loadRecentUsers();
        }

        async function loadRecentUsers() {
            const token = sessionStorage.getItem("teqlif_admin_session");
            const res = await fetch('/api/admin-data/users/recent?limit=50', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const users = await res.json();
                const tbody = document.getElementById("user-table-body");
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>#${u.id}</td>
                        <td style="font-weight: bold;">@${u.username}</td>
                        <td>${u.email}</td>
                        <td>${u.is_active ? '<span style="color:#10b981;">Aktif</span>' : '<span style="color:#ef4444;">Yasaklı</span>'}</td>
                        <td>
                            <button onclick="openModal(${u.id}, '${u.username}', '${u.full_name}', '${u.email}', ${u.is_active})" class="action-btn">Yönet</button>
                        </td>
                    </tr>
                `).join("");
            } else { adminLogout(); }
        }

        // --- MODAL İŞLEMLERİ ---
        function openModal(id, username, fullname, email, isActive) {
            currentUserId = id;
            document.getElementById("modal-title").innerText = "@" + username;
            document.getElementById("edit-fullname").value = fullname;
            document.getElementById("edit-email").value = email;
            document.getElementById("edit-active").value = isActive ? "true" : "false";
            document.getElementById("edit-password").value = "";
            document.getElementById("user-modal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("user-modal").classList.add("hidden");
            currentUserId = null;
        }

        async function submitUserUpdate() {
            if (!currentUserId) return;
            const token = sessionStorage.getItem("teqlif_admin_session");

            const payload = {
                full_name: document.getElementById("edit-fullname").value,
                email: document.getElementById("edit-email").value,
                is_active: document.getElementById("edit-active").value === "true"
            };

            const res = await fetch(`/api/admin-data/users/${currentUserId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("Bilgiler başarıyla güncellendi.");
                closeModal();
                loadRecentUsers(); // Tabloyu yenile
            } else { alert("Güncelleme başarısız."); }
        }

        async function submitPasswordReset() {
            if (!currentUserId) return;
            const newPassword = document.getElementById("edit-password").value;
            if (newPassword.length < 8) { alert("Şifre en az 8 karakter olmalı."); return; }

            const token = sessionStorage.getItem("teqlif_admin_session");
            const res = await fetch(`/api/admin-data/users/${currentUserId}/password`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ new_password: newPassword })
            });

            if (res.ok) {
                alert("Şifre başarıyla değiştirildi!");
                closeModal();
            } else { alert("Şifre değiştirme başarısız."); }
        }

        function adminLogout() {
            sessionStorage.removeItem("teqlif_admin_session");
            location.reload();
        }
    </script>
</body>

</html>
