<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teqlif Backoffice</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            min-width: 320px;
        }

        .hidden {
            display: none !important;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            margin: 1rem 0;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        /* Dashboard & Table Styles */
        #admin-content {
            width: 95vw;
            max-width: 1200px;
            margin-top: 2rem;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-bar h1 {
            margin: 0;
            color: #10b981;
            font-size: 2rem;
        }

        .table-container {
            background: #1e293b;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .table-container h3 {
            padding: 1rem;
            margin: 0;
            background: #334155;
            text-align: left;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: #0f172a;
        }

        th,
        td {
            padding: 1rem;
            border-bottom: 1px solid #334155;
        }

        tbody tr:hover {
            background: #1e293b;
            filter: brightness(1.2);
        }

        .action-btn {
            background: #3b82f6;
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
            width: auto;
        }
    </style>
</head>

<body>

    <div class="container" id="auth-container">
        <div id="step-google">
            <h3>Yönetici Girişi (1/2)</h3>
            <div id="buttonDiv" style="margin-top: 1.5rem;"></div>
        </div>

        <div id="step-password" class="hidden">
            <h3>Güvenlik Anahtarı (2/2)</h3>
            <input type="password" id="admin-pass" placeholder="Harici Şifrenizi Girin"
                onkeypress="if(event.key === 'Enter') verifyPassword()">
            <button onclick="verifyPassword()">Sisteme Giriş Yap</button>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        <div class="header-bar">
            <h1>TEQLIF ADMIN PANELİ</h1>
            <button onclick="adminLogout()" style="background: #ef4444; width: auto;">Güvenli Çıkış</button>
        </div>

        <div class="table-container">
            <h3>Son Kayıt Olan Kullanıcılar</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Kullanıcı Adı</th>
                        <th>Email</th>
                        <th>Kayıt Tarihi</th>
                        <th>İşlem</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Google Cloud Console'dan aldığın Client ID
        const GOOGLE_CLIENT_ID = "BURAYA_ALDIĞIN_CLIENT_ID_GELECEK.apps.googleusercontent.com";

        window.onload = function () {
            // Eğer session'da token varsa güvenlik adımlarını atla ve paneli yükle
            if (sessionStorage.getItem("teqlif_admin_session")) {
                showFinalStep();
            } else {
                initGoogleAuth();
            }
        };

        // --- ADIM 1: GOOGLE AUTH ---
        function initGoogleAuth() {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "outline", size: "large", width: "100%" }
            );
        }

        async function handleCredentialResponse(response) {
            try {
                const res = await fetch('/api/admin-auth/verify-google', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });

                if (res.ok) {
                    // Google onaylandı, şifre adımına geç
                    document.getElementById("step-google").classList.add("hidden");
                    document.getElementById("step-password").classList.remove("hidden");
                    document.getElementById("admin-pass").focus();
                } else {
                    const err = await res.json();
                    alert(err.detail || "Bu hesaba erişim yetkisi yok.");
                }
            } catch (error) {
                alert("Bağlantı hatası oluştu.");
            }
        }

        // --- ADIM 2: HARİCİ ŞİFRE KONTROLÜ ---
        async function verifyPassword() {
            const password = document.getElementById("admin-pass").value;
            if (!password) return;

            try {
                const res = await fetch('/api/admin-auth/verify-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });

                if (res.ok) {
                    const data = await res.json();
                    // Token'ı sadece bu sekme için kaydet (İzolasyon)
                    sessionStorage.setItem("teqlif_admin_session", data.access_token);
                    showFinalStep();
                } else {
                    const err = await res.json();
                    alert(err.detail || "Hatalı şifre!");
                }
            } catch (error) {
                alert("Bağlantı hatası oluştu.");
            }
        }

        // --- ADIM 3: PANELİ GÖSTER VE VERİLERİ ÇEK ---
        async function showFinalStep() {
            document.getElementById("auth-container").classList.add("hidden");
            document.getElementById("admin-content").classList.remove("hidden");

            // Tabloyu doldur
            await loadRecentUsers();
        }

        async function loadRecentUsers() {
            const token = sessionStorage.getItem("teqlif_admin_session");
            try {
                const res = await fetch('/api/admin-data/users/recent?limit=50', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const users = await res.json();
                    const tbody = document.getElementById("user-table-body");

                    if (users.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">Henüz kayıtlı kullanıcı yok.</td></tr>`;
                        return;
                    }

                    tbody.innerHTML = users.map(u => `
                        <tr>
                            <td>#${u.id}</td>
                            <td style="font-weight: bold;">@${u.username}</td>
                            <td>${u.email}</td>
                            <td>${new Date(u.created_at).toLocaleString('tr-TR', { dateStyle: 'medium', timeStyle: 'short' })}</td>
                            <td>
                                <button onclick="editUser(${u.id}, '${u.username}')" class="action-btn">Yönet</button>
                            </td>
                        </tr>
                    `).join("");
                } else {
                    // Token geçersizse veya süresi dolduysa çıkış yap
                    alert("Oturum süreniz dolmuş veya yetkiniz reddedildi.");
                    adminLogout();
                }
            } catch (error) {
                console.error("Veri çekme hatası:", error);
            }
        }

        // --- İŞLEMLER ---
        function editUser(userId, username) {
            // Bir sonraki adımda buraya Modal (Açılır pencere) mantığını kuracağız
            alert("Kullanıcı @" + username + " (ID: " + userId + ") için yönetim menüsü çok yakında eklenecek.");
        }

        function adminLogout() {
            sessionStorage.removeItem("teqlif_admin_session");
            location.reload();
        }
    </script>
</body>

</html>
