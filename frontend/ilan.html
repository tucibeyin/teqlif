<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ og_title }} — teqlif</title>
    <meta name="robots" content="index, follow">
    <meta name="description" content="{{ og_description }}">
    <meta property="og:type" content="product">
    <meta property="og:site_name" content="teqlif">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_description }}">
    <meta property="og:image" content="{{ og_image }}">
    <meta property="og:url" content="{{ og_url }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ og_title }}">
    <meta name="twitter:description" content="{{ og_description }}">
    <meta name="twitter:image" content="{{ og_image }}">
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://98dfdd738860420a9c221abf4ddf35cb@o4511052861538304.ingest.us.sentry.io/4511053913391104",
            integrations: [
                Sentry.browserTracingIntegration(),
            ],
            tracesSampleRate: 1.0,
        });
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #f1f3f5;
        }

        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1rem 4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            color: #111;
        }

        /* Grid layout */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.25rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── LEFT COLUMN ── */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .07);
            overflow: hidden;
        }

        /* Gallery */
        .gallery-main {
            position: relative;
            background: #111;
            aspect-ratio: 4/3;
            overflow: hidden;
            cursor: zoom-in;
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            user-select: none;
        }

        .gallery-main img.active {
            display: block;
        }

        .no-photo {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-size: 3.5rem;
            background: #1f2937;
        }

        /* Counter badge */
        .gallery-counter {
            position: absolute;
            bottom: 12px;
            right: 14px;
            background: rgba(0, 0, 0, .55);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            pointer-events: none;
        }

        /* Nav arrows */
        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, .5);
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
            z-index: 2;
        }

        .gallery-arrow:hover {
            background: rgba(0, 0, 0, .75);
        }

        .gallery-arrow.prev {
            left: 10px;
        }

        .gallery-arrow.next {
            right: 10px;
        }

        /* Thumbnails strip */
        .gallery-thumbs {
            display: flex;
            gap: 6px;
            padding: 8px;
            background: #f9fafb;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .gallery-thumbs img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            opacity: .7;
            transition: opacity .15s, border-color .15s;
        }

        .gallery-thumbs img.active {
            border-color: var(--primary, #06b6d4);
            opacity: 1;
        }

        /* Detail body */
        .detail-body {
            padding: 1.25rem 1.5rem 1.5rem;
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }

        .cat-badge {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--primary, #06b6d4);
            background: #ecfeff;
            padding: 2px 9px;
            border-radius: 20px;
            letter-spacing: .02em;
        }

        .ilan-date {
            font-size: 0.76rem;
            color: #9ca3af;
        }

        .detail-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 1rem;
            line-height: 1.35;
            color: #111;
        }

        .detail-location {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #f1f3f5;
            margin: 1.1rem 0;
        }

        .sec-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #9ca3af;
            margin-bottom: 0.55rem;
        }

        .detail-desc {
            font-size: 0.94rem;
            color: #374151;
            line-height: 1.75;
            white-space: pre-wrap;
        }

        /* ── RIGHT COLUMN ── */
        .price-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .07);
            padding: 1.4rem;
        }

        .price-tag {
            font-size: 2rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 0.2rem;
            line-height: 1;
        }

        .price-note {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-bottom: 1.25rem;
        }

        .btn-contact {
            display: block;
            width: 100%;
            padding: 0.85rem;
            background: var(--primary, #06b6d4);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: opacity .15s;
            margin-bottom: 0.6rem;
        }

        .btn-contact:hover {
            opacity: .88;
        }

        .btn-msg {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: #f3f4f6;
            color: #374151;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background .15s;
        }

        .btn-msg:hover {
            background: #e5e7eb;
        }

        /* Seller card (right column) */
        .seller-block {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .07);
            padding: 1.1rem 1.4rem;
        }

        .seller-row {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .seller-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--primary, #06b6d4);
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .seller-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .seller-username {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .seller-goto {
            margin-left: auto;
            font-size: 0.78rem;
            color: var(--primary, #06b6d4);
            font-weight: 600;
        }

        /* ── LIGHTBOX ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            border-radius: 4px;
            user-select: none;
        }

        .lb-close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            opacity: .8;
        }

        .lb-close:hover {
            opacity: 1;
        }

        .lb-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, .12);
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-arrow:hover {
            background: rgba(255, 255, 255, .22);
        }

        .lb-arrow.prev {
            left: 16px;
        }

        .lb-arrow.next {
            right: 16px;
        }

        .lb-counter {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, .7);
            font-size: 0.85rem;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .error-box {
            text-align: center;
            padding: 4rem 1rem;
            color: #6b7280;
            background: #fff;
            border-radius: 12px;
        }

        .error-box h2 {
            margin-bottom: .5rem;
        }

        .error-box a {
            color: var(--primary, #06b6d4);
        }

        /* ── Sil butonu ── */
        .btn-delete {
            display: block;
            width: 100%;
            padding: .65rem 1rem;
            background: #fff2f2;
            color: #dc2626;
            border: 1.5px solid #fca5a5;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background .15s;
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        /* ── Favori butonu ── */
        .btn-fav {
            display: block;
            width: 100%;
            padding: .75rem;
            background: #fff5f5;
            color: #dc2626;
            border: 1.5px solid #fca5a5;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background .15s;
            margin-bottom: .6rem;
        }

        .btn-fav:hover {
            background: #fee2e2;
        }

        .btn-fav.active {
            background: #dc2626;
            color: #fff;
            border-color: #dc2626;
        }

        .btn-fav.active:hover {
            background: #b91c1c;
        }

        /* ── Toggle aktif butonu ── */
        .btn-toggle {
            display: block;
            width: 100%;
            padding: .65rem 1rem;
            background: #f0fdf4;
            color: #16a34a;
            border: 1.5px solid #86efac;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background .15s;
            margin-bottom: .6rem;
        }

        .btn-toggle:hover {
            background: #dcfce7;
        }

        .btn-toggle.passive {
            background: #fefce8;
            color: #ca8a04;
            border-color: #fde68a;
        }

        .btn-toggle.passive:hover {
            background: #fef9c3;
        }

        /* ── Şikayet butonu ── */
        .btn-report {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .35rem .75rem;
            font-size: .78rem;
            color: #9ca3af;
            background: none;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            transition: color .15s, border-color .15s;
            margin-top: .5rem;
        }

        .btn-report:hover {
            color: #ef4444;
            border-color: #fca5a5;
        }

        /* ── Modal ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 900;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 1.75rem;
            width: 92%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .18);
        }

        .modal-box h3 {
            margin: 0 0 1rem;
            font-size: 1.05rem;
        }

        .modal-box select,
        .modal-box textarea {
            width: 100%;
            padding: .6rem .8rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: .9rem;
            margin-bottom: .75rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        .modal-box textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: .75rem;
            justify-content: flex-end;
        }

        .modal-actions .btn-cancel {
            padding: .55rem 1.1rem;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: .88rem;
        }

        .modal-actions .btn-send {
            padding: .55rem 1.2rem;
            background: #06b6d4;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-actions .btn-send:disabled {
            opacity: .5;
            cursor: default;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/kesfet.html" style="display:inline-flex;align-items:center;gap:0.3rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                Keşfet
            </a>
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="page-wrap">
        <a href="javascript:history.back()" class="back-link">← Geri</a>
        <div id="content"></div>
    </div>

    <!-- Şikayet Modal -->
    <div class="modal-backdrop" id="reportModal">
        <div class="modal-box">
            <h3>🚩 İlanı Şikayet Et</h3>
            <select id="reportReason">
                <option value="">-- Neden seçin --</option>
                <option value="Yanıltıcı ilan">Yanıltıcı ilan</option>
                <option value="Yasadışı ürün">Yasadışı ürün</option>
                <option value="Spam / tekrar ilan">Spam / tekrar ilan</option>
                <option value="Uygunsuz içerik">Uygunsuz içerik</option>
                <option value="Dolandırıcılık şüphesi">Dolandırıcılık şüphesi</option>
                <option value="Diğer">Diğer</option>
            </select>
            <textarea id="reportNote" placeholder="Ek açıklama (isteğe bağlı)" rows="3"></textarea>
            <div id="reportMsg" style="font-size:.83rem;color:#dc2626;margin-bottom:.5rem;display:none;"></div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeReportModal()">Vazgeç</button>
                <button class="btn-send" id="reportSendBtn" onclick="submitReport()">Gönder</button>
            </div>
        </div>
    </div>

    <!-- Silme Onay Modal -->
    <div class="modal-backdrop" id="deleteModal">
        <div class="modal-box">
            <h3>İlanı Sil</h3>
            <p style="font-size:.9rem;color:#4b5563;margin:0 0 1.25rem;">Bu ilanı silmek istediğinize emin misiniz? Bu
                işlem geri alınamaz.</p>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeDeleteModal()">Vazgeç</button>
                <button class="btn-send" style="background:#dc2626;" id="deleteSendBtn" onclick="confirmDelete()">Evet,
                    Sil</button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="lbClickOutside(event)">
        <button class="lb-close" onclick="closeLb()">✕</button>
        <button class="lb-arrow prev" onclick="lbNav(-1)">‹</button>
        <img id="lbImg" src="" alt="">
        <button class="lb-arrow next" onclick="lbNav(1)">›</button>
        <div class="lb-counter" id="lbCounter"></div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        const listingId = parseInt(location.pathname.split('/').pop(), 10);
        let _urls = [];
        let _cur = 0;
        let _isFavorited = false;
        let _isActive = true;

        /* ── Helpers ── */
        function fmt(p) {
            if (p == null) return 'Fiyat belirtilmemiş';
            return '₺ ' + Number(p).toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        }

        function timeAgo(iso) {
            const diff = (Date.now() - new Date(iso)) / 1000;
            if (diff < 60) return 'Az önce';
            if (diff < 3600) return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff / 3600) + ' sa önce';
            if (diff < 2592000) return Math.floor(diff / 86400) + ' gün önce';
            return new Date(iso).toLocaleDateString('tr-TR');
        }

        function esc(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const CAT = {
            elektronik: '📱 Elektronik', vasita: '🚗 Vasıta', emlak: '🏠 Emlak',
            giyim: '👗 Giyim', spor: '⚽ Spor', kitap: '📚 Kitap & Müzik',
            ev: '🛋 Ev & Bahçe', diger: '📦 Diğer',
        };

        /* ── Gallery ── */
        function goTo(idx) {
            _cur = (idx + _urls.length) % _urls.length;
            document.querySelectorAll('.gallery-main img').forEach((img, i) => {
                img.classList.toggle('active', i === _cur);
            });
            document.querySelectorAll('.gallery-thumbs img').forEach((img, i) => {
                img.classList.toggle('active', i === _cur);
                if (i === _cur) img.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
            });
            const el = document.getElementById('galleryCounter');
            if (el) el.textContent = `${_cur + 1} / ${_urls.length}`;
        }

        /* ── Lightbox ── */
        function openLb(idx) {
            _cur = idx;
            document.getElementById('lightbox').classList.add('open');
            lbRefresh();
            document.addEventListener('keydown', lbKey);
        }

        function closeLb() {
            document.getElementById('lightbox').classList.remove('open');
            document.removeEventListener('keydown', lbKey);
        }

        function lbRefresh() {
            document.getElementById('lbImg').src = _urls[_cur];
            document.getElementById('lbCounter').textContent = `${_cur + 1} / ${_urls.length}`;
        }

        function lbNav(dir) {
            _cur = (_cur + dir + _urls.length) % _urls.length;
            lbRefresh();
            goTo(_cur);
        }

        function lbKey(e) {
            if (e.key === 'ArrowLeft') lbNav(-1);
            if (e.key === 'ArrowRight') lbNav(1);
            if (e.key === 'Escape') closeLb();
        }

        function lbClickOutside(e) {
            if (e.target === document.getElementById('lightbox')) closeLb();
        }

        /* ── Build gallery HTML ── */
        function buildGallery(urls) {
            if (!urls.length) {
                return `<div class="gallery-main" style="cursor:default"><div class="no-photo">📷</div></div>`;
            }
            const imgs = urls.map((u, i) =>
                `<img src="${u}" class="${i === 0 ? 'active' : ''}" alt="Fotoğraf ${i + 1}" loading="lazy">`
            ).join('');

            const arrows = urls.length > 1 ? `
                <button class="gallery-arrow prev" onclick="goTo(_cur-1);event.stopPropagation()">‹</button>
                <button class="gallery-arrow next" onclick="goTo(_cur+1);event.stopPropagation()">›</button>` : '';

            const counter = urls.length > 1
                ? `<div class="gallery-counter" id="galleryCounter">1 / ${urls.length}</div>` : '';

            const thumbs = urls.length > 1 ? `
                <div class="gallery-thumbs">
                    ${urls.map((u, i) =>
                `<img src="${u}" class="${i === 0 ? 'active' : ''}" onclick="goTo(${i})" alt="">`
            ).join('')}
                </div>` : '';

            return `
                <div class="gallery-main" onclick="openLb(_cur)">
                    ${imgs}${arrows}${counter}
                </div>
                ${thumbs}`;
        }

        /* ── Skeleton ── */
        function showSkeleton() {
            document.getElementById('content').innerHTML = `
                <div class="detail-grid">
                    <div>
                        <div class="card">
                            <div class="skeleton" style="aspect-ratio:4/3;border-radius:0"></div>
                            <div class="detail-body">
                                <div class="skeleton" style="height:14px;width:30%;margin-bottom:10px"></div>
                                <div class="skeleton" style="height:26px;width:70%;margin-bottom:14px"></div>
                                <div class="skeleton" style="height:16px;width:50%;margin-bottom:10px"></div>
                                <div class="skeleton" style="height:14px;margin-bottom:8px"></div>
                                <div class="skeleton" style="height:14px;width:80%;margin-bottom:8px"></div>
                                <div class="skeleton" style="height:14px;width:60%"></div>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:1rem">
                        <div class="price-card">
                            <div class="skeleton" style="height:38px;width:60%;margin-bottom:8px"></div>
                            <div class="skeleton" style="height:44px;margin-bottom:8px"></div>
                            <div class="skeleton" style="height:40px"></div>
                        </div>
                    </div>
                </div>`;
        }

        /* ── Main load ── */
        async function load() {
            showSkeleton();
            try {
                const data = await apiFetch(`/listings/${listingId}`);
                _urls = (data.image_urls && data.image_urls.length > 0)
                    ? data.image_urls
                    : data.image_url ? [data.image_url] : [];
                _cur = 0;

                document.title = `${data.title} — teqlif`;

                // ── Dynamic SEO meta tags ──
                const _ogImg = (data.image_urls && data.image_urls[0])
                    ? `https://teqlif.com${data.image_urls[0]}`
                    : (data.image_url ? `https://teqlif.com${data.image_url}` : 'https://teqlif.com/static/icons/icon.svg');
                const _ogDesc = data.description
                    ? data.description.slice(0, 160)
                    : `${data.title} — teqlif'te satılık ilan`;
                const _canonUrl = `https://teqlif.com/ilan/${listingId}`;
                const _setMeta = (prop, val, attr = 'property') => {
                    let el = document.querySelector(`meta[${attr}="${prop}"]`);
                    if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
                    el.setAttribute('content', val);
                };
                let _canon = document.querySelector('link[rel="canonical"]');
                if (!_canon) { _canon = document.createElement('link'); _canon.rel = 'canonical'; document.head.appendChild(_canon); }
                _canon.href = _canonUrl;
                _setMeta('description', _ogDesc, 'name');
                _setMeta('og:url', _canonUrl);
                _setMeta('og:title', document.title);
                _setMeta('og:description', _ogDesc);
                _setMeta('og:image', _ogImg);
                _setMeta('twitter:title', document.title, 'name');
                _setMeta('twitter:description', _ogDesc, 'name');
                _setMeta('twitter:image', _ogImg, 'name');
                // JSON-LD Product schema
                const _ldEl = document.getElementById('ld-json') || (() => {
                    const s = document.createElement('script');
                    s.id = 'ld-json'; s.type = 'application/ld+json';
                    document.head.appendChild(s); return s;
                })();
                _ldEl.textContent = JSON.stringify({
                    '@context': 'https://schema.org',
                    '@type': 'Product',
                    'name': data.title,
                    'description': data.description || data.title,
                    'image': _ogImg,
                    'url': _canonUrl,
                    'offers': {
                        '@type': 'Offer',
                        'price': data.price ?? 0,
                        'priceCurrency': 'TRY',
                        'availability': 'https://schema.org/InStock',
                        'seller': {
                            '@type': 'Person',
                            'name': data.user.full_name || data.user.username
                        }
                    }
                });

                const catLabel = CAT[data.category] || data.category || '';
                const initials = (data.user.full_name || data.user.username || '?')[0].toUpperCase();
                const token = localStorage.getItem('teqlif_token');
                const isLoggedIn = !!token;
                const me = Auth.getUser();
                const isOwner = me && me.id === data.user.id;
                _isActive = data.is_active !== false;

                // Favori durumunu kontrol et (non-owner + logged in)
                if (isLoggedIn && !isOwner) {
                    try {
                        const favResp = await apiFetch(`/favorites/${listingId}`);
                        _isFavorited = favResp.is_favorited || false;
                    } catch (_) { }
                }

                document.getElementById('content').innerHTML = `
                    <div class="detail-grid">

                        <!-- LEFT -->
                        <div style="display:flex;flex-direction:column;gap:1rem">
                            <div class="card">
                                ${buildGallery(_urls)}
                                <div class="detail-body">
                                    <div class="detail-meta">
                                        ${catLabel ? `<span class="cat-badge">${catLabel}</span>` : ''}
                                        <span class="ilan-date">${timeAgo(data.created_at)}</span>
                                    </div>
                                    <h1 class="detail-title">${esc(data.title)}</h1>
                                    ${data.location ? `
                                    <div class="detail-location">
                                        <span>📍</span><span>${esc(data.location)}</span>
                                    </div>` : ''}
                                    ${data.description ? `
                                    <hr class="divider">
                                    <div class="sec-label">Açıklama</div>
                                    <div class="detail-desc">${esc(data.description)}</div>` : ''}
                                    ${!isOwner && isLoggedIn ? `
                                    <div style="margin-top:1rem;text-align:right;">
                                        <button class="btn-report" onclick="openReportModal()">
                                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
                                            Şikayet Et
                                        </button>
                                    </div>` : ''}
                                </div>
                            </div>
                        </div>

                        <!-- RIGHT -->
                        <div style="display:flex;flex-direction:column;gap:1rem">
                            <div class="price-card">
                                <div class="price-tag">${fmt(data.price)}</div>
                                <div class="price-note">KDV dahil</div>
                                ${isOwner
                        ? `<button class="btn-toggle ${_isActive ? '' : 'passive'}" id="toggleBtn" onclick="toggleActive()">
                                           ${_isActive ? '✓ Aktif — Pasife Al' : '✕ Pasif — Aktif Yap'}
                                       </button>
                                       <button class="btn-delete" onclick="openDeleteModal()">İlanı Sil</button>`
                        : isLoggedIn
                            ? `<button class="btn-fav ${_isFavorited ? 'active' : ''}" id="favBtn" onclick="toggleFav()">
                                               ${_isFavorited ? '❤ Favorilerimde' : '♡ Favorilere Ekle'}
                                           </button>
                                           <a href="/mesajlar?to_id=${data.user.id}&to_name=${encodeURIComponent(data.user.full_name || data.user.username)}&to_handle=${encodeURIComponent(data.user.username)}" class="btn-contact">Satıcıya Mesaj Gönder</a>`
                            : `<a href="/giris.html?next=/ilan/${listingId}" class="btn-contact">Satıcıya Mesaj Gönder</a>`
                    }
                                ${!isOwner ? `<a href="/profil/${esc(data.user.username)}" class="btn-msg">Profili Gör</a>` : ''}
                            </div>

                            <div class="seller-block">
                                <div class="sec-label" style="margin-bottom:.75rem">Satıcı</div>
                                <a href="${isOwner ? '/hesabim.html' : '/profil/' + esc(data.user.username)}" class="seller-row">
                                    <div class="seller-avatar">${esc(initials)}</div>
                                    <div>
                                        <div class="seller-name">${esc(data.user.full_name || data.user.username)}</div>
                                        <div class="seller-username">@${esc(data.user.username)}</div>
                                    </div>
                                    <span class="seller-goto">${isOwner ? 'Hesabım →' : 'Profile Git →'}</span>
                                </a>
                            </div>
                        </div>

                    </div>`;

            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="error-box">
                        <h2>İlan bulunamadı</h2>
                        <p><a href="/">Ana sayfaya dön</a></p>
                    </div>`;
            }
        }

        /* ── Şikayet ── */
        function openReportModal() {
            document.getElementById('reportModal').classList.add('open');
        }
        function closeReportModal() {
            document.getElementById('reportModal').classList.remove('open');
            document.getElementById('reportReason').value = '';
            document.getElementById('reportNote').value = '';
            document.getElementById('reportMsg').style.display = 'none';
        }

        /* ── Favori ── */
        async function toggleFav() {
            const btn = document.getElementById('favBtn');
            if (!btn) return;
            btn.disabled = true;
            try {
                if (_isFavorited) {
                    await apiFetch(`/favorites/${listingId}`, { method: 'DELETE' });
                    _isFavorited = false;
                    btn.className = 'btn-fav';
                    btn.textContent = '♡ Favorilere Ekle';
                } else {
                    await apiFetch(`/favorites/${listingId}`, { method: 'POST' });
                    _isFavorited = true;
                    btn.className = 'btn-fav active';
                    btn.textContent = '❤ Favorilerimde';
                }
            } catch (_) { }
            btn.disabled = false;
        }

        /* ── Aktif/Pasif Toggle ── */
        async function toggleActive() {
            const btn = document.getElementById('toggleBtn');
            if (!btn) return;
            btn.disabled = true;
            try {
                const res = await apiFetch(`/listings/${listingId}/toggle`, { method: 'PATCH' });
                _isActive = res.is_active;
                if (_isActive) {
                    btn.className = 'btn-toggle';
                    btn.textContent = '✓ Aktif — Pasife Al';
                } else {
                    btn.className = 'btn-toggle passive';
                    btn.textContent = '✕ Pasif — Aktif Yap';
                }
            } catch (_) { }
            btn.disabled = false;
        }

        async function submitReport() {
            const reason = document.getElementById('reportReason').value;
            const note = document.getElementById('reportNote').value.trim();
            const msg = document.getElementById('reportMsg');
            if (!reason) { msg.textContent = 'Lütfen bir neden seçin.'; msg.style.display = 'block'; return; }
            const btn = document.getElementById('reportSendBtn');
            btn.disabled = true; btn.textContent = 'Gönderiliyor...';
            try {
                await apiFetch('/reports', {
                    method: 'POST',
                    body: JSON.stringify({ listing_id: listingId, reason: reason + (note ? ': ' + note : '') }),
                });
                closeReportModal();
                alert('Şikayetiniz alındı. Teşekkür ederiz.');
            } catch (e) {
                msg.textContent = e.detail || 'Bir hata oluştu.';
                msg.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Gönder';
            }
        }

        /* ── Silme ── */
        function openDeleteModal() {
            document.getElementById('deleteModal').classList.add('open');
        }
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('open');
        }
        async function confirmDelete() {
            const btn = document.getElementById('deleteSendBtn');
            btn.disabled = true; btn.textContent = 'Siliniyor...';
            try {
                await apiFetch(`/listings/${listingId}`, { method: 'DELETE' });
                closeDeleteModal();
                window.location.href = '/';
            } catch (e) {
                btn.disabled = false; btn.textContent = 'Evet, Sil';
                alert(e.detail || 'Silme işlemi başarısız.');
            }
        }

        load();
    </script>
</body>

</html>
