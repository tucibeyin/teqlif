<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan — teqlif</title>
    <meta name="robots" content="index, follow">
    <meta name="description" content="teqlif'te satılık ilan detaylarını incele ve satıcıyla iletişime geç.">
    <!-- Open Graph (dynamic, updated via JS after data load) -->
    <meta property="og:type" content="product">
    <meta property="og:site_name" content="teqlif">
    <meta property="og:locale" content="tr_TR">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
    <link rel="apple-touch-icon" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        * { box-sizing: border-box; }

        body { background: #f1f3f5; }

        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1rem 4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 1rem;
        }
        .back-link:hover { color: #111; }

        /* Grid layout */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.25rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .detail-grid { grid-template-columns: 1fr; }
        }

        /* ── LEFT COLUMN ── */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            overflow: hidden;
        }

        /* Gallery */
        .gallery-main {
            position: relative;
            background: #111;
            aspect-ratio: 4/3;
            overflow: hidden;
            cursor: zoom-in;
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            user-select: none;
        }

        .gallery-main img.active { display: block; }

        .no-photo {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-size: 3.5rem;
            background: #1f2937;
        }

        /* Counter badge */
        .gallery-counter {
            position: absolute;
            bottom: 12px;
            right: 14px;
            background: rgba(0,0,0,.55);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            pointer-events: none;
        }

        /* Nav arrows */
        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,.5);
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
            z-index: 2;
        }

        .gallery-arrow:hover { background: rgba(0,0,0,.75); }
        .gallery-arrow.prev { left: 10px; }
        .gallery-arrow.next { right: 10px; }

        /* Thumbnails strip */
        .gallery-thumbs {
            display: flex;
            gap: 6px;
            padding: 8px;
            background: #f9fafb;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .gallery-thumbs img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            opacity: .7;
            transition: opacity .15s, border-color .15s;
        }

        .gallery-thumbs img.active {
            border-color: var(--primary, #06b6d4);
            opacity: 1;
        }

        /* Detail body */
        .detail-body { padding: 1.25rem 1.5rem 1.5rem; }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }

        .cat-badge {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--primary, #06b6d4);
            background: #ecfeff;
            padding: 2px 9px;
            border-radius: 20px;
            letter-spacing: .02em;
        }

        .ilan-date {
            font-size: 0.76rem;
            color: #9ca3af;
        }

        .detail-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 1rem;
            line-height: 1.35;
            color: #111;
        }

        .detail-location {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #f1f3f5;
            margin: 1.1rem 0;
        }

        .sec-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #9ca3af;
            margin-bottom: 0.55rem;
        }

        .detail-desc {
            font-size: 0.94rem;
            color: #374151;
            line-height: 1.75;
            white-space: pre-wrap;
        }

        /* ── RIGHT COLUMN ── */
        .price-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            padding: 1.4rem;
        }

        .price-tag {
            font-size: 2rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 0.2rem;
            line-height: 1;
        }

        .price-note {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-bottom: 1.25rem;
        }

        .btn-contact {
            display: block;
            width: 100%;
            padding: 0.85rem;
            background: var(--primary, #06b6d4);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: opacity .15s;
            margin-bottom: 0.6rem;
        }

        .btn-contact:hover { opacity: .88; }

        .btn-msg {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: #f3f4f6;
            color: #374151;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background .15s;
        }

        .btn-msg:hover { background: #e5e7eb; }

        /* Seller card (right column) */
        .seller-block {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            padding: 1.1rem 1.4rem;
        }

        .seller-row {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .seller-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--primary, #06b6d4);
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .seller-name { font-weight: 700; font-size: 0.95rem; }
        .seller-username { font-size: 0.75rem; color: #9ca3af; }

        .seller-goto {
            margin-left: auto;
            font-size: 0.78rem;
            color: var(--primary, #06b6d4);
            font-weight: 600;
        }

        /* ── LIGHTBOX ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            border-radius: 4px;
            user-select: none;
        }

        .lb-close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            opacity: .8;
        }

        .lb-close:hover { opacity: 1; }

        .lb-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,.12);
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-arrow:hover { background: rgba(255,255,255,.22); }
        .lb-arrow.prev { left: 16px; }
        .lb-arrow.next { right: 16px; }

        .lb-counter {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,.7);
            font-size: 0.85rem;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg,#f3f4f6 25%,#e5e7eb 50%,#f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .error-box {
            text-align: center;
            padding: 4rem 1rem;
            color: #6b7280;
            background: #fff;
            border-radius: 12px;
        }

        .error-box h2 { margin-bottom: .5rem; }
        .error-box a { color: var(--primary,#06b6d4); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="page-wrap">
        <a href="javascript:history.back()" class="back-link">← Geri</a>
        <div id="content"></div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="lbClickOutside(event)">
        <button class="lb-close" onclick="closeLb()">✕</button>
        <button class="lb-arrow prev" onclick="lbNav(-1)">‹</button>
        <img id="lbImg" src="" alt="">
        <button class="lb-arrow next" onclick="lbNav(1)">›</button>
        <div class="lb-counter" id="lbCounter"></div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        const listingId = parseInt(location.pathname.split('/').pop(), 10);
        let _urls = [];
        let _cur = 0;

        /* ── Helpers ── */
        function fmt(p) {
            if (p == null) return 'Fiyat belirtilmemiş';
            return '₺ ' + Number(p).toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        }

        function timeAgo(iso) {
            const diff = (Date.now() - new Date(iso)) / 1000;
            if (diff < 60)      return 'Az önce';
            if (diff < 3600)    return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400)   return Math.floor(diff / 3600) + ' sa önce';
            if (diff < 2592000) return Math.floor(diff / 86400) + ' gün önce';
            return new Date(iso).toLocaleDateString('tr-TR');
        }

        function esc(s) {
            return String(s ?? '')
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        const CAT = {
            elektronik:'📱 Elektronik', vasita:'🚗 Vasıta', emlak:'🏠 Emlak',
            giyim:'👗 Giyim', spor:'⚽ Spor', kitap:'📚 Kitap & Müzik',
            ev:'🛋 Ev & Bahçe', diger:'📦 Diğer',
        };

        /* ── Gallery ── */
        function goTo(idx) {
            _cur = (idx + _urls.length) % _urls.length;
            document.querySelectorAll('.gallery-main img').forEach((img, i) => {
                img.classList.toggle('active', i === _cur);
            });
            document.querySelectorAll('.gallery-thumbs img').forEach((img, i) => {
                img.classList.toggle('active', i === _cur);
                if (i === _cur) img.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
            });
            const el = document.getElementById('galleryCounter');
            if (el) el.textContent = `${_cur + 1} / ${_urls.length}`;
        }

        /* ── Lightbox ── */
        function openLb(idx) {
            _cur = idx;
            document.getElementById('lightbox').classList.add('open');
            lbRefresh();
            document.addEventListener('keydown', lbKey);
        }

        function closeLb() {
            document.getElementById('lightbox').classList.remove('open');
            document.removeEventListener('keydown', lbKey);
        }

        function lbRefresh() {
            document.getElementById('lbImg').src = _urls[_cur];
            document.getElementById('lbCounter').textContent = `${_cur + 1} / ${_urls.length}`;
        }

        function lbNav(dir) {
            _cur = (_cur + dir + _urls.length) % _urls.length;
            lbRefresh();
            goTo(_cur);
        }

        function lbKey(e) {
            if (e.key === 'ArrowLeft')  lbNav(-1);
            if (e.key === 'ArrowRight') lbNav(1);
            if (e.key === 'Escape')     closeLb();
        }

        function lbClickOutside(e) {
            if (e.target === document.getElementById('lightbox')) closeLb();
        }

        /* ── Build gallery HTML ── */
        function buildGallery(urls) {
            if (!urls.length) {
                return `<div class="gallery-main" style="cursor:default"><div class="no-photo">📷</div></div>`;
            }
            const imgs = urls.map((u, i) =>
                `<img src="${u}" class="${i === 0 ? 'active' : ''}" alt="Fotoğraf ${i+1}" loading="lazy">`
            ).join('');

            const arrows = urls.length > 1 ? `
                <button class="gallery-arrow prev" onclick="goTo(_cur-1);event.stopPropagation()">‹</button>
                <button class="gallery-arrow next" onclick="goTo(_cur+1);event.stopPropagation()">›</button>` : '';

            const counter = urls.length > 1
                ? `<div class="gallery-counter" id="galleryCounter">1 / ${urls.length}</div>` : '';

            const thumbs = urls.length > 1 ? `
                <div class="gallery-thumbs">
                    ${urls.map((u, i) =>
                        `<img src="${u}" class="${i===0?'active':''}" onclick="goTo(${i})" alt="">`
                    ).join('')}
                </div>` : '';

            return `
                <div class="gallery-main" onclick="openLb(_cur)">
                    ${imgs}${arrows}${counter}
                </div>
                ${thumbs}`;
        }

        /* ── Skeleton ── */
        function showSkeleton() {
            document.getElementById('content').innerHTML = `
                <div class="detail-grid">
                    <div>
                        <div class="card">
                            <div class="skeleton" style="aspect-ratio:4/3;border-radius:0"></div>
                            <div class="detail-body">
                                <div class="skeleton" style="height:14px;width:30%;margin-bottom:10px"></div>
                                <div class="skeleton" style="height:26px;width:70%;margin-bottom:14px"></div>
                                <div class="skeleton" style="height:16px;width:50%;margin-bottom:10px"></div>
                                <div class="skeleton" style="height:14px;margin-bottom:8px"></div>
                                <div class="skeleton" style="height:14px;width:80%;margin-bottom:8px"></div>
                                <div class="skeleton" style="height:14px;width:60%"></div>
                            </div>
                        </div>
                    </div>
                    <div style="display:flex;flex-direction:column;gap:1rem">
                        <div class="price-card">
                            <div class="skeleton" style="height:38px;width:60%;margin-bottom:8px"></div>
                            <div class="skeleton" style="height:44px;margin-bottom:8px"></div>
                            <div class="skeleton" style="height:40px"></div>
                        </div>
                    </div>
                </div>`;
        }

        /* ── Main load ── */
        async function load() {
            showSkeleton();
            try {
                const data = await apiFetch(`/listings/${listingId}`);
                _urls = (data.image_urls && data.image_urls.length > 0)
                    ? data.image_urls
                    : data.image_url ? [data.image_url] : [];
                _cur = 0;

                document.title = `${data.title} — teqlif`;

                // ── Dynamic SEO meta tags ──
                const _ogImg = (data.image_urls && data.image_urls[0])
                    ? `https://teqlif.com${data.image_urls[0]}`
                    : (data.image_url ? `https://teqlif.com${data.image_url}` : 'https://teqlif.com/static/icons/icon.svg');
                const _ogDesc = data.description
                    ? data.description.slice(0, 160)
                    : `${data.title} — teqlif'te satılık ilan`;
                const _canonUrl = `https://teqlif.com/ilan/${listingId}`;
                const _setMeta = (prop, val, attr = 'property') => {
                    let el = document.querySelector(`meta[${attr}="${prop}"]`);
                    if (!el) { el = document.createElement('meta'); el.setAttribute(attr, prop); document.head.appendChild(el); }
                    el.setAttribute('content', val);
                };
                let _canon = document.querySelector('link[rel="canonical"]');
                if (!_canon) { _canon = document.createElement('link'); _canon.rel = 'canonical'; document.head.appendChild(_canon); }
                _canon.href = _canonUrl;
                _setMeta('description', _ogDesc, 'name');
                _setMeta('og:url', _canonUrl);
                _setMeta('og:title', document.title);
                _setMeta('og:description', _ogDesc);
                _setMeta('og:image', _ogImg);
                _setMeta('twitter:title', document.title, 'name');
                _setMeta('twitter:description', _ogDesc, 'name');
                _setMeta('twitter:image', _ogImg, 'name');
                // JSON-LD Product schema
                const _ldEl = document.getElementById('ld-json') || (() => {
                    const s = document.createElement('script');
                    s.id = 'ld-json'; s.type = 'application/ld+json';
                    document.head.appendChild(s); return s;
                })();
                _ldEl.textContent = JSON.stringify({
                    '@context': 'https://schema.org',
                    '@type': 'Product',
                    'name': data.title,
                    'description': data.description || data.title,
                    'image': _ogImg,
                    'url': _canonUrl,
                    'offers': {
                        '@type': 'Offer',
                        'price': data.price ?? 0,
                        'priceCurrency': 'TRY',
                        'availability': 'https://schema.org/InStock',
                        'seller': {
                            '@type': 'Person',
                            'name': data.user.full_name || data.user.username
                        }
                    }
                });

                const catLabel = CAT[data.category] || data.category || '';
                const initials = (data.user.full_name || data.user.username || '?')[0].toUpperCase();
                const token = localStorage.getItem('teqlif_token');
                const isLoggedIn = !!token;

                document.getElementById('content').innerHTML = `
                    <div class="detail-grid">

                        <!-- LEFT -->
                        <div style="display:flex;flex-direction:column;gap:1rem">
                            <div class="card">
                                ${buildGallery(_urls)}
                                <div class="detail-body">
                                    <div class="detail-meta">
                                        ${catLabel ? `<span class="cat-badge">${catLabel}</span>` : ''}
                                        <span class="ilan-date">${timeAgo(data.created_at)}</span>
                                    </div>
                                    <h1 class="detail-title">${esc(data.title)}</h1>
                                    ${data.location ? `
                                    <div class="detail-location">
                                        <span>📍</span><span>${esc(data.location)}</span>
                                    </div>` : ''}
                                    ${data.description ? `
                                    <hr class="divider">
                                    <div class="sec-label">Açıklama</div>
                                    <div class="detail-desc">${esc(data.description)}</div>` : ''}
                                </div>
                            </div>
                        </div>

                        <!-- RIGHT -->
                        <div style="display:flex;flex-direction:column;gap:1rem">
                            <div class="price-card">
                                <div class="price-tag">${fmt(data.price)}</div>
                                <div class="price-note">KDV dahil</div>
                                ${isLoggedIn
                                    ? `<a href="/mesajlar?to_id=${data.user.id}&to_name=${encodeURIComponent(data.user.full_name || data.user.username)}&to_handle=${encodeURIComponent(data.user.username)}" class="btn-contact">Satıcıya Mesaj Gönder</a>`
                                    : `<a href="/giris.html?next=/ilan/${listingId}" class="btn-contact">Satıcıya Mesaj Gönder</a>`
                                }
                                <a href="/profil/${esc(data.user.username)}" class="btn-msg">Profili Gör</a>
                            </div>

                            <div class="seller-block">
                                <div class="sec-label" style="margin-bottom:.75rem">Satıcı</div>
                                <a href="/profil/${esc(data.user.username)}" class="seller-row">
                                    <div class="seller-avatar">${esc(initials)}</div>
                                    <div>
                                        <div class="seller-name">${esc(data.user.full_name || data.user.username)}</div>
                                        <div class="seller-username">@${esc(data.user.username)}</div>
                                    </div>
                                    <span class="seller-goto">Profile Git →</span>
                                </a>
                            </div>
                        </div>

                    </div>`;

            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="error-box">
                        <h2>İlan bulunamadı</h2>
                        <p><a href="/">Ana sayfaya dön</a></p>
                    </div>`;
            }
        }

        load();
    </script>
</body>
</html>
