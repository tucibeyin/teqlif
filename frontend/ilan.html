<!DOCTYPE html>
<html lang="tr">

<head>

    <meta name="twitter:description" content="{{ og_description }}">
    <meta name="twitter:image" content="{{ og_image }}">
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #f1f3f5;
        }

        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1rem 4rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 1rem;
        }

        .back-link:hover {
            color: #111;
        }

        /* Grid layout */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.25rem;
            align-items: start;
        }

        @media (max-width: 768px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── LEFT COLUMN ── */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .07);
            overflow: hidden;
        }

        /* Gallery */
        .gallery-main {
            position: relative;
            background: #111;
            aspect-ratio: 4/3;
            overflow: hidden;
            cursor: zoom-in;
        }

        .gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            user-select: none;
        }

        .gallery-main img.active {
            display: block;
        }

        .no-photo {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4b5563;
            font-size: 3.5rem;
            background: #1f2937;
        }

        /* Counter badge */
        .gallery-counter {
            position: absolute;
            bottom: 12px;
            right: 14px;
            background: rgba(0, 0, 0, .55);
            color: #fff;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 20px;
            pointer-events: none;
        }

        /* Nav arrows */
        .gallery-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, .5);
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s;
            z-index: 2;
        }

        .gallery-arrow:hover {
            background: rgba(0, 0, 0, .75);
        }

        .gallery-arrow.prev {
            left: 10px;
        }

        .gallery-arrow.next {
            right: 10px;
        }

        /* Thumbnails strip */
        .gallery-thumbs {
            display: flex;
            gap: 6px;
            padding: 8px;
            background: #f9fafb;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .gallery-thumbs img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            opacity: .7;
            transition: opacity .15s, border-color .15s;
        }

        .gallery-thumbs img.active {
            border-color: var(--primary, #06b6d4);
            opacity: 1;
        }

        /* Detail body */
        .detail-body {
            padding: 1.25rem 1.5rem 1.5rem;
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 0.6rem;
        }

        .cat-badge {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--primary, #06b6d4);
            background: #ecfeff;
            padding: 2px 9px;
            border-radius: 20px;
            letter-spacing: .02em;
        }

        .ilan-date {
            font-size: 0.76rem;
            color: #9ca3af;
        }

        .detail-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 1rem;
            line-height: 1.35;
            color: #111;
        }

        .detail-location {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 1rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #f1f3f5;
            margin: 1.1rem 0;
        }

        .sec-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #9ca3af;
            margin-bottom: 0.55rem;
        }

        .detail-desc {
            font-size: 0.94rem;
            color: #374151;
            line-height: 1.75;
            white-space: pre-wrap;
        }

        /* ── RIGHT COLUMN ── */
        .price-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .07);
            padding: 1.4rem;
        }

        .price-tag {
            font-size: 2rem;
            font-weight: 800;
            color: #111;
            margin-bottom: 0.2rem;
            line-height: 1;
        }

        .price-note {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-bottom: 1.25rem;
        }

        .btn-contact {
            display: block;
            width: 100%;
            padding: 0.85rem;
            background: var(--primary, #06b6d4);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: opacity .15s;
            margin-bottom: 0.6rem;
        }

        .btn-contact:hover {
            opacity: .88;
        }

        .btn-msg {
            display: block;
            width: 100%;
            padding: 0.8rem;
            background: #f3f4f6;
            color: #374151;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background .15s;
        }

        .btn-msg:hover {
            background: #e5e7eb;
        }

        /* Seller card (right column) */
        .seller-block {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, .07);
            padding: 1.1rem 1.4rem;
        }

        .seller-row {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .seller-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--primary, #06b6d4);
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .seller-name {
            font-weight: 700;
            font-size: 0.95rem;
        }

        .seller-username {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .seller-goto {
            margin-left: auto;
            font-size: 0.78rem;
            color: var(--primary, #06b6d4);
            font-weight: 600;
        }

        /* ── LIGHTBOX ── */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .92);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: 92vw;
            max-height: 92vh;
            object-fit: contain;
            border-radius: 4px;
            user-select: none;
        }

        .lb-close {
            position: absolute;
            top: 16px;
            right: 20px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
            line-height: 1;
            opacity: .8;
        }

        .lb-close:hover {
            opacity: 1;
        }

        .lb-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, .12);
            border: none;
            border-radius: 50%;
            width: 52px;
            height: 52px;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lb-arrow:hover {
            background: rgba(255, 255, 255, .22);
        }

        .lb-arrow.prev {
            left: 16px;
        }

        .lb-arrow.next {
            right: 16px;
        }

        .lb-counter {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, .7);
            font-size: 0.85rem;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .error-box {
            text-align: center;
            padding: 4rem 1rem;
            color: #6b7280;
            background: #fff;
            border-radius: 12px;
        }

        .error-box h2 {
            margin-bottom: .5rem;
        }

        .error-box a {
            color: var(--primary, #06b6d4);
        }

        /* ── Sil butonu ── */
        .btn-delete {
            display: block;
            width: 100%;
            padding: .65rem 1rem;
            background: #fff2f2;
            color: #dc2626;
            border: 1.5px solid #fca5a5;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background .15s;
        }

        .btn-delete:hover {
            background: #fee2e2;
        }

        /* ── Favori butonu ── */
        .btn-fav {
            display: block;
            width: 100%;
            padding: .75rem;
            background: #fff5f5;
            color: #dc2626;
            border: 1.5px solid #fca5a5;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background .15s;
            margin-bottom: .6rem;
        }

        .btn-fav:hover {
            background: #fee2e2;
        }

        .btn-fav.active {
            background: #dc2626;
            color: #fff;
            border-color: #dc2626;
        }

        .btn-fav.active:hover {
            background: #b91c1c;
        }

        /* ── Toggle aktif butonu ── */
        .btn-toggle {
            display: block;
            width: 100%;
            padding: .65rem 1rem;
            background: #f0fdf4;
            color: #16a34a;
            border: 1.5px solid #86efac;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background .15s;
            margin-bottom: .6rem;
        }

        .btn-toggle:hover {
            background: #dcfce7;
        }

        .btn-toggle.passive {
            background: #fefce8;
            color: #ca8a04;
            border-color: #fde68a;
        }

        .btn-toggle.passive:hover {
            background: #fef9c3;
        }

        /* ── Şikayet butonu ── */
        .btn-report {
            display: inline-flex;
            align-items: center;
            gap: .3rem;
            padding: .35rem .75rem;
            font-size: .78rem;
            color: #9ca3af;
            background: none;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            cursor: pointer;
            transition: color .15s, border-color .15s;
            margin-top: .5rem;
        }

        .btn-report:hover {
            color: #ef4444;
            border-color: #fca5a5;
        }

        /* ── Modal ── */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 900;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 1.75rem;
            width: 92%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .18);
        }

        .modal-box h3 {
            margin: 0 0 1rem;
            font-size: 1.05rem;
        }

        .modal-box select,
        .modal-box textarea {
            width: 100%;
            padding: .6rem .8rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: .9rem;
            margin-bottom: .75rem;
            box-sizing: border-box;
            font-family: inherit;
        }

        .modal-box textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-actions {
            display: flex;
            gap: .75rem;
            justify-content: flex-end;
        }

        .modal-actions .btn-cancel {
            padding: .55rem 1.1rem;
            border: 1.5px solid #e5e7eb;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: .88rem;
        }

        .modal-actions .btn-send {
            padding: .55rem 1.2rem;
            background: #06b6d4;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-actions .btn-send:disabled {
            opacity: .5;
            cursor: default;
        }

        /* ── Teklif Ver / Teklif Geçmişi ── */
        .offer-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0,0,0,.07);
            padding: 1.4rem;
        }

        .offer-form-row {
            display: flex;
            gap: 8px;
            margin-bottom: .75rem;
        }

        .offer-input {
            flex: 1;
            padding: .7rem .9rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: .95rem;
            outline: none;
            font-family: inherit;
            transition: border-color .15s;
            min-width: 0;
        }

        .offer-input:focus { border-color: var(--primary, #06b6d4); }

        .btn-offer {
            padding: .7rem 1.1rem;
            background: var(--primary, #06b6d4);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity .15s;
        }

        .btn-offer:hover { opacity: .88; }
        .btn-offer:disabled { opacity: .5; cursor: default; }

        .offer-form-error {
            font-size: .82rem;
            color: #dc2626;
            margin-bottom: .7rem;
            display: none;
        }

        .offer-list {
            display: flex;
            flex-direction: column;
            gap: 7px;
            max-height: 250px;
            overflow-y: auto;
        }

        .offer-empty {
            font-size: .88rem;
            color: #9ca3af;
            text-align: center;
            padding: .6rem 0;
        }

        .offer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .6rem .75rem;
            background: #f9fafb;
            border-radius: 8px;
        }

        .offer-amount {
            font-weight: 700;
            color: #111;
            font-size: .95rem;
        }

        .offer-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .offer-user a {
            font-size: .82rem;
            font-weight: 600;
            color: var(--primary, #06b6d4);
            text-decoration: none;
        }

        .offer-user a:hover { text-decoration: underline; }

        .offer-date {
            font-size: .75rem;
            color: #9ca3af;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2403555634390058" crossorigin="anonymous"></script>
</head>

        <a href="/" class="logo" data-track-id="ilan-nav-logo-anasayfa">teqlif</a>

    <!-- Şikayet Modal -->
    <div class="modal-backdrop" id="reportModal">
        <div class="modal-box">
            <h3>🚩 İlanı Şikayet Et</h3>
            <select id="reportReason" data-track-id="ilan-modal-select-sikayet-nedeni">
                <option value="">-- Neden seçin --</option>
                <option value="Yanıltıcı ilan">Yanıltıcı ilan</option>
                <option value="Yasadışı ürün">Yasadışı ürün</option>
                <option value="Spam / tekrar ilan">Spam / tekrar ilan</option>
                <option value="Uygunsuz içerik">Uygunsuz içerik</option>

                <option value="Diğer">Diğer</option>
            </select>
            <textarea id="reportNote" placeholder="Ek açıklama (isteğe bağlı)" rows="3" data-track-id="ilan-modal-textarea-sikayet-aciklama"></textarea>
            <div id="reportMsg" style="font-size:.83rem;color:#dc2626;margin-bottom:.5rem;display:none;"></div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelReport" data-track-id="ilan-modal-btn-sikayet-vazgec">Vazgeç</button>
                <button class="btn-send" id="reportSendBtn" data-track-id="ilan-modal-btn-sikayet-gonder">Gönder</button>
            </div>
        </div>
    </div>

    <!-- Silme Onay Modal -->
    <div class="modal-backdrop" id="deleteModal">
        <div class="modal-box">
            <h3>İlanı Sil</h3>
            <p style="font-size:.9rem;color:#4b5563;margin:0 0 1.25rem;">Bu ilanı silmek istediğinize emin misiniz? Bu
                işlem geri alınamaz.</p>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelDelete" data-track-id="ilan-modal-btn-sil-vazgec">Vazgeç</button>
                <button class="btn-send" style="background:#dc2626;" id="deleteSendBtn" data-track-id="ilan-modal-btn-sil-onayla">Evet,
                    Sil</button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" id="btnLbClose" data-track-id="ilan-lightbox-btn-kapat">✕</button>
        <button class="lb-arrow prev" id="btnLbPrev" data-track-id="ilan-lightbox-btn-onceki">‹</button>
        <img id="lbImg" src="" alt="">
        <button class="lb-arrow next" id="btnLbNext" data-track-id="ilan-lightbox-btn-sonraki">›</button>
        <div class="lb-counter" id="lbCounter"></div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ilan-page.js?v=2"></script>
</body>
