<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan — teqlif</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .detail-page {
            min-height: calc(100vh - 60px);
            background: var(--bg, #f8fafc);
            padding: 2rem 1rem 4rem;
            display: flex;
            justify-content: center;
        }

        .detail-inner {
            width: 100%;
            max-width: 680px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88rem;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 1.25rem;
        }

        .back-link:hover { color: #111; }

        .detail-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.06);
            overflow: hidden;
        }

        /* Photo gallery */
        .photo-gallery {
            position: relative;
            background: #f3f4f6;
            aspect-ratio: 4/3;
            max-height: 420px;
            overflow: hidden;
        }

        .photo-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .photo-gallery img.active { display: block; }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,.45);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-prev { left: 10px; }
        .gallery-next { right: 10px; }

        .gallery-dots {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
        }

        .gallery-dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255,255,255,.55);
            cursor: pointer;
        }

        .gallery-dots span.active { background: #fff; }

        .no-photo {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d1d5db;
            font-size: 3rem;
        }

        /* Content */
        .detail-body {
            padding: 1.5rem;
        }

        .detail-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .category-badge {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary, #06b6d4);
            background: #ecfeff;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .detail-date {
            font-size: 0.78rem;
            color: #9ca3af;
        }

        .detail-title {
            font-size: 1.45rem;
            font-weight: 700;
            margin: 0 0 0.5rem;
            line-height: 1.3;
        }

        .detail-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary, #06b6d4);
            margin-bottom: 0.75rem;
        }

        .detail-location {
            font-size: 0.88rem;
            color: #6b7280;
            margin-bottom: 1.25rem;
        }

        .detail-location::before { content: '📍 '; }

        .divider {
            border: none;
            border-top: 1px solid #f3f4f6;
            margin: 1.25rem 0;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 0.5rem;
        }

        .detail-desc {
            font-size: 0.95rem;
            color: #374151;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        /* Seller card */
        .seller-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f9fafb;
            border-radius: 10px;
            padding: 1rem;
            margin-top: 1.25rem;
            text-decoration: none;
            color: inherit;
            transition: background .15s;
        }

        .seller-card:hover { background: #f3f4f6; }

        .seller-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .seller-info small {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .seller-info strong {
            font-size: 0.95rem;
        }

        .seller-arrow {
            margin-left: auto;
            color: #9ca3af;
            font-size: 1.1rem;
        }

        /* Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-gallery { aspect-ratio: 4/3; max-height: 420px; border-radius: 0; }
        .skeleton-line { height: 16px; margin-bottom: 10px; }
        .skeleton-title { height: 28px; width: 70%; margin-bottom: 12px; }
        .skeleton-price { height: 36px; width: 40%; margin-bottom: 16px; }

        .error-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #6b7280;
        }

        .error-state h2 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .error-state a { color: var(--primary, #06b6d4); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="detail-page">
        <div class="detail-inner">
            <a href="javascript:history.back()" class="back-link">← Geri</a>
            <div id="content"></div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        const listingId = parseInt(location.pathname.split('/').pop(), 10);

        function fmt(price) {
            if (price == null) return 'Fiyat belirtilmemiş';
            return '₺ ' + Number(price).toLocaleString('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
        }

        function timeAgo(iso) {
            const d = new Date(iso);
            const diff = (Date.now() - d) / 1000;
            if (diff < 60) return 'Az önce';
            if (diff < 3600) return Math.floor(diff / 60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff / 3600) + ' sa önce';
            if (diff < 2592000) return Math.floor(diff / 86400) + ' gün önce';
            return d.toLocaleDateString('tr-TR');
        }

        function showSkeleton() {
            document.getElementById('content').innerHTML = `
                <div class="detail-card">
                    <div class="skeleton skeleton-gallery"></div>
                    <div class="detail-body">
                        <div class="skeleton skeleton-line" style="width:30%"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-price"></div>
                        <div class="skeleton skeleton-line"></div>
                        <div class="skeleton skeleton-line" style="width:85%"></div>
                        <div class="skeleton skeleton-line" style="width:60%"></div>
                    </div>
                </div>`;
        }

        function buildGallery(urls) {
            if (!urls || urls.length === 0) {
                return `<div class="photo-gallery"><div class="no-photo">📷</div></div>`;
            }
            const imgs = urls.map((u, i) =>
                `<img src="${u}" class="${i === 0 ? 'active' : ''}" alt="Fotoğraf ${i + 1}" loading="lazy">`
            ).join('');
            const dots = urls.length > 1 ? `
                <div class="gallery-dots">
                    ${urls.map((_, i) => `<span class="${i === 0 ? 'active' : ''}" onclick="goTo(${i})"></span>`).join('')}
                </div>` : '';
            const navs = urls.length > 1 ? `
                <button class="gallery-nav gallery-prev" onclick="navigate(-1)">‹</button>
                <button class="gallery-nav gallery-next" onclick="navigate(1)">›</button>` : '';
            return `<div class="photo-gallery" id="gallery">${imgs}${navs}${dots}</div>`;
        }

        let _currentIdx = 0;
        let _totalImgs = 0;

        function goTo(idx) {
            const gallery = document.getElementById('gallery');
            if (!gallery) return;
            const imgs = gallery.querySelectorAll('img');
            const dots = gallery.querySelectorAll('.gallery-dots span');
            imgs.forEach(i => i.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            _currentIdx = (idx + _totalImgs) % _totalImgs;
            if (imgs[_currentIdx]) imgs[_currentIdx].classList.add('active');
            if (dots[_currentIdx]) dots[_currentIdx].classList.add('active');
        }

        function navigate(dir) { goTo(_currentIdx + dir); }

        async function load() {
            showSkeleton();
            try {
                const data = await apiFetch(`/listings/${listingId}`);
                const urls = data.image_urls && data.image_urls.length > 0 ? data.image_urls
                           : data.image_url ? [data.image_url] : [];
                _totalImgs = urls.length;

                document.title = `${data.title} — teqlif`;

                const galleryHtml = buildGallery(urls);
                const initials = (data.user.full_name || data.user.username || '?')[0].toUpperCase();
                const catLabels = {
                    elektronik: '📱 Elektronik', vasita: '🚗 Vasıta', emlak: '🏠 Emlak',
                    giyim: '👗 Giyim', spor: '⚽ Spor', kitap: '📚 Kitap & Müzik',
                    ev: '🛋 Ev & Bahçe', diger: '📦 Diğer',
                };
                const catLabel = catLabels[data.category] || data.category || '';

                document.getElementById('content').innerHTML = `
                    <div class="detail-card">
                        ${galleryHtml}
                        <div class="detail-body">
                            <div class="detail-meta">
                                ${catLabel ? `<span class="category-badge">${catLabel}</span>` : ''}
                                <span class="detail-date">${timeAgo(data.created_at)}</span>
                            </div>
                            <h1 class="detail-title">${esc(data.title)}</h1>
                            <div class="detail-price">${fmt(data.price)}</div>
                            ${data.location ? `<div class="detail-location">${esc(data.location)}</div>` : ''}
                            ${data.description ? `
                            <hr class="divider">
                            <div class="section-label">Açıklama</div>
                            <div class="detail-desc">${esc(data.description)}</div>` : ''}
                            <hr class="divider">
                            <div class="section-label">Satıcı</div>
                            <a href="/profil/${data.user.username}" class="seller-card">
                                <div class="seller-avatar">${esc(initials)}</div>
                                <div class="seller-info">
                                    <strong>${esc(data.user.full_name || data.user.username)}</strong>
                                    <small>@${esc(data.user.username)}</small>
                                </div>
                                <span class="seller-arrow">›</span>
                            </a>
                        </div>
                    </div>`;
            } catch (e) {
                document.getElementById('content').innerHTML = `
                    <div class="detail-card">
                        <div class="error-state">
                            <h2>İlan bulunamadı</h2>
                            <p><a href="/">Ana sayfaya dön</a></p>
                        </div>
                    </div>`;
            }
        }

        function esc(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        load();
    </script>
</body>
</html>
