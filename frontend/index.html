<html lang="tr">
<head>

      }

    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        /* ── Tab bar ─────────────────────────────────────────────────── */
        .tab-bar {
            padding: 1.5rem 2rem 0;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .tab-pills { display: flex; gap: 0.4rem; }

        .tab-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.48rem 1.1rem;
            border-radius: 20px;
            font-size: 0.88rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
        }

        .tab-btn.active { background: var(--primary); color: #fff; }
        .tab-btn:not(.active) { background: #f1f5f9; color: #64748b; }
        .tab-btn:not(.active):hover { background: #e2e8f0; color: #334155; }

        .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #fff;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        .tab-btn:not(.active) .live-dot { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.55; transform: scale(1.25); }
        }

        /* ── Canlı yayın — kategori filtre ─────────────────────────── */
        .stream-cat-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 1.25rem 2rem 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ── Canlı yayın kartları ────────────────────────────────────── */
        .streams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.25rem;
            padding: 1rem 2rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Kategori section başlığı (Tümü görünümünde) */
        .stream-section-title {
            grid-column: 1 / -1;
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.3px;
            padding: 0.5rem 0 0.25rem;
            border-bottom: 1.5px solid var(--border);
            margin-bottom: 0.25rem;
        }

        .stream-card {
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow 0.15s, transform 0.15s;
        }
        .stream-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .stream-thumb {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-light) 100%);
            height: 155px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .stream-thumb-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .stream-thumb .live-badge {
            position: absolute; top: 10px; left: 10px;
            background: #ef4444; color: #fff;
            font-size: 0.7rem; font-weight: 700;
            padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px;
            z-index: 1;
        }
        .stream-thumb .viewer-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.5); color: #fff;
            font-size: 0.78rem; padding: 2px 8px; border-radius: 20px;
            z-index: 1;
        }
        .stream-thumb svg { opacity: 0.28; }
        .stream-info { padding: 1rem; }
        .stream-title {
            font-weight: 600; font-size: 0.93rem; margin-bottom: 0.3rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .stream-host { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.85rem; }

        /* ── İlanlar bölümü ─────────────────────────────────────────── */
        #section-ilanlar {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
        }

        /* Arama */
        .listing-search {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }
        .listing-search input {
            flex: 1;
            padding: 0.7rem 1.1rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .listing-search input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
        }
        .listing-search button {
            padding: 0.7rem 1.4rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
        }

        /* Kategoriler */
        .listing-cats {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .cat-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.38rem 0.85rem;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            transition: all 0.12s;
            text-decoration: none;
        }
        .cat-pill:hover, .cat-pill.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        /* Filtre bar + sıralama */
        .listing-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .listing-count { font-size: 0.85rem; color: var(--text-muted); }
        .listing-sort {
            padding: 0.38rem 0.7rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-size: 0.84rem;
            color: #334155;
            background: #fff;
            cursor: pointer;
        }

        /* İlan listesi */
        .listing-list { display: flex; flex-direction: column; gap: 0; }

        .listing-item {
            display: flex;
            gap: 0;
            background: var(--white);
            border-radius: 0;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.1s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .listing-item:first-child { border-top: 1px solid #f1f5f9; border-radius: 10px 10px 0 0; }
        .listing-item:last-child { border-radius: 0 0 10px 10px; }
        .listing-item:hover { background: #f8fafc; }

        .listing-img {
            width: 130px;
            height: 100px;
            flex-shrink: 0;
            background: #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            margin: 10px 0 10px 10px;
            border-radius: 6px;
        }
        .listing-img svg { opacity: 0.3; }

        .listing-body {
            flex: 1;
            padding: 0.8rem 1rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }
        .listing-item-title {
            font-weight: 600;
            font-size: 0.93rem;
            margin-bottom: 0.25rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .listing-item-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 0.4rem;
        }
        .listing-item-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .listing-item-price {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
        }
        .listing-item-info {
            font-size: 0.76rem;
            color: #94a3b8;
        }

        /* Boş durum */
        .empty-state {
            text-align: center; padding: 4rem 2rem; color: var(--text-muted);
        }
        .empty-state svg { margin-bottom: 1rem; opacity: 0.35; }
        .empty-state p { font-size: 1rem; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--white); border-radius: 14px;
            padding: 2rem; width: 100%; max-width: 400px; margin: 1rem;
        }
        .modal h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; }
        .modal input {
            width: 100%; padding: 0.65rem 0.9rem;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 0.95rem; outline: none; margin-bottom: 1rem;
            transition: border-color 0.15s;
        }
        .modal input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13,148,136,0.12);
        }
        .modal-actions { display: flex; gap: 0.75rem; }
    </style>
</head>

    <!-- Tab bar + Yayın Başlat -->

        <!-- Kategoriler -->

            <a class="cat-pill" data-cat="elektronik" onclick="filterCat(this, 'elektronik')">📱 Elektronik</a>

            <a class="cat-pill" data-cat="emlak" onclick="filterCat(this, 'emlak')">🏠 Emlak</a>
            <a class="cat-pill" data-cat="giyim" onclick="filterCat(this, 'giyim')">👗 Giyim</a>
            <a class="cat-pill" data-cat="spor" onclick="filterCat(this, 'spor')">⚽ Spor</a>

    <!-- Yayın Başlat Modal -->
    <div class="modal-overlay" id="startModal">

    <script src="/static/js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
    <script src="/static/js/stream.js"></script>
    <script>
        const alertEl    = document.getElementById('alert');
        const btnStart   = document.getElementById('btnStartStream');
        const btnIlanVer = document.getElementById('btnIlanVer');
        const startModal = document.getElementById('startModal');
        const modalAlert = document.getElementById('modalAlert');

        if (Auth.getToken()) btnStart.style.display = '';

        /* ── Tab geçişi ─────────────────────────────────────────────── */
        function switchTab(tab) {
            const isCanli = tab === 'canli';
            document.getElementById('section-canli').style.display   = isCanli ? '' : 'none';
            document.getElementById('section-ilanlar').style.display  = isCanli ? 'none' : '';
            document.getElementById('tab-canli').classList.toggle('active', isCanli);
            document.getElementById('tab-ilanlar').classList.toggle('active', !isCanli);
            btnStart.style.display   = (isCanli && Auth.getToken()) ? '' : 'none';
            btnIlanVer.style.display = !isCanli ? '' : 'none';
            if (!isCanli && !_listingsLoaded) { loadListings(); loadCityOptions(); }
        }

        /* ── Canlı yayınlar ─────────────────────────────────────────── */
        const grid = document.getElementById('streamsGrid');
        const loadingState = document.getElementById('loadingState');
        const streamCatBar = document.getElementById('streamCatBar');

        const STREAM_CAT_LABELS = {
            elektronik: '📱 Elektronik',
            giyim: '👗 Giyim',
            ev: '🏠 Ev & Yaşam',
            vasita: '🚗 Vasıta',
            spor: '⚽ Spor',
            kitap: '📚 Kitap',
            emlak: '🏘️ Emlak',
            diger: '📦 Diğer',
        };

        let _allStreams = [];
        let _activeCatStream = '';

        function _streamCardHtml(s) {
            return `<div class="stream-card" onclick="joinStream(${s.id})">
                <div class="stream-thumb">
                    <span class="live-badge">CANLI</span>
                    <span class="viewer-badge">👁 ${s.viewer_count}</span>
                    ${s.thumbnail_url
                        ? `<img class="stream-thumb-img" src="${escHtml(s.thumbnail_url)}" alt="${escHtml(s.title)}" loading="lazy" onerror="this.remove()">`
                        : ''
                    }
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
                        <path d="M15 10l4.553-2.07A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
                    </svg>
                </div>
                <div class="stream-info">
                    <div class="stream-title">${escHtml(s.title)}</div>
                    <div class="stream-host"><a href="/profil.html?u=${encodeURIComponent(s.host.username)}" onclick="event.stopPropagation()" style="color:var(--primary);text-decoration:none;">@${escHtml(s.host.username)}</a></div>
                    <button class="btn btn-primary btn-full" onclick="event.stopPropagation();joinStream(${s.id})">Katıl</button>
                </div>
            </div>`;
        }

        function _renderStreams() {
            const filtered = _activeCatStream
                ? _allStreams.filter(s => s.category === _activeCatStream)
                : _allStreams;

            if (!filtered.length) {
                grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 10l4.553-2.07A1 1 0 0121 8.845v6.31a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/></svg>
                    <p>${_activeCatStream ? 'Bu kategoride aktif yayın yok.' : 'Şu an aktif yayın yok.'}</p>
                    ${!_activeCatStream ? '<p style="font-size:0.85rem;margin-top:0.5rem;">İlk yayını sen başlat!</p>' : ''}
                </div>`;
                return;
            }

            if (_activeCatStream) {
                grid.innerHTML = filtered.map(_streamCardHtml).join('');
            } else {
                const cats = [...new Set(filtered.map(s => s.category))];
                if (cats.length < 2) {
                    grid.innerHTML = filtered.map(_streamCardHtml).join('');
                } else {
                    grid.innerHTML = cats.map(cat => {
                        const label = STREAM_CAT_LABELS[cat] || cat;
                        const items = filtered.filter(s => s.category === cat);
                        return `<div class="stream-section-title">${label}</div>` + items.map(_streamCardHtml).join('');
                    }).join('');
                }
            }
        }

        function filterStreamCat(el, cat) {
            document.querySelectorAll('#streamCatBar .cat-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            _activeCatStream = cat;
            _renderStreams();
        }

        async function loadStreams() {
            try {
                const streams = await apiFetch('/streams/active');
                loadingState.remove();
                _allStreams = streams;
                _renderStreams();
            } catch (err) {
                loadingState.innerHTML = '<p>Yayınlar yüklenemedi.</p>';
            }
        }

        async function joinStream(id) {
            if (!Auth.getToken()) { window.location.href = '/giris.html'; return; }
            try {
                await Stream.joinStream(id);
                window.location.href = `/yayin.html?id=${id}`;
            } catch (err) { showAlert(err.detail || 'Yayına katılınamadı'); }
        }

        /* ── İlanlar ────────────────────────────────────────────────── */
        let _allListings = [];
        let _filteredListings = [];
        let _listingsLoaded = false;
        let _activeCat = '';
        let _activeLocation = '';

        async function loadListings() {
            _listingsLoaded = true;
            try {
                const data = await apiFetch('/listings');
                _allListings = data;
                _applyFilters();
            } catch (_) {
                _allListings = [];
                _applyFilters();
            }
        }

        async function loadCityOptions() {
            try {
                const cities = await apiFetch('/cities');
                const sel = document.getElementById('locationFilter');
                cities.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c;
                    opt.textContent = c;
                    sel.appendChild(opt);
                });
            } catch (_) {}
        }

        function _applyFilters() {
            const q = document.getElementById('listingSearch').value.trim().toLowerCase();
            _filteredListings = _allListings.filter(l =>
                (!_activeCat || l.category === _activeCat) &&
                (!_activeLocation || l.location === _activeLocation) &&
                (!q || l.title.toLowerCase().includes(q) || (l.description||'').toLowerCase().includes(q))
            );
            sortListings();
        }

        function filterCat(el, cat) {
            document.querySelectorAll('.listing-cats .cat-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            _activeCat = cat;
            _applyFilters();
        }

        function filterLocation() {
            _activeLocation = document.getElementById('locationFilter').value;
            _applyFilters();
        }

        function searchListings() {
            _applyFilters();
        }

        function sortListings() {
            const sort = document.getElementById('listingSort').value;
            if (sort === 'price_asc') _filteredListings.sort((a,b) => (a.price||0)-(b.price||0));
            else if (sort === 'price_desc') _filteredListings.sort((a,b) => (b.price||0)-(a.price||0));
            else _filteredListings.sort((a,b) => new Date(b.created_at||0)-new Date(a.created_at||0));
            renderListings();
        }


        function renderListings() {
            const list = document.getElementById('listingList');
            const count = document.getElementById('listingCount');
            count.textContent = `${_filteredListings.length} ilan`;

            if (!_filteredListings.length) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18M9 21V9"/>
                        </svg>
                        <p>Bu kategoride ilan bulunamadı.</p>
                    </div>`;
                return;
            }

            list.innerHTML = _filteredListings.map(l => `
                <div class="listing-item" onclick="window.location='/ilan/${l.id}'">
                    <div class="listing-img">
                        ${l.image_url
                            ? `<img src="${escHtml(l.image_url)}" style="width:100%;height:100%;object-fit:cover;">`
                            : `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`
                        }
                    </div>
                    <div class="listing-body">
                        <div>
                            <div class="listing-item-title">${escHtml(l.title)}</div>
                            <div class="listing-item-desc">${escHtml(l.description || '')}</div>
                        </div>
                        <div class="listing-item-meta">
                            <span class="listing-item-price">${l.price ? l.price.toLocaleString('tr-TR') + ' ₺' : 'Fiyat belirtilmemiş'}</span>
                            <span class="listing-item-info">${escHtml(l.location || '')} · ${formatDate(l.created_at)}</span>
                        </div>
                    </div>
                </div>`).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            const diff = (Date.now() - d) / 1000;
            if (diff < 3600) return Math.floor(diff/60) + ' dk önce';
            if (diff < 86400) return Math.floor(diff/3600) + ' sa önce';
            return Math.floor(diff/86400) + ' gün önce';
        }

        /* ── Yardımcılar ────────────────────────────────────────────── */
        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showAlert(msg) {
            alertEl.textContent = msg;
            alertEl.style.display = 'block';
            setTimeout(() => alertEl.style.display = 'none', 4000);
        }

        /* ── Yayın başlat modal ─────────────────────────────────────── */
        btnStart.addEventListener('click', () => {
            startModal.classList.add('open');
            document.getElementById('streamTitle').focus();
        });
        document.getElementById('btnCancelModal').addEventListener('click', () => {
            startModal.classList.remove('open');
        });
        startModal.addEventListener('click', e => {
            if (e.target === startModal) startModal.classList.remove('open');
        });
        document.getElementById('btnConfirmStart').addEventListener('click', async () => {
            const title    = document.getElementById('streamTitle').value.trim();
            const category = document.getElementById('streamCategory').value;
            if (!title) {
                modalAlert.textContent = 'Yayın başlığı zorunludur';
                modalAlert.style.display = 'block';
                return;
            }
            if (!category) {
                modalAlert.textContent = 'Kategori seçimi zorunludur';
                modalAlert.style.display = 'block';
                return;
            }
            modalAlert.style.display = 'none';
            const btn = document.getElementById('btnConfirmStart');
            btn.disabled = true; btn.textContent = 'Başlatılıyor...';
            try {
                const data = await Stream.startStream(title, category);
                window.location.href = `/yayin.html?id=${data.stream_id}&host=1`;
            } catch (err) {
                modalAlert.textContent = err.detail || 'Yayın başlatılamadı';
                modalAlert.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Başlat';
            }
        });

        loadStreams();
    </script>
</body>
</html>
