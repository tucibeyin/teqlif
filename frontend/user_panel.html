<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUCi Cüzdanım — teqlif</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/auth.js"></script>
    <style>
        body { background: #f8fafc; }

        .panel-wrap {
            max-width: 560px;
            margin: 2.5rem auto;
            padding: 0 1.25rem 5rem;
        }

        /* ── Başlık ──────────────────────────────────────────────── */
        .panel-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #111827;
            margin-bottom: 1.5rem;
        }

        /* ── Bakiye kartı ─────────────────────────────────────────── */
        .balance-card {
            background: linear-gradient(135deg, #B8860B 0%, #FFD700 55%, #FFA500 100%);
            border-radius: 18px;
            padding: 1.6rem 1.75rem;
            color: #fff;
            box-shadow: 0 8px 24px rgba(255,215,0,.35);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .balance-coin {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: rgba(255,255,255,.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; font-weight: 900; flex-shrink: 0;
        }

        .balance-label { font-size: .8rem; opacity: .85; margin-bottom: 3px; }
        .balance-amount { font-size: 2rem; font-weight: 800; letter-spacing: .5px; }

        /* ── Paketler ─────────────────────────────────────────────── */
        .section-title {
            font-size: 1rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 1rem;
        }

        .packages {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: .875rem;
            margin-bottom: 2rem;
        }

        .pkg-card {
            background: #fff;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            padding: 1.25rem .75rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .15s, box-shadow .15s, transform .12s;
            position: relative;
        }

        .pkg-card:hover {
            border-color: #FFD700;
            box-shadow: 0 4px 16px rgba(255,215,0,.25);
            transform: translateY(-2px);
        }

        .pkg-card.selected {
            border-color: #B8860B;
            box-shadow: 0 4px 20px rgba(184,134,11,.3);
            background: #fffbeb;
        }

        .pkg-card.selected::after {
            content: '✓';
            position: absolute;
            top: 8px; right: 10px;
            font-size: .75rem;
            color: #B8860B;
            font-weight: 700;
        }

        .pkg-popular {
            position: absolute;
            top: -11px; left: 50%; transform: translateX(-50%);
            background: #FFD700;
            color: #7c5700;
            font-size: .65rem;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }

        .pkg-amount {
            font-size: 1.6rem;
            font-weight: 800;
            color: #B8860B;
            line-height: 1.1;
        }

        .pkg-unit { font-size: .75rem; color: #6b7280; margin-top: 2px; }

        .pkg-price {
            margin-top: .6rem;
            font-size: .85rem;
            font-weight: 600;
            color: #111827;
        }

        /* ── Yükle butonu ─────────────────────────────────────────── */
        #btn-topup {
            width: 100%;
            padding: .875rem;
            background: linear-gradient(90deg, #B8860B, #FFD700);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255,215,0,.35);
            transition: opacity .15s, transform .12s;
        }

        #btn-topup:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
        #btn-topup:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        /* ── İşlem geçmişi ────────────────────────────────────────── */
        .txn-list { margin-top: 2rem; }

        .txn-row {
            display: flex; align-items: center; gap: .875rem;
            padding: .7rem 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .txn-icon {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: .9rem; flex-shrink: 0;
        }

        .txn-label { flex: 1; font-size: .875rem; color: #374151; }
        .txn-date  { font-size: .75rem; color: #9ca3af; }

        .txn-amount {
            font-weight: 700; font-size: .875rem;
        }

        .txn-amount.pos { color: #059669; }
        .txn-amount.neg { color: #dc2626; }

        /* ── Bildirim kutusu ──────────────────────────────────────── */
        .toast {
            display: none;
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: #1f2937; color: #fff;
            padding: .7rem 1.4rem; border-radius: 10px;
            font-size: .875rem; font-weight: 500;
            z-index: 9999; white-space: nowrap;
            animation: fadeup .25s ease;
        }

        @keyframes fadeup {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @media (max-width: 480px) {
            .packages { grid-template-columns: repeat(3, 1fr); gap: .5rem; }
            .pkg-amount { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="panel-wrap">
    <p class="panel-title">💛 TUCi Cüzdanım</p>

    <!-- Bakiye kartı -->
    <div class="balance-card">
        <div class="balance-coin">T</div>
        <div>
            <div class="balance-label">Güncel Bakiye</div>
            <div class="balance-amount" id="balance-display">—</div>
        </div>
    </div>

    <!-- Paket seçimi -->
    <p class="section-title">Paket Seç</p>
    <div class="packages">
        <div class="pkg-card" data-amount="100">
            <div class="pkg-amount">100</div>
            <div class="pkg-unit">TUCi</div>
            <div class="pkg-price">₺9,99</div>
        </div>
        <div class="pkg-card selected" data-amount="500">
            <span class="pkg-popular">⭐ Popüler</span>
            <div class="pkg-amount">500</div>
            <div class="pkg-unit">TUCi</div>
            <div class="pkg-price">₺39,99</div>
        </div>
        <div class="pkg-card" data-amount="1000">
            <div class="pkg-amount">1000</div>
            <div class="pkg-unit">TUCi</div>
            <div class="pkg-price">₺69,99</div>
        </div>
    </div>

    <button id="btn-topup">
        💳 Öde ve Yükle
    </button>

    <!-- İşlem geçmişi -->
    <div class="txn-list">
        <p class="section-title" style="margin-top:1.75rem">Son İşlemler</p>
        <div id="txn-container">
            <p style="color:#9ca3af;font-size:.875rem">Yükleniyor…</p>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ── Yetki kontrolü ───────────────────────────────────────────────────────
    (function () {
        if (typeof Auth === 'undefined' || !Auth.getToken()) {
            window.location.href = '/giris.html';
        }
    })();

    let selectedAmount = 500;

    document.querySelectorAll('.pkg-card').forEach(card => {
        card.addEventListener('click', function () {
            document.querySelectorAll('.pkg-card').forEach(c => c.classList.remove('selected'));
            this.classList.add('selected');
            selectedAmount = parseInt(this.dataset.amount, 10);
        });
    });

    document.getElementById('btn-topup').addEventListener('click', doTopup);

    function showToast(msg, color) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = color || '#1f2937';
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3500);
    }

    // ── Bakiye + geçmiş yükle ────────────────────────────────────────────────
    async function loadWallet() {
        try {
            const res = await fetch('/api/wallet/balance', {
                headers: { 'Authorization': 'Bearer ' + Auth.getToken() }
            });
            if (!res.ok) return;
            const data = await res.json();
            document.getElementById('balance-display').textContent = data.balance + ' TUCi';
            renderHistory(data.transactions || []);
        } catch (e) {
            console.error('Cüzdan yüklenemedi', e);
        }
    }

    function renderHistory(txns) {
        const container = document.getElementById('txn-container');
        if (!txns.length) {
            container.innerHTML = '<p style="color:#9ca3af;font-size:.875rem">Henüz işlem yok.</p>';
            return;
        }
        const typeLabels = {
            airdrop:        'Hoş geldin hediyesi',
            spend_lead_gen: 'Sıcak Talep blast',
            spend_ai:       'Yapay Zeka fiyatlama',
            web_topup:      'Web yükleme',
        };
        container.innerHTML = txns.map(t => {
            const pos = t.amount > 0;
            const icon = pos ? '⬆️' : '⬇️';
            const cls  = pos ? 'pos' : 'neg';
            const sign = pos ? '+' : '';
            const label = typeLabels[t.transaction_type] || t.transaction_type;
            const date  = new Date(t.created_at).toLocaleString('tr-TR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
            return `
                <div class="txn-row">
                    <div class="txn-icon" style="background:${pos ? '#ecfdf5' : '#fef2f2'}">${icon}</div>
                    <div>
                        <div class="txn-label">${label}</div>
                        <div class="txn-date">${date}</div>
                    </div>
                    <div class="txn-amount ${cls}">${sign}${t.amount} TUCi</div>
                </div>`;
        }).join('');
    }

    // ── TUCi yükle ───────────────────────────────────────────────────────────
    async function doTopup() {
        const btn = document.getElementById('btn-topup');
        btn.disabled = true;
        btn.textContent = 'İşleniyor…';
        try {
            const res = await fetch('/api/wallet/topup-manual', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + Auth.getToken(),
                },
                body: JSON.stringify({ amount: selectedAmount }),
            });
            const data = await res.json();
            if (!res.ok) {
                showToast(data.detail || 'Bir hata oluştu.', '#dc2626');
                return;
            }
            document.getElementById('balance-display').textContent = data.balance + ' TUCi';
            showToast(`✅ ${selectedAmount} TUCi başarıyla yüklendi!`, '#059669');
            await loadWallet(); // geçmişi güncelle
        } catch (e) {
            showToast('Bağlantı hatası.', '#dc2626');
        } finally {
            btn.disabled = false;
            btn.textContent = '💳 Öde ve Yükle';
        }
    }

    // Sayfa açılışında yükle
    loadWallet();
</script>
</body>
</html>
