<head>

    <style>
        .msg-wrap {
            max-width: 720px;
            margin: 2rem auto;
            padding: 0 1.25rem 4rem;
        }

        .tabs {
            display: flex;
            gap: 0;
            background: var(--white);
            border-radius: 10px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 1.25rem;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* ── Conversation list ── */
        .conv-list {
            background: var(--white);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .conv-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            padding: 0.9rem 1.25rem;
            border-bottom: 1px solid #f8fafc;
            cursor: pointer;
            transition: background 0.1s;
            text-decoration: none;
            color: inherit;
        }

        .conv-item:hover {
            background: #f8fafc;
        }

        .conv-item:last-child {
            border-bottom: none;
        }

        .conv-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-bg);
            color: var(--primary);
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .conv-body {
            flex: 1;
            min-width: 0;
        }

        .conv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.15rem;
        }

        .conv-name {
            font-size: 0.93rem;
            font-weight: 600;
        }

        .conv-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .conv-last {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conv-meta {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .unread-badge {
            background: var(--primary);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            border-radius: 10px;
            padding: 1px 6px;
            flex-shrink: 0;
        }

        /* ── Chat view ── */
        #chatView {
            display: none;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--white);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 0.9rem 1.25rem;
            margin-bottom: 1rem;
        }

        .chat-back {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--primary);
            font-size: 1.2rem;
            padding: 0.25rem;
            display: flex;
            align-items: center;
        }

        .chat-title {
            font-size: 1rem;
            font-weight: 700;
        }

        .chat-messages {
            background: var(--white);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 1rem;
            min-height: 320px;
            max-height: 480px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .bubble {
            max-width: 72%;
            padding: 0.55rem 0.9rem;
            border-radius: 16px;
            font-size: 0.92rem;
            line-height: 1.45;
            word-break: break-word;
        }

        .bubble.mine {
            align-self: flex-end;
            background: var(--primary);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .bubble.theirs {
            align-self: flex-start;
            background: #F3F4F6;
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .bubble-time {
            font-size: 0.68rem;
            opacity: 0.65;
            text-align: right;
            margin-top: 2px;
        }

        .chat-input-row {
            display: flex;
            gap: 0.6rem;
            background: var(--white);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 0.75rem 1rem;
        }

        .chat-input {
            flex: 1;
            border: 1.5px solid var(--border);
            border-radius: 22px;
            padding: 0.55rem 1rem;
            font-size: 0.92rem;
            outline: none;
            resize: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        .chat-input:focus {
            border-color: var(--primary);
        }

        .chat-send {
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .chat-send:hover {
            background: var(--primary-dark);
        }

        .chat-send svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* ── Notifications ── */
        .notif-list {
            background: var(--white);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .notif-item {
            display: flex;
            align-items: flex-start;
            gap: 0.9rem;
            padding: 0.9rem 1.25rem;
            border-bottom: 1px solid #f8fafc;
        }

        .notif-item:last-child {
            border-bottom: none;
        }

        .notif-item.unread {
            background: var(--primary-bg);
        }

        .notif-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: #F1F5F9;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .notif-icon svg {
            width: 18px;
            height: 18px;
            stroke: #6B7280;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .notif-item.unread .notif-icon {
            background: var(--primary-bg);
        }

        .notif-item.unread .notif-icon svg {
            stroke: var(--primary);
        }

        .notif-body {
            flex: 1;
        }

        .notif-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .notif-text {
            font-size: 0.83rem;
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }

        .notif-time {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 56px;
            height: 56px;
            stroke: #D1D5DB;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 0.9rem;
        }
    </style>

</head>

<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/kesfet.html" style="display:inline-flex;align-items:center;gap:0.3rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                Keşfet
            </a>
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="msg-wrap">
        <div class="tabs">
            <button class="tab-btn active" data-tab="messages" onclick="switchTab('messages')">Mesajlar</button>
            <button class="tab-btn" data-tab="notifications" onclick="switchTab('notifications')">Bildirimler</button>
        </div>

        <!-- Conversations list view -->
        <div id="listView">
            <!-- Messages tab -->
            <div id="panel-messages" class="tab-panel active">
                <div id="convLoading" style="text-align:center;padding:2.5rem;color:var(--text-muted);">Yükleniyor...
                </div>
                <div class="conv-list" id="convList" style="display:none;"></div>
                <div class="empty-state" id="convEmpty" style="display:none;">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <p>Henüz hiç mesaj yok</p>
                </div>
            </div>

            <!-- Notifications tab -->
            <div id="panel-notifications" class="tab-panel">
                <div id="notifLoading" style="text-align:center;padding:2.5rem;color:var(--text-muted);">Yükleniyor...
                </div>
                <div class="notif-list" id="notifList" style="display:none;"></div>
                <div class="empty-state" id="notifEmpty" style="display:none;">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    <p>Bildirim yok</p>
                </div>
            </div>
        </div>

        <!-- Chat detail view -->
        <div id="chatView">
            <div class="chat-header">
                <button class="chat-back" onclick="showList()" title="Geri">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 5l-7 7 7 7" />
                    </svg>
                </button>
                <div class="chat-title" id="chatTitle"></div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-row">
                <textarea class="chat-input" id="chatInput" placeholder="Mesaj yaz..." rows="1"
                    onkeydown="handleKey(event)"></textarea>
                <button class="chat-send" onclick="sendMsg()" title="Gönder">
                    <svg viewBox="0 0 24 24">
                        <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        if (!Auth.getToken()) window.location.href = '/giris.html';

        const myUser = Auth.getUser();
        let _currentOtherUserId = null;
        let _currentOtherUsername = null;

        // ── Tab switching ──────────────────────────────────────────────────────
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.tab === name);
            });
            document.querySelectorAll('.tab-panel').forEach(p => {
                p.classList.toggle('active', p.id === 'panel-' + name);
            });
        }

        // ── List / Chat toggle ─────────────────────────────────────────────────
        function showList() {
            document.getElementById('listView').style.display = '';
            document.getElementById('chatView').style.display = 'none';
            _currentOtherUserId = null;
        }

        function showChat(userId, username, handle) {
            _currentOtherUserId = userId;
            _currentOtherUsername = username;
            document.getElementById('listView').style.display = 'none';
            document.getElementById('chatView').style.display = 'block';
            const titleEl = document.getElementById('chatTitle');
            if (handle) {
                titleEl.innerHTML = `<a href="/profil.html?u=${encodeURIComponent(handle)}" style="color:inherit;text-decoration:none;">${escHtml(username)}</a>`;
            } else {
                titleEl.textContent = username;
            }
            loadMessages(userId);
        }

        // ── Helpers ────────────────────────────────────────────────────────────
        function timeAgo(isoStr) {
            if (!isoStr) return '';
            try {
                const dt = new Date(isoStr);
                const diff = Math.floor((Date.now() - dt.getTime()) / 1000);
                if (diff < 60) return 'şimdi';
                if (diff < 3600) return Math.floor(diff / 60) + 'd önce';
                if (diff < 86400) return Math.floor(diff / 3600) + 's önce';
                return Math.floor(diff / 86400) + 'g önce';
            } catch { return ''; }
        }

        function timeLabel(isoStr) {
            if (!isoStr) return '';
            try {
                const dt = new Date(isoStr);
                const h = String(dt.getHours()).padStart(2, '0');
                const m = String(dt.getMinutes()).padStart(2, '0');
                return h + ':' + m;
            } catch { return ''; }
        }

        function notifIcon(type) {
            switch (type) {
                case 'message':
                    return '<svg viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>';
                case 'bid':
                    return '<svg viewBox="0 0 24 24"><path d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"/></svg>';
                default:
                    return '<svg viewBox="0 0 24 24"><path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>';
            }
        }

        // ── Load Conversations ─────────────────────────────────────────────────
        async function loadConversations() {
            try {
                const data = await apiFetch('/messages/conversations');
                document.getElementById('convLoading').style.display = 'none';
                if (!data || data.length === 0) {
                    document.getElementById('convEmpty').style.display = '';
                    return;
                }
                document.getElementById('convList').style.display = '';
                const convList = document.getElementById('convList');
                convList.innerHTML = '';
                data.forEach(conv => {
                    const initial = (conv.full_name || conv.username || '?')[0].toUpperCase();
                    const unreadBadge = conv.unread_count > 0
                        ? `<span class="unread-badge">${conv.unread_count}</span>`
                        : '';
                    const item = document.createElement('div');
                    item.className = 'conv-item';
                    item.innerHTML = `
                        <div class="conv-avatar">${initial}</div>
                        <div class="conv-body">
                            <div class="conv-header">
                                <span class="conv-name">${escHtml(conv.full_name || conv.username)}</span>
                                <span class="conv-time">${timeAgo(conv.last_at)}</span>
                            </div>
                            <div class="conv-meta">
                                <span class="conv-last">${escHtml(conv.last_message || '')}</span>
                                ${unreadBadge}
                            </div>
                        </div>
                    `;
                    item.addEventListener('click', () => showChat(conv.user_id, conv.full_name || conv.username, conv.username));
                    convList.appendChild(item);
                });
            } catch (e) {
                document.getElementById('convLoading').textContent = 'Yüklenemedi.';
            }
        }

        // ── Load Notifications ─────────────────────────────────────────────────
        async function loadNotifications() {
            try {
                const data = await apiFetch('/notifications/');
                document.getElementById('notifLoading').style.display = 'none';
                // Mark all as read
                apiFetch('/notifications/mark-all-read', { method: 'POST' }).catch(() => { });
                if (!data || data.length === 0) {
                    document.getElementById('notifEmpty').style.display = '';
                    return;
                }
                document.getElementById('notifList').style.display = '';
                const notifList = document.getElementById('notifList');
                notifList.innerHTML = '';
                data.forEach(n => {
                    const item = document.createElement('div');
                    item.className = 'notif-item' + (n.is_read ? '' : ' unread');
                    item.innerHTML = `
                        <div class="notif-icon">${notifIcon(n.type)}</div>
                        <div class="notif-body">
                            <div class="notif-title">${escHtml(n.title)}</div>
                            ${n.body ? `<div class="notif-text">${escHtml(n.body)}</div>` : ''}
                            <div class="notif-time">${timeAgo(n.created_at)}</div>
                        </div>
                    `;
                    notifList.appendChild(item);
                });
            } catch (e) {
                document.getElementById('notifLoading').textContent = 'Yüklenemedi.';
            }
        }

        // ── Load Messages for chat ─────────────────────────────────────────────
        async function loadMessages(otherUserId) {
            const msgContainer = document.getElementById('chatMessages');
            msgContainer.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem;">Yükleniyor...</div>';
            try {
                const data = await apiFetch(`/messages/${otherUserId}`);
                msgContainer.innerHTML = '';
                if (!data || data.length === 0) {
                    msgContainer.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem;">Henüz mesaj yok. İlk mesajı gönder!</div>';
                    return;
                }
                const myId = myUser ? myUser.id : null;
                data.forEach(msg => {
                    appendBubble(msg, myId);
                });
                scrollToBottom();
            } catch (e) {
                msgContainer.innerHTML = '<div style="text-align:center;color:var(--danger);padding:2rem;">Mesajlar yüklenemedi.</div>';
            }
        }

        function appendBubble(msg, myId) {
            const msgContainer = document.getElementById('chatMessages');
            const isMe = msg.sender_id === myId;
            const div = document.createElement('div');
            div.className = 'bubble ' + (isMe ? 'mine' : 'theirs');
            div.innerHTML = `
                ${escHtml(msg.content)}
                <div class="bubble-time">${timeLabel(msg.created_at)}</div>
            `;
            msgContainer.appendChild(div);
        }

        function scrollToBottom() {
            const c = document.getElementById('chatMessages');
            c.scrollTop = c.scrollHeight;
        }

        // ── Send message ───────────────────────────────────────────────────────
        async function sendMsg() {
            if (!_currentOtherUserId) return;
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            input.style.height = '';
            try {
                const msg = await apiFetch('/messages/send', {
                    method: 'POST',
                    body: JSON.stringify({ receiver_id: _currentOtherUserId, content: text }),
                });
                const myId = myUser ? myUser.id : null;
                appendBubble(msg, myId);
                scrollToBottom();
            } catch (e) {
                alert('Mesaj gönderilemedi.');
            }
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        }

        function escHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        // ── Init ───────────────────────────────────────────────────────────────
        loadConversations();
        loadNotifications();

        // Auto-open chat if URL has ?to_id=&to_name= (e.g. from profil.html)
        (function checkUrlParams() {
            const p = new URLSearchParams(window.location.search);
            const toId = parseInt(p.get('to_id'), 10);
            const toName = p.get('to_name') || '';
            const toHandle = p.get('to_handle') || '';
            if (toId && toName) {
                showChat(toId, toName, toHandle);
            }
        })();
    </script>
</body>
