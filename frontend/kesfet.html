<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keşfet — teqlif</title>
    <meta name="description" content="teqlif'te kullanıcıları, ilanları ve canlı yayınları keşfet.">

    <link rel="apple-touch-icon" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://98dfdd738860420a9c221abf4ddf35cb@o4511052861538304.ingest.us.sentry.io/4511053913391104",
            integrations: [Sentry.browserTracingIntegration()],
            tracesSampleRate: 1.0,
        });
    </script>

    <style>
        body {
            background: var(--bg);
        }

        /* ── Sayfa Sarmalayıcı ── */
        .kesfet-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem 4rem;
        }

        /* ── Arama Kutusu ── */
        .search-bar-wrap {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-bar-wrap svg.search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 0.85rem 3rem 0.85rem 2.85rem;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            background: var(--white);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: var(--shadow);
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
        }

        #searchInput::placeholder {
            color: var(--text-muted);
        }

        #clearBtn {
            display: none;
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0.25rem;
            border-radius: 50%;
            line-height: 0;
            transition: color 0.15s, background 0.15s;
        }

        #clearBtn:hover {
            color: var(--text);
            background: var(--bg);
        }

        /* ── Bölüm başlığı ── */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            display: inline-block;
            flex-shrink: 0;
        }

        /* ── Canlı Yayınlar yatay kaydırma ── */
        .streams-scroll-wrap {
            margin-bottom: 2rem;
        }

        .streams-scroll {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .streams-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .streams-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .streams-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .stream-card {
            flex-shrink: 0;
            width: 150px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: #000;
            box-shadow: var(--shadow-md);
            text-decoration: none;
        }

        .stream-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .stream-card-gradient {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stream-card-gradient svg {
            color: rgba(255,255,255,0.3);
        }

        .stream-card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .stream-card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 0.6rem 0.6rem;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
        }

        .stream-card-title {
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stream-card-host {
            color: var(--primary-light);
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── İlanlar grid (keşfet varsayılan) ── */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 900px) {
            .listings-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .listings-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .listing-tile {
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: var(--white);
            box-shadow: var(--shadow);
            text-decoration: none;
            display: block;
        }

        .listing-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .listing-tile-placeholder {
            width: 100%;
            height: 100%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .listing-tile-placeholder svg {
            color: var(--text-muted);
        }

        .listing-tile-price {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 0.5rem 0.45rem;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Arama Sonuçları ── */
        #searchView {
            display: none;
        }

        .results-section {
            margin-bottom: 2rem;
        }

        /* Kullanıcılar listesi */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.85rem 1rem;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        .user-row:last-child {
            border-bottom: none;
        }

        .user-row:hover {
            background: var(--primary-bg);
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--primary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .user-info-handle {
            font-size: 0.8rem;
            color: var(--primary);
        }

        /* Arama sonucu ilanları */
        .search-listings-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        @media (max-width: 900px) {
            .search-listings-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .search-listings-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Arama sonucu yayınlar */
        .search-streams-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .stream-row {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.85rem 1rem;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
            cursor: pointer;
        }

        .stream-row:last-child {
            border-bottom: none;
        }

        .stream-row:hover {
            background: var(--primary-bg);
        }

        .stream-row-thumb {
            width: 56px;
            height: 40px;
            border-radius: 7px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .stream-row-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stream-row-badge {
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }

        .stream-row-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
        }

        .stream-row-host {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* ── Boş / Yükleniyor durumları ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state svg {
            opacity: 0.35;
            margin-bottom: 0.75rem;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        .spinner-wrap {
            text-align: center;
            padding: 3rem;
            color: var(--primary);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/kesfet.html" style="display:inline-flex;align-items:center;gap:0.3rem;color:var(--primary)!important;font-weight:600;">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                Keşfet
            </a>
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="kesfet-wrap">

        <!-- ── Arama Kutusu ── -->
        <div class="search-bar-wrap">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <input type="text" id="searchInput" placeholder="İlan, yayın veya kullanıcı ara..." autocomplete="off">
            <button id="clearBtn" aria-label="Temizle">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- ── Varsayılan Keşfet Görünümü ── -->
        <div id="exploreView">

            <!-- Yükleniyor -->
            <div id="exploreLoading" class="spinner-wrap">
                <div class="spinner"></div>
            </div>

            <!-- Canlı Yayınlar -->
            <div id="streamsSection" style="display:none;" class="streams-scroll-wrap">
                <div class="section-title">
                    <span class="live-dot"></span> Canlı Yayınlar
                </div>
                <div class="streams-scroll" id="streamsScroll"></div>
            </div>

            <!-- Son İlanlar -->
            <div id="listingsSection" style="display:none;">
                <div class="section-title">Son İlanlar</div>
                <div class="listings-grid" id="listingsGrid"></div>
            </div>

            <!-- Boş durum -->
            <div id="exploreEmpty" class="empty-state" style="display:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <p>Henüz içerik yok</p>
            </div>
        </div>

        <!-- ── Arama Sonuçları Görünümü ── -->
        <div id="searchView">

            <!-- Yükleniyor -->
            <div id="searchLoading" class="spinner-wrap" style="display:none;">
                <div class="spinner"></div>
            </div>

            <!-- Kullanıcılar -->
            <div id="usersSection" class="results-section" style="display:none;">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Kullanıcılar
                </div>
                <div class="user-list" id="usersList"></div>
            </div>

            <!-- İlanlar -->
            <div id="searchListingsSection" class="results-section" style="display:none;">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    İlanlar
                </div>
                <div class="search-listings-grid" id="searchListingsGrid"></div>
            </div>

            <!-- Yayınlar -->
            <div id="searchStreamsSection" class="results-section" style="display:none;">
                <div class="section-title">
                    <span class="live-dot"></span> Yayınlar
                </div>
                <div class="search-streams-list" id="searchStreamsList"></div>
            </div>

            <!-- Sonuç yok -->
            <div id="searchEmpty" class="empty-state" style="display:none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <p>Sonuç bulunamadı</p>
            </div>
        </div>

    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/stream.js"></script>
    <script src="/static/js/search.js"></script>
</body>

</html>
