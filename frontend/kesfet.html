    <style>
        body {
            background: var(--bg);
        }

        /* ── Sayfa Sarmalayıcı ── */
        .kesfet-wrap {
            flex: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem 4rem;
        }

        /* ── Arama Kutusu ── */
        .search-bar-wrap {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-bar-wrap svg.search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 0.85rem 3rem 0.85rem 2.85rem;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 1rem;
            background: var(--white);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            box-shadow: var(--shadow);
        }

        #searchInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
        }

        #searchInput::placeholder {
            color: var(--text-muted);
        }

        #clearBtn {
            display: none;
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0.25rem;
            border-radius: 50%;
            line-height: 0;
            transition: color 0.15s, background 0.15s;
        }

        #clearBtn:hover {
            color: var(--text);
            background: var(--bg);
        }

        /* ── Bölüm başlığı ── */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            display: inline-block;
            flex-shrink: 0;
        }

        /* ── Canlı Yayınlar yatay kaydırma ── */
        .streams-scroll-wrap {
            margin-bottom: 2rem;
        }

        .streams-scroll {
            display: flex;
            gap: 0.75rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .streams-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .streams-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .streams-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .stream-card {
            flex-shrink: 0;
            width: 150px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: #000;
            box-shadow: var(--shadow-md);
            text-decoration: none;
        }

        .stream-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .stream-card-gradient {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stream-card-gradient svg {
            color: rgba(255,255,255,0.3);
        }

        .stream-card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 3px 6px;
            border-radius: 4px;
        }

        .stream-card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 0.6rem 0.6rem;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
        }

        .stream-card-title {
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stream-card-host {
            color: var(--primary-light);
            font-size: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── İlanlar grid (keşfet varsayılan) ── */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 900px) {
            .listings-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .listings-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .listing-tile {
            aspect-ratio: 1;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background: var(--white);
            box-shadow: var(--shadow);
            text-decoration: none;
            display: block;
        }

        .listing-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .listing-tile-placeholder {
            width: 100%;
            height: 100%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .listing-tile-placeholder svg {
            color: var(--text-muted);
        }

        .listing-tile-price {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 0.5rem 0.45rem;
            background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Arama Sonuçları ── */
        #searchView {
            display: none;
        }

        .results-section {
            margin-bottom: 2rem;
        }

        /* Kullanıcılar listesi */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.85rem 1rem;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }

        .user-row:last-child {
            border-bottom: none;
        }

        .user-row:hover {
            background: var(--primary-bg);
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--primary-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: var(--primary);
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
        }

        .user-info-handle {
            font-size: 0.8rem;
            color: var(--primary);
        }

        /* Arama sonucu ilanları */
        .search-listings-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        @media (max-width: 900px) {
            .search-listings-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 600px) {
            .search-listings-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Arama sonucu yayınlar */
        .search-streams-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--white);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .stream-row {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.85rem 1rem;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
            cursor: pointer;
        }

        .stream-row:last-child {
            border-bottom: none;
        }

        .stream-row:hover {
            background: var(--primary-bg);
        }

        .stream-row-thumb {
            width: 56px;
            height: 40px;
            border-radius: 7px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .stream-row-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stream-row-badge {
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }

        .stream-row-title {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
        }

        .stream-row-host {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        /* ── Boş / Yükleniyor durumları ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state svg {
            opacity: 0.35;
            margin-bottom: 0.75rem;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        .spinner-wrap {
            text-align: center;
            padding: 3rem;
            color: var(--primary);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
