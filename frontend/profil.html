<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil — teqlif</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .profile-wrap {
            max-width: 480px;
            margin: 2.5rem auto;
            padding: 0 1.25rem 4rem;
        }

        .profile-card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--primary-bg);
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
        }

        .profile-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .profile-username {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .btn-msg {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 2rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-msg:hover { background: var(--primary-dark); }

        .btn-msg svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .profile-own {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
        }

        .profile-own a { color: var(--primary); }

        .profile-error {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="profile-wrap">
        <div id="profileContent">
            <div class="profile-card" style="color:var(--text-muted);padding:3rem;">Yükleniyor...</div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('u');

        if (!username) {
            window.location.href = '/';
        }

        async function loadProfile() {
            const content = document.getElementById('profileContent');
            try {
                const user = await apiFetch(`/users/${encodeURIComponent(username)}`);
                const myUser = Auth.getUser();
                const isOwn = myUser && myUser.username === user.username;
                const initial = (user.full_name || user.username || '?')[0].toUpperCase();

                let actionHtml = '';
                if (isOwn) {
                    actionHtml = `<p class="profile-own">Bu senin profilin. <a href="/hesabim.html">Hesabımı Düzenle →</a></p>`;
                } else if (Auth.getToken()) {
                    const toName = encodeURIComponent(user.full_name || user.username);
                    const toHandle = encodeURIComponent(user.username);
                    actionHtml = `
                        <a class="btn-msg" href="/mesajlar.html?to_id=${user.id}&to_name=${toName}&to_handle=${toHandle}">
                            <svg viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                            Mesaj Gönder
                        </a>`;
                } else {
                    actionHtml = `<a class="btn-msg" href="/giris.html">Mesaj göndermek için giriş yap</a>`;
                }

                content.innerHTML = `
                    <div class="profile-card">
                        <div class="profile-avatar">${escHtml(initial)}</div>
                        <div class="profile-name">${escHtml(user.full_name || user.username)}</div>
                        <div class="profile-username">@${escHtml(user.username)}</div>
                        ${actionHtml}
                    </div>`;
            } catch (e) {
                content.innerHTML = `
                    <div class="profile-card profile-error">
                        <p>Kullanıcı bulunamadı.</p>
                    </div>`;
            }
        }

        function escHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        loadProfile();
    </script>
</body>
</html>
