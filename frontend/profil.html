<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ og_title }}</title>
    <meta name="robots" content="index, follow">
    <meta name="description" content="{{ og_description }}">
    <meta property="og:type" content="profile">
    <meta property="og:site_name" content="teqlif">
    <meta property="og:locale" content="tr_TR">
    <meta property="og:title" content="{{ og_title }}">
    <meta property="og:description" content="{{ og_description }}">
    <meta property="og:image" content="{{ og_image }}">
    <meta property="og:url" content="{{ og_url }}">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ og_title }}">
    <meta name="twitter:description" content="{{ og_description }}">
    <meta name="twitter:image" content="{{ og_image }}">
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script src="/static/js/sentry-init.js"></script>
    <script src="/static/js/app-redirect.js"></script>

    <style>
        .profile-page {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem 4rem;
            background: var(--bg, #f8fafc);
        }

        .profile-inner {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1.5rem;
        }

        .profile-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.15);
            color: var(--primary);
            font-size: 2.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 0.875rem;
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin: 0 0 0.25rem;
        }

        .profile-handle {
            font-size: 0.88rem;
            color: #6b7280;
            text-align: center;
            margin: 0 0 1.25rem;
        }

        .stats-bar {
            width: 100%;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: grid;
            grid-template-columns: 1fr 1px 1fr 1px 1fr;
            margin-bottom: 1.25rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem 0;
        }

        .stat-count {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.78rem;
            color: #6b7280;
            margin-top: 0.15rem;
        }

        .stat-divider {
            background: #e5e7eb;
            align-self: stretch;
        }

        .profile-actions {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            width: 100%;
            margin-bottom: 0;
        }

        .btn-profile {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.82rem 1rem;
            border: none;
            border-radius: 10px;
            font-size: 0.97rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
            box-sizing: border-box;
        }

        .btn-profile.primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-profile.primary:hover {
            background: var(--primary-dark, #0891b2);
        }

        .btn-profile.secondary {
            background: #f1f5f9;
            color: #334155;
        }

        .btn-profile.secondary:hover {
            background: #e2e8f0;
        }

        .btn-profile svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .listings-section {
            margin-top: 1rem;
            width: 100%;
        }

        .listings-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted, #6b7280);
            margin-bottom: 0.75rem;
        }

        /* Instagram tarzı 3 kolonlu kare grid */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }

        .listing-square {
            position: relative;
            aspect-ratio: 1 / 1;
            background: #f3f4f6;
            overflow: hidden;
            cursor: pointer;
        }

        .listing-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.2s;
        }

        .listing-square:hover img {
            transform: scale(1.04);
        }

        .listing-square-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #d1d5db;
            gap: 6px;
        }

        .listing-square-placeholder svg {
            width: 32px;
            height: 32px;
            stroke: #d1d5db;
        }

        .listing-square-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.6));
            color: #fff;
            padding: 20px 8px 7px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .listing-square:hover .listing-square-overlay {
            opacity: 1;
        }

        .listing-square-price {
            font-size: 0.8rem;
            font-weight: 700;
        }

        .listing-square-title {
            font-size: 0.72rem;
            opacity: 0.9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-listings {
            text-align: center;
            color: #9ca3af;
            padding: 2rem 1rem;
            font-size: 0.9rem;
        }

        .empty-listings svg {
            width: 40px;
            height: 40px;
            stroke: #d1d5db;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 0.75rem;
        }

        .profile-loading {
            color: var(--text-muted, #6b7280);
            padding-top: 4rem;
            text-align: center;
        }

        .profile-not-found {
            text-align: center;
            color: var(--text-muted, #6b7280);
            padding-top: 4rem;
        }

        .stat-item.clickable {
            cursor: pointer;
            transition: background 0.12s;
            border-radius: 8px;
        }

        .stat-item.clickable:hover {
            background: #f1f5f9;
        }

        /* Follow list modal */
        .follow-modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .follow-modal-backdrop.open {
            display: flex;
        }

        .follow-modal {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            margin: 1rem;
        }

        .follow-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 700;
            font-size: 1rem;
        }

        .follow-modal-close {
            background: none;
            border: none;
            cursor: pointer;
            color: #6b7280;
            font-size: 1.4rem;
            line-height: 1;
            padding: 0;
        }

        .follow-modal-body {
            overflow-y: auto;
            flex: 1;
        }

        .follow-modal-loading {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }

        .follow-user-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            border-bottom: 1px solid #f3f4f6;
        }

        .follow-user-row:last-child {
            border-bottom: none;
        }

        .follow-user-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(6, 182, 212, 0.12);
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            text-decoration: none;
        }

        .follow-user-info {
            flex: 1;
            min-width: 0;
        }

        .follow-user-name {
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            color: inherit;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .follow-user-name:hover {
            color: var(--primary);
        }

        .follow-user-handle {
            font-size: 0.78rem;
            color: #6b7280;
        }

        .btn-follow-sm {
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0.35rem 0.9rem;
            border-radius: 8px;
            border: 1px solid;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.12s;
        }

        .btn-follow-sm.following {
            background: #f1f5f9;
            color: #334155;
            border-color: #d1d5db;
        }

        .btn-follow-sm.following:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #ef4444;
        }

        .btn-follow-sm.not-following {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-follow-sm.not-following:hover {
            background: var(--primary-dark, #0891b2);
        }

        .follow-empty {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        /* ── Rating badge ────────────────────────────────────────────── */
        .rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.38rem 0.9rem;
            background: #fff;
            border-radius: 20px;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            margin-bottom: 1rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            transition: border-color 0.15s, box-shadow 0.15s;
            text-decoration: none;
        }
        .rating-badge:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(6,182,212,0.15); }
        .rating-badge .rb-stars { color: #f59e0b; font-size: 0.9rem; letter-spacing: 1px; }
        .rating-badge .rb-avg { font-weight: 700; font-size: 0.92rem; color: #1e293b; }
        .rating-badge .rb-count { font-size: 0.78rem; color: #6b7280; }
        .rating-badge-empty { color: #9ca3af; font-size: 0.82rem; margin-bottom: 1rem; display: block; text-align: center; }

        /* ── Rating form modal ───────────────────────────────────────── */
        .rating-modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1100;
            align-items: center;
            justify-content: center;
        }
        .rating-modal-backdrop.open { display: flex; }
        .rating-modal {
            background: #fff;
            border-radius: 18px;
            width: 100%;
            max-width: 380px;
            margin: 1rem;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.22);
        }
        .rating-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .rating-modal-header span { font-weight: 700; font-size: 1rem; }
        .rating-modal-close { background: none; border: none; cursor: pointer; color: #6b7280; font-size: 1.4rem; line-height: 1; padding: 0; }
        .rating-modal-body { padding: 1.25rem; }

        /* ── Star picker ─────────────────────────────────────────────── */
        .star-picker { display: flex; gap: 8px; justify-content: center; margin: 0.5rem 0 1.25rem; }
        .star-picker span {
            font-size: 2.4rem;
            cursor: pointer;
            color: #d1d5db;
            transition: color 0.1s, transform 0.1s;
            line-height: 1;
            user-select: none;
        }
        .star-picker span.lit { color: #f59e0b; }
        .star-picker span:hover { transform: scale(1.15); }
        .star-label {
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 1rem;
            min-height: 1.2em;
        }
        .rating-comment {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }
        .rating-comment:focus { border-color: var(--primary); }
        .rating-char-count { text-align: right; font-size: 0.75rem; color: #9ca3af; margin-top: 0.3rem; }
        .rating-modal-footer {
            display: flex;
            gap: 0.6rem;
            padding: 0 1.25rem 1.25rem;
        }
        .btn-rating-cancel {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-rating-cancel:hover { background: #e2e8f0; }
        .btn-rating-save {
            flex: 2;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }
        .btn-rating-save:hover { background: var(--primary-dark, #0891b2); }
        .btn-rating-save:disabled { opacity: 0.6; cursor: default; }

        /* ── Ratings list modal ──────────────────────────────────────── */
        .ratings-list-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1050;
            align-items: center;
            justify-content: center;
        }
        .ratings-list-backdrop.open { display: flex; }
        .ratings-list-modal {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            margin: 1rem;
        }
        .ratings-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 700;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .ratings-list-body { overflow-y: auto; flex: 1; }
        .rating-row {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 0.9rem 1.25rem;
            border-bottom: 1px solid #f3f4f6;
        }
        .rating-row:last-child { border-bottom: none; }
        .rating-row-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(6,182,212,0.12);
            color: var(--primary);
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            text-decoration: none;
            overflow: hidden;
        }
        .rating-row-info { flex: 1; min-width: 0; }
        .rating-row-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.2rem; }
        .rating-row-name { font-size: 0.88rem; font-weight: 600; color: inherit; text-decoration: none; }
        .rating-row-name:hover { color: var(--primary); }
        .rating-row-stars { color: #f59e0b; font-size: 0.82rem; letter-spacing: 1px; }
        .rating-row-comment { font-size: 0.83rem; color: #4b5563; margin-top: 0.2rem; }
        .rating-row-date { font-size: 0.73rem; color: #9ca3af; margin-top: 0.3rem; }
        .ratings-summary-bar {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: #f8fafc;
        }
        .rsb-avg { font-size: 2rem; font-weight: 800; color: #1e293b; }
        .rsb-stars { color: #f59e0b; font-size: 1.1rem; display: block; margin-bottom: 0.15rem; }
        .rsb-count { font-size: 0.82rem; color: #6b7280; }

        /* ── Settings icon row ───────────────────────────────────────── */
        .profile-settings-row {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
        }
        .btn-settings {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--text-muted, #6b7280);
            transition: background 0.15s, color 0.15s;
            text-decoration: none;
        }
        .btn-settings:hover {
            background: #f1f5f9;
            color: #334155;
        }
        .btn-settings svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ── Edit profile modal ───────────────────────────────────────── */
        .ep-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1200;
            align-items: center;
            justify-content: center;
        }
        .ep-backdrop.open { display: flex; }
        .ep-modal {
            background: #fff;
            border-radius: 18px;
            width: 100%;
            max-width: 400px;
            margin: 1rem;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.22);
        }
        .ep-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .ep-header span { font-weight: 700; font-size: 1rem; }
        .ep-close { background: none; border: none; cursor: pointer; color: #6b7280; font-size: 1.4rem; line-height: 1; padding: 0; }
        .ep-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 0.9rem; }
        .ep-field label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 0.35rem;
        }
        .ep-field input {
            width: 100%;
            padding: 0.72rem 0.9rem;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.93rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }
        .ep-field input:focus { border-color: var(--primary); }
        .ep-hint { font-size: 0.76rem; color: #9ca3af; margin-top: 0.25rem; }
        .ep-footer {
            display: flex;
            gap: 0.6rem;
            padding: 0 1.25rem 1.25rem;
        }
        .ep-cancel {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            background: #f8fafc;
            color: #64748b;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .ep-cancel:hover { background: #e2e8f0; }
        .ep-save {
            flex: 2;
            padding: 0.75rem;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
        }
        .ep-save:hover { background: var(--primary-dark, #0891b2); }
        .ep-save:disabled { opacity: 0.6; cursor: default; }

        /* ── Block button ─────────────────────────────────────────────── */
        .btn-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            font-size: 0.87rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            background: #f8fafc;
            color: #6b7280;
            transition: all 0.15s;
            box-sizing: border-box;
        }
        .btn-block:hover { border-color: #ef4444; color: #ef4444; background: #fef2f2; }
        .btn-block.blocked { background: #fef2f2; color: #ef4444; border-color: #fca5a5; }
        .btn-block.blocked:hover { background: #fee2e2; }
        .btn-block svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2403555634390058" crossorigin="anonymous"></script>
</head>

            <a href="/giris.html" id="navGiris" data-track-id="profil-nav-link-giris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit" data-track-id="profil-nav-link-kayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="profile-page">
        <div class="profile-inner" id="profileInner">
            <div class="profile-loading">Yükleniyor...</div>
        </div>
    </div>

    <!-- Follow list modal -->
    <div class="follow-modal-backdrop" id="followModalBackdrop">
        <div class="follow-modal">
            <div class="follow-modal-header">
                <span id="followModalTitle">Takipçiler</span>
                <button class="follow-modal-close" id="btnCloseFollowModal" data-track-id="profil-modal-btn-takipci-kapat">×</button>
            </div>
            <div class="follow-modal-body" id="followModalBody">
                <div class="follow-modal-loading">Yükleniyor...</div>
            </div>
        </div>
    </div>

    <!-- Rating form modal -->
    <div class="rating-modal-backdrop" id="ratingFormBackdrop">
        <div class="rating-modal">
            <div class="rating-modal-header">
                <span id="ratingFormTitle">Puan Ver</span>
                <button class="rating-modal-close" id="btnCloseRatingForm" data-track-id="profil-modal-btn-puan-kapat">×</button>
            </div>
            <div class="rating-modal-body">
                <div class="star-picker" id="ratingStarPicker">
                    <span data-v="1" data-track-id="profil-modal-star-1">★</span>
                    <span data-v="2" data-track-id="profil-modal-star-2">★</span>
                    <span data-v="3" data-track-id="profil-modal-star-3">★</span>
                    <span data-v="4" data-track-id="profil-modal-star-4">★</span>
                    <span data-v="5" data-track-id="profil-modal-star-5">★</span>
                </div>
                <div class="star-label" id="ratingStarLabel">Bir yıldız seçin</div>
                <textarea class="rating-comment" id="ratingComment" rows="3" maxlength="500" placeholder="Neden bu puanı veriyorsunuz? (isteğe bağlı)" data-track-id="profil-modal-textarea-puan-yorum"></textarea>
                <div class="rating-char-count"><span id="ratingCharCount">0</span>/500</div>
            </div>
            <div class="rating-modal-footer">
                <button class="btn-rating-cancel" id="btnCancelRating" data-track-id="profil-modal-btn-puan-vazgec">Vazgeç</button>
                <button class="btn-rating-save" id="ratingSubmitBtn" data-track-id="profil-modal-btn-puan-kaydet">Kaydet</button>
            </div>
        </div>
    </div>

    <!-- Ratings list modal -->
    <div class="ratings-list-backdrop" id="ratingsListBackdrop">
        <div class="ratings-list-modal">
            <div class="ratings-list-header">
                <span id="ratingsListTitle">Değerlendirmeler</span>
                <button class="rating-modal-close" id="btnCloseRatingsList" data-track-id="profil-modal-btn-degerlendirmeler-kapat">×</button>
            </div>
            <div id="ratingsListSummaryBar"></div>
            <div class="ratings-list-body" id="ratingsListBody">
                <div class="follow-modal-loading">Yükleniyor...</div>
            </div>
        </div>
    </div>

    <!-- Edit profile modal -->
    <div class="ep-backdrop" id="epBackdrop">
        <div class="ep-modal">
            <div class="ep-header">
                <span>Profili Düzenle</span>
                <button class="ep-close" id="btnCloseEpModal">×</button>
            </div>
            <div class="ep-body">
                <div class="ep-field">
                    <label for="epFullName">Ad Soyad</label>
                    <input type="text" id="epFullName" maxlength="100" placeholder="Adın ve soyadın" autocomplete="name">
                </div>
                <div class="ep-field">
                    <label for="epUsername">Kullanıcı Adı</label>
                    <input type="text" id="epUsername" maxlength="50" placeholder="kullanici_adi" autocomplete="username" id="epUsernameInputEl">
                    <div class="ep-hint" id="epUsernameHint">Yalnızca küçük harf, rakam ve alt çizgi (_) kullanılabilir.</div>
                </div>
            </div>
            <div class="ep-footer">
                <button class="ep-cancel" id="btnEpCancel">Vazgeç</button>
                <button class="ep-save" id="epSaveBtn">Kaydet</button>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/profil-page.js?v=2"></script>
</body>

</html>
