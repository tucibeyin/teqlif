<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil — teqlif</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .profile-page {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1.5rem 4rem;
        }

        .profile-inner {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 1.5rem;
        }

        .profile-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(6,182,212,0.15);
            color: var(--primary);
            font-size: 2.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 1rem;
        }

        .profile-name {
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .profile-handle {
            font-size: 0.88rem;
            color: #6b7280;
            text-align: center;
            margin-bottom: 2rem;
        }

        .btn-profile {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.82rem 1rem;
            border: none;
            border-radius: 10px;
            font-size: 0.97rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-profile.primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-profile.primary:hover { background: var(--primary-dark); }

        .btn-profile.secondary {
            background: #f1f5f9;
            color: #334155;
        }
        .btn-profile.secondary:hover { background: #e2e8f0; }

        .btn-profile svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .profile-not-found {
            text-align: center;
            color: var(--text-muted);
            padding-top: 4rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="profile-page">
        <div class="profile-inner" id="profileInner">
            <div style="color:var(--text-muted);padding-top:4rem;">Yükleniyor...</div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const username = params.get('u');
        if (!username) window.location.href = '/';

        async function loadProfile() {
            const inner = document.getElementById('profileInner');
            try {
                const user = await apiFetch(`/users/${encodeURIComponent(username)}`);
                const myUser = Auth.getUser();
                const isOwn = myUser && myUser.username === user.username;
                const initial = (user.full_name || user.username || '?')[0].toUpperCase();

                let actionHtml = '';
                if (isOwn) {
                    actionHtml = `
                        <a class="btn-profile secondary" href="/hesabim.html">
                            <svg viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            Ayarlar
                        </a>`;
                } else if (Auth.getToken()) {
                    const toName = encodeURIComponent(user.full_name || user.username);
                    const toHandle = encodeURIComponent(user.username);
                    actionHtml = `
                        <a class="btn-profile primary" href="/mesajlar.html?to_id=${user.id}&to_name=${toName}&to_handle=${toHandle}">
                            <svg viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                            Mesaj Gönder
                        </a>`;
                } else {
                    actionHtml = `<a class="btn-profile primary" href="/giris.html">Mesaj göndermek için giriş yap</a>`;
                }

                inner.innerHTML = `
                    <div class="profile-avatar">${escHtml(initial)}</div>
                    <div class="profile-name">${escHtml(user.full_name || user.username)}</div>
                    <div class="profile-handle">@${escHtml(user.username)}</div>
                    ${actionHtml}`;
            } catch (e) {
                inner.innerHTML = `<div class="profile-not-found"><p>Kullanıcı bulunamadı.</p></div>`;
            }
        }

        function escHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        loadProfile();
    </script>
</body>
</html>
