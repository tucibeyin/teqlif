<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorilerim — teqlif</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script>
        Sentry.init({
            dsn: "https://98dfdd738860420a9c221abf4ddf35cb@o4511052861538304.ingest.us.sentry.io/4511053913391104",
            integrations: [
                Sentry.browserTracingIntegration(),
            ],
            tracesSampleRate: 1.0,
        });
    </script>

    <style>
        .page-wrap {
            max-width: 680px;
            margin: 2rem auto;
            padding: 0 1.25rem 4rem;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .page-header a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: .85rem;
        }

        .page-header a:hover {
            color: #111;
        }

        .page-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .listing-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: .85rem 1rem;
            margin-bottom: .75rem;
            text-decoration: none;
            color: inherit;
            transition: box-shadow .15s;
        }

        .listing-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, .12);
        }

        .listing-thumb {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #d1d5db;
        }

        .listing-thumb img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            object-fit: cover;
        }

        .listing-info {
            flex: 1;
            min-width: 0;
        }

        .listing-title {
            font-weight: 600;
            font-size: .95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: .2rem;
        }

        .listing-price {
            color: var(--primary);
            font-weight: 700;
            font-size: .9rem;
        }

        .listing-seller {
            font-size: .78rem;
            color: #9ca3af;
            margin-top: .15rem;
        }

        .unfav-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1.5px solid #fca5a5;
            background: #fff;
            color: #dc2626;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .15s;
        }

        .unfav-btn:hover {
            background: #fef2f2;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: .75rem;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/hesabim.html">Hesabım</a>
        </div>
    </nav>

    <div class="page-wrap">
        <div class="page-header">
            <a href="/hesabim.html">← Hesabım</a>
            <h1 class="page-title">Favorilerim</h1>
        </div>

        <div id="listContainer">
            <div class="empty-state">
                <div>Yükleniyor...</div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        if (!Auth.getToken()) window.location.href = '/giris.html';

        function fmt(p) {
            if (!p && p !== 0) return '';
            return '₺ ' + Number(p).toLocaleString('tr-TR', { minimumFractionDigits: 0 });
        }

        function esc(s) {
            return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        async function load() {
            document.getElementById('listContainer').innerHTML = '<div class="empty-state"><div>Yükleniyor...</div></div>';
            try {
                const data = await apiFetch('/favorites');
                if (!data.length) {
                    document.getElementById('listContainer').innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🤍</div>
                            <div>Henüz favori ilanınız yok.</div>
                            <div style="margin-top:.5rem;font-size:.85rem;">İlan detay sayfasından favorilere ekleyebilirsiniz.</div>
                        </div>`;
                    return;
                }
                document.getElementById('listContainer').innerHTML = data.map(l => {
                    const imgs = l.image_urls && l.image_urls.length ? l.image_urls : (l.image_url ? [l.image_url] : []);
                    const thumb = imgs.length
                        ? `<div class="listing-thumb"><img src="${imgs[0]}" alt="" onerror="this.parentElement.innerHTML='📷'"></div>`
                        : `<div class="listing-thumb">📷</div>`;
                    const seller = l.user ? `@${esc(l.user.username)}` : '';
                    return `
                        <div class="listing-card">
                            <a href="/ilan/${l.id}" style="display:contents;">
                                ${thumb}
                                <div class="listing-info">
                                    <div class="listing-title">${esc(l.title)}</div>
                                    <div class="listing-price">${fmt(l.price)}</div>
                                    ${seller ? `<div class="listing-seller">${seller}</div>` : ''}
                                </div>
                            </a>
                            <button class="unfav-btn" title="Favoriden Çıkar" onclick="removeFav(${l.id}, this)">❤</button>
                        </div>`;
                }).join('');
            } catch (e) {
                document.getElementById('listContainer').innerHTML = '<div class="empty-state"><div>Yüklenemedi.</div></div>';
            }
        }

        async function removeFav(id, btn) {
            btn.disabled = true;
            try {
                await apiFetch(`/favorites/${id}`, { method: 'DELETE' });
                await load();
            } catch (_) { btn.disabled = false; }
        }

        load();
    </script>
</body>

</html>
