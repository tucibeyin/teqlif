<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Ver — teqlif</title>
    <meta name="description" content="teqlif'te ücretsiz ilan ver, fotoğraf ekle ve hemen satışa başla.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="/static/icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">

    <script src="https://browser.sentry-cdn.com/8.0.0/bundle.tracing.min.js" crossorigin="anonymous"></script>
    <script src="/static/js/sentry-init.js"></script>

    <style>
        .form-page {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem 4rem;
            background: var(--bg, #f8fafc);
        }

        .form-inner {
            width: 100%;
            max-width: 420px;
        }

        .form-inner h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 1.5rem;
        }

        .form-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.65rem 0.875rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #111;
            background: #fff;
            box-sizing: border-box;
            transition: border-color .15s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary, #06b6d4);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .price-wrap {
            position: relative;
        }

        .price-wrap span {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 0.95rem;
            pointer-events: none;
        }

        .price-wrap input {
            padding-left: 2rem;
        }

        /* Photo upload */
        .photo-drop {
            border: 2px dashed #e5e7eb;
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .15s, background .15s;
        }

        .photo-drop:hover {
            border-color: var(--primary, #06b6d4);
            background: #f0fdfe;
        }

        .photo-drop input {
            display: none;
        }

        .photo-drop-label {
            font-size: 0.88rem;
            color: #6b7280;
            pointer-events: none;
        }

        .photo-drop-label strong {
            color: var(--primary, #06b6d4);
        }

        .photo-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-thumb {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-thumb .remove-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            background: rgba(0, 0, 0, .55);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            line-height: 1;
            padding: 0;
        }

        .photo-thumb .cover-badge {
            position: absolute;
            bottom: 3px;
            left: 3px;
            background: var(--primary, #06b6d4);
            color: #fff;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: 600;
        }

        .photo-count {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-top: 6px;
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary, #06b6d4);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            opacity: .88;
        }

        .btn-submit:disabled {
            opacity: .6;
            cursor: not-allowed;
        }

        .alert-msg {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-msg.error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .alert-msg.success {
            background: #dcfce7;
            color: #15803d;
        }

        .progress-bar-wrap {
            height: 4px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-top: 8px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary, #06b6d4);
            border-radius: 4px;
            transition: width .2s;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/kesfet.html" style="display:inline-flex;align-items:center;gap:0.3rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                Keşfet
            </a>
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-inner">
            <h1>İlan Ver</h1>

            <div class="alert-msg" id="alertMsg"></div>

            <form id="ilanForm">

                <!-- Photo upload -->
                <div class="form-card">
                    <div class="form-group" style="margin-bottom:0">
                        <label>Fotoğraflar (isteğe bağlı, max 10)</label>
                        <div class="photo-drop" id="photoDrop">
                            <input type="file" id="photoInput" accept="image/*" multiple>
                            <div class="photo-drop-label">
                                <strong>Tıkla</strong> veya sürükle-bırak ile fotoğraf ekle
                            </div>
                        </div>
                        <div class="progress-bar-wrap" id="progressWrap">
                            <div class="progress-bar" id="progressBar" style="width:0%"></div>
                        </div>
                        <div class="photo-previews" id="photoPreviews"></div>
                        <div class="photo-count" id="photoCount"></div>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-group">
                        <label for="title">İlan Başlığı *</label>
                        <input type="text" id="title" placeholder="Örn: iPhone 14 Pro, Deri Kanepe..." maxlength="200"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="category">Kategori *</label>
                        <select id="category" required>
                            <option value="">— Kategori seçin —</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="price">Fiyat (₺) *</label>
                        <div class="price-wrap">
                            <span>₺</span>
                            <input type="text" id="price" inputmode="decimal" placeholder="0" autocomplete="off"
                                required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="location">Konum (isteğe bağlı)</label>
                        <select id="location">
                            <option value="">-- Şehir seçin --</option>
                        </select>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-group">
                        <label for="description">Açıklama *</label>
                        <textarea id="description" placeholder="İlanınızı detaylı açıklayın..." required></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">İlanı Yayınla</button>
            </form>
        </div>
    </div>

    <div class="cf-turnstile"
         data-sitekey="0x4AAAAAACu_Bb1lbiRXqw4Q"
         data-callback="onTurnstileToken"
         data-error-callback="onTurnstileError"
         data-expired-callback="onTurnstileExpire"
         style="position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;"
         aria-hidden="true"></div>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async></script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ilan-ver-page.js?v=1"></script>
</body>

</html>
