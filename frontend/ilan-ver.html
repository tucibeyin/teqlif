<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İlan Ver — teqlif</title>
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
    <link rel="apple-touch-icon" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        .form-page {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem 4rem;
            background: var(--bg, #f8fafc);
        }

        .form-inner {
            width: 100%;
            max-width: 520px;
        }

        .form-inner h1 {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 1.5rem;
        }

        .form-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 10px rgba(0,0,0,.06);
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.65rem 0.875rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #111;
            background: #fff;
            box-sizing: border-box;
            transition: border-color .15s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--primary, #06b6d4);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .price-wrap {
            position: relative;
        }

        .price-wrap span {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 0.95rem;
            pointer-events: none;
        }

        .price-wrap input {
            padding-left: 2rem;
        }

        /* Photo upload */
        .photo-drop {
            border: 2px dashed #e5e7eb;
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .15s, background .15s;
        }

        .photo-drop:hover { border-color: var(--primary, #06b6d4); background: #f0fdfe; }

        .photo-drop input { display: none; }

        .photo-drop-label {
            font-size: 0.88rem;
            color: #6b7280;
            pointer-events: none;
        }

        .photo-drop-label strong {
            color: var(--primary, #06b6d4);
        }

        .photo-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-thumb {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-thumb .remove-btn {
            position: absolute;
            top: 3px;
            right: 3px;
            background: rgba(0,0,0,.55);
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            line-height: 1;
            padding: 0;
        }

        .photo-thumb .cover-badge {
            position: absolute;
            bottom: 3px;
            left: 3px;
            background: var(--primary, #06b6d4);
            color: #fff;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 4px;
            font-weight: 600;
        }

        .photo-count {
            font-size: 0.78rem;
            color: #9ca3af;
            margin-top: 6px;
        }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: var(--primary, #06b6d4);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover { opacity: .88; }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; }

        .alert-msg {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .alert-msg.error { background: #fee2e2; color: #b91c1c; }
        .alert-msg.success { background: #dcfce7; color: #15803d; }

        .progress-bar-wrap {
            height: 4px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-top: 8px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary, #06b6d4);
            border-radius: 4px;
            transition: width .2s;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/giris.html" id="navGiris">Giriş Yap</a>
            <a href="/kayit.html" class="btn-nav" id="navKayit">Kayıt Ol</a>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-inner">
            <h1>İlan Ver</h1>

            <div class="alert-msg" id="alertMsg"></div>

            <form id="ilanForm" onsubmit="submitForm(event)">

                <!-- Photo upload -->
                <div class="form-card">
                    <div class="form-group" style="margin-bottom:0">
                        <label>Fotoğraflar (isteğe bağlı, max 10)</label>
                        <div class="photo-drop" id="photoDrop" onclick="document.getElementById('photoInput').click()">
                            <input type="file" id="photoInput" accept="image/*" multiple>
                            <div class="photo-drop-label">
                                <strong>Tıkla</strong> veya sürükle-bırak ile fotoğraf ekle
                            </div>
                        </div>
                        <div class="progress-bar-wrap" id="progressWrap">
                            <div class="progress-bar" id="progressBar" style="width:0%"></div>
                        </div>
                        <div class="photo-previews" id="photoPreviews"></div>
                        <div class="photo-count" id="photoCount"></div>
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-group">
                        <label for="title">İlan Başlığı *</label>
                        <input type="text" id="title" placeholder="Örn: iPhone 14 Pro, Deri Kanepe..." maxlength="200" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Kategori *</label>
                        <select id="category" required>
                            <option value="">— Kategori seçin —</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="price">Fiyat (₺) *</label>
                        <div class="price-wrap">
                            <span>₺</span>
                            <input type="text" id="price" inputmode="decimal" placeholder="0" autocomplete="off" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="location">Konum (isteğe bağlı)</label>
                        <input type="text" id="location" placeholder="İstanbul, Ankara...">
                    </div>
                </div>

                <div class="form-card">
                    <div class="form-group">
                        <label for="description">Açıklama *</label>
                        <textarea id="description" placeholder="İlanınızı detaylı açıklayın..." required></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">İlanı Yayınla</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        // Giriş yapılmamışsa yönlendir
        (function () {
            const token = localStorage.getItem('teqlif_token');
            if (!token) {
                window.location.href = '/giris.html?next=/ilan-ver.html';
            }
        })();

        // --- Photo management ---
        const MAX_PHOTOS = 10;
        let selectedFiles = []; // {file, objectUrl}

        const photoInput = document.getElementById('photoInput');
        const photoPreviews = document.getElementById('photoPreviews');
        const photoCount = document.getElementById('photoCount');
        const photoDrop = document.getElementById('photoDrop');

        photoInput.addEventListener('change', (e) => addFiles(Array.from(e.target.files)));
        photoInput.addEventListener('click', (e) => e.stopPropagation());

        // Drag & drop
        photoDrop.addEventListener('dragover', (e) => { e.preventDefault(); photoDrop.style.borderColor = 'var(--primary, #06b6d4)'; });
        photoDrop.addEventListener('dragleave', () => { photoDrop.style.borderColor = ''; });
        photoDrop.addEventListener('drop', (e) => {
            e.preventDefault();
            photoDrop.style.borderColor = '';
            addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
        });

        function addFiles(files) {
            const remaining = MAX_PHOTOS - selectedFiles.length;
            if (remaining <= 0) return;
            const toAdd = files.slice(0, remaining);
            toAdd.forEach(f => {
                selectedFiles.push({ file: f, objectUrl: URL.createObjectURL(f) });
            });
            renderPreviews();
            // Reset input so same file can be re-added after removal
            photoInput.value = '';
        }

        function removeFile(idx) {
            URL.revokeObjectURL(selectedFiles[idx].objectUrl);
            selectedFiles.splice(idx, 1);
            renderPreviews();
        }

        function renderPreviews() {
            photoPreviews.innerHTML = '';
            selectedFiles.forEach(({ objectUrl }, i) => {
                const wrap = document.createElement('div');
                wrap.className = 'photo-thumb';

                const img = document.createElement('img');
                img.src = objectUrl;
                wrap.appendChild(img);

                if (i === 0) {
                    const badge = document.createElement('span');
                    badge.className = 'cover-badge';
                    badge.textContent = 'Kapak';
                    wrap.appendChild(badge);
                }

                const btn = document.createElement('button');
                btn.className = 'remove-btn';
                btn.type = 'button';
                btn.textContent = '✕';
                btn.onclick = () => removeFile(i);
                wrap.appendChild(btn);

                photoPreviews.appendChild(wrap);
            });

            const count = selectedFiles.length;
            photoCount.textContent = count > 0 ? `${count} fotoğraf seçildi` : '';
        }

        // Upload a single file, returns URL string or null
        async function uploadFile(file, token) {
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch('/api/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: fd,
            });
            if (!res.ok) return null;
            const data = await res.json();
            return data.url || null;
        }

        // Kategorileri API'den çek
        async function loadCategories() {
            try {
                const cats = await apiFetch('/categories');
                const sel = document.getElementById('category');
                cats.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.key;
                    opt.textContent = c.label;
                    sel.appendChild(opt);
                });
            } catch (_) {
                // Fallback
                const fallback = [
                    ['elektronik', '📱 Elektronik'],
                    ['vasita', '🚗 Vasıta'],
                    ['emlak', '🏠 Emlak'],
                    ['giyim', '👗 Giyim'],
                    ['spor', '⚽ Spor'],
                    ['kitap', '📚 Kitap & Müzik'],
                    ['ev', '🛋 Ev & Bahçe'],
                    ['diger', '📦 Diğer'],
                ];
                const sel = document.getElementById('category');
                fallback.forEach(([k, l]) => {
                    const opt = document.createElement('option');
                    opt.value = k;
                    opt.textContent = l;
                    sel.appendChild(opt);
                });
            }
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alertMsg');
            el.textContent = msg;
            el.className = 'alert-msg ' + type;
            el.style.display = 'block';
            el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Yayınlanıyor...';
            document.getElementById('alertMsg').style.display = 'none';

            const title = document.getElementById('title').value.trim();
            const category = document.getElementById('category').value;
            const price = parseFloat(document.getElementById('price').value.replace(/\./g, '').replace(',', '.'));
            const location = document.getElementById('location').value.trim() || null;
            const description = document.getElementById('description').value.trim();

            const token = localStorage.getItem('teqlif_token');

            try {
                // Upload photos
                const imageUrls = [];
                if (selectedFiles.length > 0) {
                    const progressWrap = document.getElementById('progressWrap');
                    const progressBar = document.getElementById('progressBar');
                    progressWrap.style.display = 'block';

                    for (let i = 0; i < selectedFiles.length; i++) {
                        const url = await uploadFile(selectedFiles[i].file, token);
                        if (url) imageUrls.push(url);
                        progressBar.style.width = `${Math.round(((i + 1) / selectedFiles.length) * 100)}%`;
                    }
                    progressWrap.style.display = 'none';
                }

                await apiFetch('/listings', {
                    method: 'POST',
                    body: JSON.stringify({
                        title, category, price, location, description,
                        image_urls: imageUrls,
                        ...(imageUrls.length > 0 ? { image_url: imageUrls[0] } : {}),
                    }),
                });
                showAlert('İlanınız başarıyla yayına alındı!', 'success');
                document.getElementById('ilanForm').reset();
                selectedFiles = [];
                renderPreviews();
                setTimeout(() => window.location.href = '/?tab=ilanlar', 1500);
            } catch (err) {
                showAlert(err.detail || 'Bir hata oluştu, lütfen tekrar deneyin.', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'İlanı Yayınla';
            }
        }

        // Price formatter: 1000000 → 1.000.000
        (function () {
            const input = document.getElementById('price');
            input.addEventListener('input', function () {
                let raw = this.value.replace(/[^\d,]/g, ''); // sadece rakam ve virgül
                // Virgülden sonraki kısmı ayır
                const parts = raw.split(',');
                const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
                this.value = parts.length > 1
                    ? intPart + ',' + parts[1].slice(0, 2)
                    : intPart;
            });
        })();

        loadCategories();
    </script>
</body>
</html>
