<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol — teqlif</title>
    <meta name="description" content="teqlif'e ücretsiz kayıt ol, ilan ver ve satışa başla.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://teqlif.com/kayit.html">
    <link rel="icon" type="image/svg+xml" href="/static/icons/icon.svg">
    <link rel="apple-touch-icon" href="/static/icons/icon.svg">
    <link rel="manifest" href="/static/icons/manifest.json">
    <meta name="theme-color" content="#06b6d4">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">teqlif</a>
        <div class="nav-links">
            <a href="/giris.html">Giriş Yap</a>
        </div>
    </nav>

    <div class="page-center">
        <div class="form-card">

            <!-- Adım 1: Kayıt Formu -->
            <div id="stepRegister">
                <h2>Hesap oluştur</h2>
                <p class="subtitle">Ücretsiz kayıt ol, hemen başla</p>

                <div class="alert" id="alertRegister"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="full_name">Ad Soyad</label>
                        <input type="text" id="full_name" placeholder="Adınız Soyadınız" required autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="username">Kullanıcı Adı</label>
                        <input type="text" id="username" placeholder="ornek_kullanici" required autocomplete="username">
                        <small style="color:var(--text-muted);font-size:0.78rem;">Küçük harf, rakam ve alt çizgi kullanabilirsin</small>
                        <span id="usernameStatus" style="display:block;font-size:0.78rem;margin-top:3px;min-height:1rem;"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">E-posta</label>
                        <input type="email" id="email" placeholder="ornek@mail.com" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Şifre</label>
                        <input type="password" id="password" placeholder="En az 8 karakter" required autocomplete="new-password">
                    </div>
                    <div class="form-group" style="margin-bottom:0.5rem;">
                        <label style="display:flex;align-items:flex-start;gap:0.6rem;cursor:pointer;font-size:0.85rem;color:var(--text-muted);font-weight:400;">
                            <input type="checkbox" id="eulaCheck" required
                                   style="margin-top:2px;accent-color:var(--primary);flex-shrink:0;">
                            <span>
                                <a href="/kullanim-sartlari.html" target="_blank" style="color:var(--primary);">Kullanım Şartları ve EULA</a>'yı
                                okudum, kabul ediyorum. Uygunsuz içeriklere sıfır tolerans politikasını anladım.
                            </span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
                        Kayıt Ol
                    </button>
                </form>

                <div class="form-footer">
                    Zaten hesabın var mı? <a href="/giris.html">Giriş yap</a>
                </div>
            </div>

            <!-- Adım 2: Kod Doğrulama -->
            <div id="stepVerify" style="display:none;">
                <h2>E-postanı doğrula</h2>
                <p class="subtitle" id="verifySubtitle"></p>

                <div class="alert" id="alertVerify"></div>

                <form id="verifyForm">
                    <div class="form-group">
                        <label for="code">Doğrulama Kodu</label>
                        <input type="text" id="code" placeholder="6 haneli kodu gir"
                               maxlength="6" inputmode="numeric" pattern="[0-9]{6}"
                               required autocomplete="one-time-code"
                               style="font-size:1.5rem;letter-spacing:0.4rem;text-align:center;">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="verifyBtn">
                        Doğrula
                    </button>
                </form>

                <div class="form-footer">
                    <a href="#" id="resendLink">Kodu tekrar gönder</a>
                </div>
            </div>

        </div>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
    <script>
        if (Auth.getToken()) window.location.href = '/';

        let registeredEmail = '';

        // ── Kullanıcı adı gerçek zamanlı kontrol ─────────────────────
        let _unTimer = null;
        let _unOk = null; // null=kontrol edilmedi/geçersiz, true=uygun, false=alınmış
        const _unInput = document.getElementById('username');
        const _unStatus = document.getElementById('usernameStatus');

        _unInput.addEventListener('input', () => {
            const val = _unInput.value.trim();
            clearTimeout(_unTimer);
            _unOk = null;
            if (!val) { _unStatus.textContent = ''; return; }
            if (!/^[a-z0-9_]+$/.test(val)) {
                _unStatus.textContent = '⚠ Sadece küçük harf, rakam ve _ kullanılabilir';
                _unStatus.style.color = '#ef4444';
                return;
            }
            if (val.length < 3) {
                _unStatus.textContent = '';
                return;
            }
            _unStatus.textContent = 'Kontrol ediliyor...';
            _unStatus.style.color = '#6b7280';
            _unTimer = setTimeout(async () => {
                try {
                    const r = await fetch('/api/auth/check-username?username=' + encodeURIComponent(val));
                    const d = await r.json();
                    if (d.available) {
                        _unStatus.textContent = '✓ Kullanıcı adı uygun';
                        _unStatus.style.color = '#16a34a';
                        _unOk = true;
                    } else {
                        _unStatus.textContent = '✗ Bu kullanıcı adı zaten alınmış';
                        _unStatus.style.color = '#ef4444';
                        _unOk = false;
                    }
                } catch { _unStatus.textContent = ''; _unOk = null; }
            }, 600);
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const alertEl = document.getElementById('alertRegister');
            alertEl.className = 'alert';

            // Kullanıcı adı format kontrolü
            const unVal = _unInput.value.trim();
            if (!/^[a-z0-9_]{3,50}$/.test(unVal)) {
                alertEl.textContent = 'Kullanıcı adı geçersiz. Sadece küçük harf, rakam ve _ kullanılabilir (min 3 karakter).';
                alertEl.className = 'alert alert-error show';
                return;
            }
            if (_unOk === false) {
                alertEl.textContent = 'Bu kullanıcı adı zaten alınmış. Lütfen başka bir tane seçin.';
                alertEl.className = 'alert alert-error show';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Kaydediliyor...';

            try {
                registeredEmail = document.getElementById('email').value;
                await Auth.register({
                    full_name: document.getElementById('full_name').value,
                    username: document.getElementById('username').value,
                    email: registeredEmail,
                    password: document.getElementById('password').value,
                });

                document.getElementById('stepRegister').style.display = 'none';
                document.getElementById('stepVerify').style.display = 'block';
                document.getElementById('verifySubtitle').textContent =
                    registeredEmail + ' adresine 6 haneli doğrulama kodu gönderdik.';
                document.getElementById('code').focus();
            } catch (err) {
                alertEl.textContent = err.detail || 'Bir hata oluştu';
                alertEl.className = 'alert alert-error show';
                btn.disabled = false;
                btn.textContent = 'Kayıt Ol';
            }
        });

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('verifyBtn');
            const alertEl = document.getElementById('alertVerify');
            alertEl.className = 'alert';

            btn.disabled = true;
            btn.textContent = 'Doğrulanıyor...';

            try {
                await Auth.verify(registeredEmail, document.getElementById('code').value);
                window.location.href = '/';
            } catch (err) {
                alertEl.textContent = err.detail || 'Kod hatalı veya süresi dolmuş';
                alertEl.className = 'alert alert-error show';
                btn.disabled = false;
                btn.textContent = 'Doğrula';
            }
        });

        document.getElementById('resendLink').addEventListener('click', async (e) => {
            e.preventDefault();
            const alertEl = document.getElementById('alertVerify');
            try {
                await apiFetch('/auth/resend-code', {
                    method: 'POST',
                    body: JSON.stringify({ email: registeredEmail }),
                });
                alertEl.textContent = 'Kod tekrar gönderildi.';
                alertEl.className = 'alert alert-success show';
            } catch (err) {
                alertEl.textContent = err.detail || 'Gönderim başarısız';
                alertEl.className = 'alert alert-error show';
            }
        });
    </script>
</body>
</html>
